# Gitleaks Configuration for Clinical Diary Project
# Version: 2.1.0 - Restore built-in rules; broaden github-app-token (CUR-1424)
# Last Updated: 2026-06-01
#
# This configuration uses gitleaks' built-in, battle-tested ruleset via
# `[extend] useDefault = true`. Without that line, a present .gitleaks.toml
# REPLACES the defaults with whatever it declares -- so a config with no
# [[rules]] runs ZERO rules and detects nothing. The defaults are enabled
# below; the only custom rule is a broadened github-app-token (see comment).
#
# Documentation: https://github.com/gitleaks/gitleaks

title = "Clinical Diary Gitleaks Configuration"

# =====================================================
# Inherit gitleaks' built-in ruleset
# =====================================================
# REQUIRED: a present config file otherwise discards the embedded defaults.
[extend]
useDefault = true

# =====================================================
# Global Allowlist
# =====================================================

[allowlist]
description = "Global allowlist for false positives"

# Paths to ignore completely
paths = [
    # Test fixtures and mock data
    '''test/fixtures/.*''',
    '''test/mocks/.*''',

    # Build artifacts (excluded by .gitignore anyway)
    '''node_modules/.*''',
    '''.dart_tool/.*''',
    '''build/.*''',
    '''dist/.*''',

    # Lock files (contain hashes, not secrets)
    '''package-lock\.json$''',
    '''yarn\.lock$''',
    '''Podfile\.lock$''',
    '''Gemfile\.lock$''',

    # Git metadata
    '''\.git/.*''',
]

# Commits to ignore (already in history, secrets revoked)
commits = [
    # The original exposed Linear API key (revoked)
    "ae20725b0f4e19ac82b742b45805ee722c23172b",

    # Old anspar-linear-integration plugin with exposed tokens (revoked)
    "20396066d2639e7324033fec8fdafd000a74628e",
    "af3869e27a9febf2fa12ffbdc9ff64f55c38d690",
]

# Regex patterns for approved documentation placeholders
# IMPORTANT: These are exact string matches. Add sparingly.
regexes = [
    # Version numbers
    '''v?[0-9]+\.[0-9]+\.[0-9]+''',

    # UUIDs
    '''[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}''',

    # Git SHAs
    '''[0-9a-f]{40}''',

    # Environment variable syntax
    '''\$\{[A-Z_]+\}''',

    # Approved documentation placeholder values (exact matches)
    '''^EXAMPLE_API_KEY_VALUE$''',
    '''^EXAMPLE_SECRET_VALUE$''',
    '''^example@fake\.email$''',
]

# =====================================================
# Custom rule overrides (merged over the built-in defaults above)
# =====================================================

# Broaden the built-in github-app-token rule for GitHub's new "stateless"
# installation-token format (GitHub changelog 2026-05-15): ghs_-prefixed,
# ~520 chars, base64url payload containing '.', '-' and '_'. The default
# rule -- (?:ghu|ghs)_[0-9a-zA-Z]{36} -- is alnum-only, so it only matches a
# new-format token when the first 36 post-prefix chars happen to be an
# uninterrupted alnum run; a '-'/'_' inside that window makes it miss.
# Same id as the built-in rule, so this replaces it. Pattern per GitHub's
# guidance: ghs_[A-Za-z0-9._-]{36,}. Drop when upstream gitleaks ships a fix.
[[rules]]
id = "github-app-token"
description = "Identified a GitHub App Token (stateless ghs_/ghu_ format)"
regex = '''(?:ghu|ghs)_[0-9A-Za-z._-]{36,}'''
entropy = 3
keywords = [
    "ghu_",
    "ghs_",
]
