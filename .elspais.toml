# elspais configuration — Cure-HHT Diary Platform
#
# Defines the formal-requirement ID format, level hierarchy, and file
# scanning surface for this repo. Authored by hand to use the DIARY
# namespace with named (kebab-case) component IDs and five levels
# (PRD/BASE/GUI/OPS/DEV). Modeled after Cure-HHT/event_sourcing.
#
# BASE is a product-tier root that mirrors PRD (GUI/OPS/DEV may refine it
# exactly as they refine PRD), but marks behavior a Sponsor may OPT TO
# EXCLUDE from their documentation set. Use it for product obligations
# that are real and traceable but not part of every sponsor's URS.
#
# Companion: spec/README.md and (eventually) spec/requirements-spec.md.

# Schema version (do not change without consulting elspais docs)
version = 4

# Daemon TTL in minutes (>0 = auto-start, 0 = disabled, <0 = no timeout)
cli_ttl = 30
# File path for MCP tool-usage statistics (optional)
stats = ""

# Project identity

[project]
namespace = "DIARY"
name = "Cure-HHT Diary Platform"

# Requirement ID format
#
# Canonical form: DIARY-{level}-{component}[-{assertion}]
#   level     — audience tag (PRD, BASE, GUI, OPS, DEV)
#   component — kebab-case noun describing the requirement subject
#   assertion — optional A–Z label (multi-assertion via "+")
#
# Examples:
#   DIARY-PRD-action-inventory
#   DIARY-GUI-user-account-deactivate
#   DIARY-DEV-event-store-schema-G
#   DIARY-PRD-action-inventory-A+B+D

[id-patterns]
canonical = "{namespace}-{level.letter}-{component}"
separators = ["-"]
prefix_optional = false

[id-patterns.aliases]
short = "{level.letter}-{component}"

[id-patterns.component]
# Human-meaningful kebab-case nouns (replaces the legacy numeric
# `REQ-pNNNNN` scheme migrated out of this repo on 2026-05-15).
style = "kebab-case"

[id-patterns.assertions]
label_style = "uppercase"
max_count = 26
multi_separator = "+"
zero_pad = false

[id-patterns.associated]
enabled = false
position = "after_prefix"
format = "uppercase"
length = 3
separator = "-"

# Requirement-level definitions
#
# Five levels: PRD (product obligations), BASE (product obligations a
# Sponsor may exclude from their documentation set — refinable exactly
# like PRD), GUI (presentation obligations — interface behavior, layout,
# interaction patterns), OPS (operational obligations), and DEV
# (implementation obligations).
#
# PRD and BASE are both product-tier roots (each implements only itself).
# GUI/OPS/DEV may Refine either. GUI sits above OPS because a GUI REQ
# typically Refines a PRD/BASE parent (presentation elaborates function).
# `rank` is a display/ordering total order; BASE is placed adjacent to PRD.

[levels.PRD]
rank = 1
letter = "PRD"
display_name = "Product"
implements = ["PRD", "BASE"]

[levels.BASE]
rank = 2
letter = "BASE"
display_name = "Base (sponsor-excludable)"
implements = ["BASE", "PRD"]

[levels.GUI]
rank = 3
letter = "GUI"
display_name = "Interface"
implements = ["GUI", "PRD", "BASE"]

[levels.OPS]
rank = 4
letter = "OPS"
display_name = "Operations"
implements = ["OPS", "PRD", "BASE"]

[levels.DEV]
rank = 5
letter = "DEV"
display_name = "Development"
implements = ["DEV", "GUI", "OPS", "PRD", "BASE"]

# File scanning configuration

[scanning]
skip = ["node_modules", ".git", "__pycache__", "*.pyc", ".venv", ".env", ".dart_tool", "build", ".flutter-plugins", ".flutter-plugins-dependencies"]

[scanning.spec]
directories = ["spec"]
file_patterns = ["*.md"]
# Authoring infrastructure files; not normative requirements.
skip_files = ["README.md", "requirements-spec.md", "EXAMPLE-requirement.md", "INDEX.md"]
# spec-archive/ holds the pre-URS-v1 spec tree (legacy REQ-pNNNNN ids).
# Kept for cherry-pick reference during the migration; not scanned.
# _generated/ holds elspais build artifacts (INDEX, glossary, term index).
# governance/ holds sponsor-shared governance content (style-guide,
# change-control, SDLC-SOP, etc.) with its own conventions, intentionally
# not part of the local requirement graph but mined for terms via
# glossary-core.md at the spec/ root.
# URS-manifest/ holds authored prose pieces (chapter intros, frontmatter,
# appendices, cover) consumed by the URS PDF generator; these are not
# REQs and shouldn't be parsed by elspais's spec scanner.
# regulations/, roadmap/, and the legacy NFR/ entry are also skipped.
# NOTE: do NOT skip user-journeys/ here. Journey files (# JNY-... blocks) are
# discovered through this spec scan and classified JOURNEY by content; adding
# them to skip_dirs removes them from the graph entirely.
skip_dirs = ["_generated", "roadmap", "regulations", "NFR", "governance", "URS-manifest"]

[scanning.code]
directories = ["src", "apps", "packages"]
file_patterns = []
skip_files = []
skip_dirs = []

[scanning.test]
directories = ["apps/**/test", "apps/**/integration_test", "packages/**/test", "packages/**/integration_test", "tools/**/tests", "database/tests"]
file_patterns = ["*_test.dart", "test_*.dart", "test_*.py", "*_test.sql", "test_*.sql"]
skip_files = []
skip_dirs = []
enabled = true
prescan_command = ""
reference_keyword = "Verifies"
reference_patterns = []

# Dart test targets (CUR-1533): flutter test --machine + lcov ingestion for
# all testable Dart packages in this repo. apps/diary-portal-resolver (Go)
# is deferred to CUR-1542 and intentionally excluded here.
#
# CUR-1556: `--file-reporter=json:coverage/machine.jsonl` makes each command
# actually write the machine JSON that `results` points at. `flutter-machine`
# is a stdout-channel reporter, so `elspais checks --run-tests` ingests results
# transiently from captured stdout; the CI matrix worked because `summary trace`
# ran against the same live daemon session. But commands that do NOT run the
# tests (`elspais viewer`, `trace`, `graph` standalone) have no captured stdout
# and fall back to globbing `results` -- which nothing produced, so `verified`
# showed 0. The additive file sink (stdout still carries the JSON, so capture
# and exit codes are unaffected) persists results to coverage/ (gitignored,
# alongside lcov.info) so the verified dimension survives outside a `--run-tests`
# run. `[rules.hierarchy] allow_structural_orphans` (below) already tolerates the
# test_id-less RESULT nodes this surfaces.

[[scanning.test.targets]]
name = "apps/common-dart/canonical_json_jcs"
cwd = "apps/common-dart/canonical_json_jcs"
command = "flutter test --machine --coverage --file-reporter=json:coverage/machine.jsonl"
reporter = "flutter-machine"
coverage = "coverage/lcov.info"
results = "coverage/machine.jsonl"
match = "source"
credit_coverage = "verified"

[[scanning.test.targets]]
name = "apps/common-dart/comms"
