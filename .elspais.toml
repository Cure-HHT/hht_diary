# elspais configuration — Cure-HHT Diary Platform
#
# Defines the formal-requirement ID format, level hierarchy, and file
# scanning surface for this repo. Authored by hand to use the DIARY
# namespace with named (kebab-case) component IDs and four audience
# levels (PRD/GUI/OPS/DEV). Modeled after Cure-HHT/event_sourcing.
#
# Companion: spec/README.md and (eventually) spec/requirements-spec.md.

# Schema version (do not change without consulting elspais docs)
version = 4

# Daemon TTL in minutes (>0 = auto-start, 0 = disabled, <0 = no timeout)
cli_ttl = 30
# File path for MCP tool-usage statistics (optional)
stats = ""

# Project identity

[project]
namespace = "DIARY"
name = "Cure-HHT Diary Platform"

# Requirement ID format
#
# Canonical form: DIARY-{level}-{component}[-{assertion}]
#   level     — three-letter audience tag (PRD, GUI, OPS, DEV)
#   component — kebab-case noun describing the requirement subject
#   assertion — optional A–Z label (multi-assertion via "+")
#
# Examples:
#   DIARY-PRD-action-inventory
#   DIARY-GUI-user-account-deactivate
#   DIARY-DEV-event-store-schema-G
#   DIARY-PRD-action-inventory-A+B+D

[id-patterns]
canonical = "{namespace}-{level.letter}-{component}"
separators = ["-"]
prefix_optional = false

[id-patterns.aliases]
short = "{level.letter}-{component}"

[id-patterns.component]
# Human-meaningful kebab-case nouns (replaces the legacy numeric
# `REQ-pNNNNN` scheme migrated out of this repo on 2026-05-15).
style = "kebab-case"

[id-patterns.assertions]
label_style = "uppercase"
max_count = 26
multi_separator = "+"
zero_pad = false

[id-patterns.associated]
enabled = false
position = "after_prefix"
format = "uppercase"
length = 3
separator = "-"

# Requirement-level definitions
#
# Four levels: PRD (product obligations), GUI (presentation obligations
# — interface behavior, layout, interaction patterns), OPS (operational
# obligations), and DEV (implementation obligations).
#
# GUI sits between PRD and OPS in the hierarchy because a GUI REQ
# typically Refines a PRD parent (presentation elaborates function).

[levels.PRD]
rank = 1
letter = "PRD"
display_name = "Product"
implements = ["PRD"]

[levels.GUI]
rank = 2
letter = "GUI"
display_name = "Interface"
implements = ["GUI", "PRD"]

[levels.OPS]
rank = 3
letter = "OPS"
display_name = "Operations"
implements = ["OPS", "PRD"]

[levels.DEV]
rank = 4
letter = "DEV"
display_name = "Development"
implements = ["DEV", "GUI", "OPS", "PRD"]

# File scanning configuration

[scanning]
skip = ["node_modules", ".git", "__pycache__", "*.pyc", ".venv", ".env", ".dart_tool", "build", ".flutter-plugins", ".flutter-plugins-dependencies"]

[scanning.spec]
directories = ["spec"]
file_patterns = ["*.md"]
# Authoring infrastructure files; not normative requirements.
skip_files = ["README.md", "requirements-spec.md", "EXAMPLE-requirement.md", "INDEX.md", "glossary.md"]
# spec-archive/ holds the pre-URS-v1 spec tree (legacy REQ-pNNNNN ids).
# Kept for cherry-pick reference during the migration; not scanned.
# _generated/ holds elspais build artifacts (INDEX, glossary, term index).
# regulations/, NFR/, roadmap/ are sponsor-shared governance content with
# their own conventions, intentionally not part of the local graph.
skip_dirs = ["_generated", "roadmap", "regulations", "NFR"]

[scanning.code]
directories = ["src", "apps", "packages"]
file_patterns = []
skip_files = []
skip_dirs = []

[scanning.test]
directories = ["apps/**/test", "apps/**/integration_test", "packages/**/test", "packages/**/integration_test", "tools/**/tests", "database/tests"]
file_patterns = ["*_test.dart", "test_*.dart", "test_*.py", "*_test.sql", "test_*.sql"]
skip_files = []
skip_dirs = []
enabled = true
prescan_command = ""
reference_keyword = "Verifies"
reference_patterns = []

[scanning.result]
directories = ["build-reports"]
file_patterns = ["**/TEST-*.xml", "pytest-results.json"]
skip_files = []
skip_dirs = []
run_meta_file = ""

[scanning.coverage]
directories = ["."]
file_patterns = []
skip_files = []
skip_dirs = []

[scanning.journey]
directories = ["spec"]
file_patterns = ["*.md"]
skip_files = []
skip_dirs = []

[scanning.docs]
directories = ["docs"]
file_patterns = ["*.md"]

# Validation rules

[rules]
content_rules = []
protected_branches = ["main", "master"]

[rules.hierarchy]
cross_repo_implements = true
allow_structural_orphans = true
allow_circular = false
allow_orphans = false

[rules.format]
require_hash = true
require_assertions = false
require_status = true
require_rationale = false
no_assertions_severity = "warning"
no_traceability_severity = "warning"

[rules.format.status_roles]
active = ["Active"]
# `Legacy` marks REQs retained from the pre-URS spec tree (migrated on
# 2026-05-15) that have not yet been reconciled with the URS-v1
# authoritative content. Lifecycle: Legacy -> Draft (when reconciliation
# starts) -> Active.
provisional = ["Draft", "Proposed", "Legacy"]
aspirational = ["Roadmap", "Future", "Idea"]
retired = ["Deprecated", "Superseded", "Rejected"]

[rules.coverage.implemented]
full_direct = "ok"
full_indirect = "info"
partial = "warning"
none = "error"
failing = "error"

[rules.coverage.tested]
full_direct = "ok"
full_indirect = "info"
partial = "warning"
none = "error"
failing = "error"

[rules.coverage.verified]
full_direct = "ok"
full_indirect = "info"
partial = "warning"
none = "warning"
failing = "error"

[rules.coverage.uat_coverage]
full_direct = "ok"
full_indirect = "info"
partial = "info"
none = "info"
failing = "error"

[rules.coverage.uat_verified]
full_direct = "ok"
full_indirect = "info"
partial = "info"
none = "info"
failing = "error"

[rules.references]
retired = "warning"
provisional = "info"
aspirational = "info"

# Keyword extraction settings

[keywords]
min_length = 3

# Hash and validation settings

[validation]
hash_mode = "normalized-text"
hash_algorithm = "sha256"
hash_length = 8
# Cross-repo refs to sibling repos (hht_diary_callisto, hht_admin,
# event_sourcing) are normal; allow them to resolve via the
# FederatedGraph rather than erroring.
allow_unresolved_cross_repo = true
strict_hierarchy = false

# Defined terms

[terms]
output_dir = "spec/_generated"
markup_styles = ["*", "**"]
exclude_files = []

[terms.severity]
duplicate = "error"
undefined = "warning"
unmarked = "warning"
unused = "warning"
bad_definition = "error"
collection_empty = "warning"
canonical_form = "warning"
changed = "warning"

# Output settings

[output]
formats = []
dir = ""

# Associated repository definitions for cross-repo federation
# Populated by `elspais associate <path>`; do not edit by hand.

[associates]
