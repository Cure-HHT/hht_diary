# elspais configuration - Core Repository
# Generated by: elspais init (v0.109.0)
# 
# Tip: Create .elspais.local.toml alongside this file for developer-local
# overrides (e.g. associate paths). It is deep-merged and gitignored.

version = 3

# Project identity

[project]
namespace = "REQ"
name = "hht-diary"

# Requirement ID format and type definitions

[id-patterns]
canonical = "{namespace}-{level.letter}{component}"
separators = ["-", "_"]
prefix_optional = false

[id-patterns.aliases]
short = "{level.letter}{component}"

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true
# pattern = "[A-Z]{2}[0-9]{3}"  # For alphanumeric
# max_length = 32               # For named style

[id-patterns.assertions] # "uppercase" | "numeric" | "alphanumeric" | "numeric_1based"
label_style = "uppercase"
max_count = 26
# zero_pad = false              # Pad numeric labels
# multi_separator = "+"         # Multi-assertion (A+B+C)

# Requirement level definitions with hierarchy rules

[levels.prd]
rank = 1
letter = "p"
display_name = "Product"
implements = ["prd"]

[levels.ops]
rank = 2
letter = "o"
display_name = "Operations"
implements = ["ops", "prd"]

[levels.dev]
rank = 3
letter = "d"
display_name = "Development"
implements = ["dev", "ops", "prd"]

# File scanning configuration

[scanning]
skip = ["node_modules", ".git", "__pycache__", "*.pyc", ".venv", ".env", "build", "dist", ".dart_tool", "venv", "untracked-notes"]

[scanning.spec] # Spec file scanning
directories = ["spec", "spec/regulations/fda"]
file_patterns = ["*.md"]
skip_files = ["README.md", "requirements-format.md", "INDEX.md"]
skip_dirs = ["roadmap", "regulations"]
index_file = "INDEX.md"

[scanning.code] # Code file scanning
directories = ["apps", "packages", "server", "tools"]
file_patterns = []
skip_files = []
skip_dirs = []
# source_roots = []    # Import resolution roots

[scanning.test] # Test file scanning and reference detection
directories = ["apps/**/test", "apps/**/integration_test", "packages/**/test", "packages/**/integration_test", "tools/**/tests", "database/tests"]
file_patterns = ["*_test.dart", "test_*.dart", "test_*.py", "*_test.sql", "test_*.sql"]
skip_files = []
skip_dirs = []
enabled = true
prescan_command = ""
reference_keyword = "Verifies"
reference_patterns = []

[scanning.result] # Test result file scanning
directories = ["build-reports"]
file_patterns = ["TEST-*.xml", "pytest-results.json"]
skip_files = []
skip_dirs = []
run_meta_file = ""

[scanning.journey] # User journey file scanning
directories = ["spec/user-journeys"]
file_patterns = ["*.md"]
skip_files = []
skip_dirs = []

[scanning.docs] # Documentation file scanning
directories = ["docs"]
file_patterns = ["*.md"]
skip_files = []
skip_dirs = []

# Validation rules

[rules.hierarchy] # Global hierarchy settings
allow_circular = false
allow_structural_orphans = true
# cross_repo_implements = true  # Cross-repo implements
# allow_orphans = false         # Allow orphaned nodes

[rules.format] # Format enforcement rules
require_hash = true
require_rationale = false
require_assertions = false
require_status = true
allowed_statuses = ["Active", "Proposed", "Draft", "Deprecated", "Superseded"]
# content_rules = []            # Content validation rules

[rules.format.status_roles]
active = ["Active"]
provisional = ["Draft", "Proposed"]
aspirational = ["Roadmap", "Future"]
retired = ["Deprecated", "Superseded"]

# Changelog enforcement

[changelog]
hash_current = true
present = false
id_source = "gh"
date_format = "iso"
author_id_format = "email"
allowed_author_ids = "all"

[changelog.require]
reason = true
author_name = true
author_id = true
change_order = false

# Keyword extraction settings

[keywords]
min_length = 3

# Hash and validation settings

[validation]
hash_mode = "normalized-text"
allow_unresolved_cross_repo = true
# hash_algorithm = "sha256"     # Hash algorithm
# hash_length = 8               # Hash truncation length
# strict_hierarchy = false       # Strict hierarchy mode

# Output settings

[output]
formats = ["markdown", "html"]
dir = "build-reports/combined/traceability"

