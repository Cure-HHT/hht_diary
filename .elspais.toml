# Validation rules

[rules]
content_rules = []
protected_branches = ["main", "master"]

[rules.hierarchy]
cross_repo_implements = true
allow_structural_orphans = true
allow_circular = false
allow_orphans = false

[rules.format]
require_hash = true
require_assertions = false
require_status = true
require_rationale = false
no_assertions_severity = "warning"
no_traceability_severity = "warning"

[rules.format.status_roles]
# `Draft` is treated as an active (creditable) status while the spec tree is
# in its URS-v1 build-out phase: essentially every requirement is still Draft,
# so excluding Draft from coverage would render the traceability matrix and the
# tested/verified metrics permanently 0/0. Including it makes the coverage
# numbers meaningful now; the numbers tighten as Draft REQs are promoted to
# Active. (Trade-off: references to Draft REQs are no longer flagged as
# provisional. CUR-1556.)
active = ["Active", "Draft"]
# `Legacy` marks REQs retained from the pre-URS spec tree (migrated on
# 2026-05-15) that have not yet been reconciled with the URS-v1
# authoritative content. Lifecycle: Legacy -> Draft (when reconciliation
# starts) -> Active.
provisional = ["Proposed", "Legacy"]
aspirational = ["Roadmap", "Future", "Idea"]
retired = ["Deprecated", "Superseded", "Rejected"]

[rules.coverage.implemented]
full_direct = "ok"
full_indirect = "info"
partial = "warning"
none = "error"
failing = "error"

[rules.coverage.tested]
full_direct = "ok"
full_indirect = "info"
partial = "warning"
none = "error"
failing = "error"

[rules.coverage.verified]
full_direct = "ok"
full_indirect = "info"
partial = "warning"
none = "warning"
failing = "error"

[rules.coverage.uat_coverage]
full_direct = "ok"
full_indirect = "info"
partial = "info"
none = "info"
failing = "error"

[rules.coverage.uat_verified]
full_direct = "ok"
full_indirect = "info"
partial = "info"
none = "info"
failing = "error"

[rules.references]
retired = "warning"
provisional = "info"
aspirational = "info"

# Keyword extraction settings

[keywords]
min_length = 3

# Hash and validation settings

[validation]
hash_mode = "normalized-text"
hash_algorithm = "sha256"
hash_length = 8
# Cross-repo refs to sibling repos (hht_diary_callisto, hht_admin,
# event_sourcing) are normal; allow them to resolve via the
# FederatedGraph rather than erroring.
allow_unresolved_cross_repo = true
strict_hierarchy = false

# Defined terms

[terms]
output_dir = "spec/_generated"
markup_styles = ["*", "**"]
exclude_files = []

[terms.severity]
duplicate = "error"
# undefined / unmarked / unused / canonical_form dropped to info — they
# currently generate ~10k findings, ~89% of which originate in code
# files (Dart / SQL / bash where markdown emphasis on a domain term is
# a category error). Re-evaluate on the dedicated terms-cleanup ticket
# tracked at CUR-1359; see that ticket for the proposed long-term fix.
undefined = "info"
unmarked = "info"
unused = "info"
bad_definition = "error"
collection_empty = "warning"
canonical_form = "info"
changed = "warning"

# Output settings

[output]
formats = []
dir = ""

# Cross-repo federation scope (elspais >= 0.117.31)
#
# Read operations (health checks, summary, cross-repo reference resolution)
# always federate; these flags only gate WRITE/GENERATE surfaces. With both
# false, `elspais fix` (and MCP mutations) only modify THIS repo's spec files
# and never fold the event_sourcing (EVS) associate's requirements into our
# INDEX.md / term-index.md.
#
# Set explicitly to false to retire the prior workaround where
# `.elspais.local.toml` had to be moved aside before every commit so the
# pre-commit `elspais fix` wouldn't rewrite the event_sourcing repo's spec
# tree and bloat our INDEX. See ~/elspais/fedfix.md (the bug report) — this
# section is the upstream fix landing.
[federation]
write_associates = false
index_associates = false

# Associated repository definitions for cross-repo federation
# Populated by `elspais associate <path>`; do not edit by hand.

[associates]
