# Dependabot Configuration
# Enables automated dependency updates for GitHub Actions, npm, and Docker
#
# Documentation: https://docs.github.com/en/code-security/dependabot

version: 2

# Implements: DIARY-OPS-security-scanning/B
updates:
  # GitHub Actions - Weekly updates on Mondays
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"  # 3 AM to avoid business hours
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "github-actions"
      - "automated"
    commit-message:
      prefix: "[Dependabot]"
      include: "scope"
    reviewers:
      - "ops-team"
    # Group minor and patch updates together
    groups:
      github-actions-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # npm packages - VS Code extension
  - package-ecosystem: "npm"
    directory: "/tools/vscode-linear-req-inserter"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
      - "vscode-extension"
    commit-message:
      prefix: "[Dependabot]"
      include: "scope"
    # Group minor and patch updates into a single weekly PR (majors stay
    # separate for individual review). Without this, each dev-dependency bump
    # opens its own PR and they fight over package-lock.json on merge.
    groups:
      vscode-extension-minor:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    # Ignore major version updates for stable packages
    ignore:
      - dependency-name: "vscode"
        update-types: ["version-update:semver-major"]

# Notes:
# 1. Dependabot DOES update SHA-pinned GitHub Actions: it rewrites the pinned
#    SHA to the SHA of the action's latest release tag and appends a version
#    comment, preserving the SHA-pin style required for supply-chain integrity.
#    This requires the upstream action to publish release tags --
#    Cure-HHT/hht_workflows now does (see its README "Versioning & releases";
#    CUR-1422). Cross-repo pin compatibility (hht_diary <-> hht_diary_<sponsor>)
#    is drift-checked in hht_admin.
# 2. Docker base images and tool versions are pinned in versions.env
#    - Updated manually during quarterly maintenance reviews for FDA compliance
# 3. Security updates are enabled automatically if vulnerability alerts are on
# 4. Align this with quarterly maintenance-check.yml reviews
