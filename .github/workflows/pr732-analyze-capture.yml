name: PR732 Analyze Capture

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load pinned versions
        run: grep -v '^#' .github/versions.env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        working-directory: apps/daily-diary/clinical_diary
        run: flutter pub get

      - name: Analyze smoke test
        working-directory: apps/daily-diary/clinical_diary
        run: flutter analyze integration_test/firebase_test_lab_smoke_test.dart
