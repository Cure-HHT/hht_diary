name: PR732 Analyze Capture

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load pinned versions
        run: grep -v '^#' .github/versions.env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install dependencies
        working-directory: apps/daily-diary/clinical_diary
        run: flutter pub get >/dev/null

      - name: Analyze smoke test
        working-directory: apps/daily-diary/clinical_diary
        shell: bash
        run: |
          set -o pipefail
          flutter analyze --no-pub integration_test/firebase_test_lab_smoke_test.dart 2>&1 | tee analyzer-output.txt

      - name: Upload analyzer output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr732-analyzer-output-${{ github.sha }}
          path: apps/daily-diary/clinical_diary/analyzer-output.txt
          retention-days: 1
