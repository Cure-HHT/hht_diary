# SonarCloud CI-based analysis.
#
# PREREQUISITES before this can run green (all admin steps, do once):
#   1. Merge Cure-HHT/hht_workflows `setup-pub-git-auth` action, then pin the two
#      `Cure-HHT/hht_workflows/...@<sha>` refs below to its merged commit SHA.
#   2. Install the ops-bot GitHub App on Cure-HHT/event_sourcing (contents:read).
#   3. Authorize hht_diary CI's Doppler OIDC identity to read the App key, and
#      set the DOPPLER_* repo vars + the OPS_BOT_APP_* secret names to match the
#      Doppler config (adjust the `with:`/`env:` names below if they differ).
#   4. Add the SONAR_TOKEN repo secret (SonarCloud -> My Account -> Security).
#   5. Disable "Automatic Analysis" in the SonarCloud project (Administration ->
#      Analysis Method) — CI analysis is rejected while it is on.
name: SonarCloud

on:
  push:
    branches: [main]
  pull_request:

permissions:
  id-token: write   # Doppler OIDC exchange (doppler-oidc-auth)
  contents: read

jobs:
  sonar:
    name: Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history: accurate new-code period & blame

      # 1. Fetch the ops-bot App key from Doppler via OIDC (no static token).
      - uses: Cure-HHT/hht_workflows/.github/actions/doppler-oidc-auth@main
        with:
          doppler_identity_id: ${{ vars.SONAR_DOPPLER_IDENTITY_ID }}
          doppler_project: ${{ vars.SONAR_DOPPLER_PROJECT }}
          doppler_config: ${{ vars.SONAR_DOPPLER_CONFIG }}

      # 2. Mint the App token + rewrite git@ URLs so pub can resolve the private
      #    event_sourcing deps. App key arrives as masked env vars from step 1.
      - uses: Cure-HHT/hht_workflows/.github/actions/setup-pub-git-auth@main
        with:
          app_id: ${{ env.OPS_BOT_APP_ID }}
          app_private_key: ${{ env.OPS_BOT_APP_PRIVATE_KEY }}

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. Resolve deps so the Dart analyzer sees package:event_sourcing/... .
      - name: pub get (clinical_diary)
        working-directory: apps/daily-diary/clinical_diary
        run: flutter pub get
      - name: pub get (diary_shared_model)
        working-directory: apps/common-dart/diary_shared_model
        run: dart pub get

      # 4. Scan. SONAR_TOKEN authenticates to SonarCloud; sonar-project.properties
      #    carries projectKey/organization/sources.
      - uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
