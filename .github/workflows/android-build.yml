# IMPLEMENTS REQUIREMENTS:
#   REQ-d00006: Mobile App Build and Release Process
#   REQ-o00043: Automated Deployment Pipeline

name: Android Build & Store Artifact

on:
  # Auto-triggers on merge to main when app code changes.
  # Both Android and iOS workflows trigger in parallel — this is intentional
  # for continuous deployment (Android → Play Store internal/draft, iOS → TestFlight internal).
  push:
    branches: [main]
    paths:
      - 'apps/daily-diary/clinical_diary/**'
      - '.github/workflows/android-build.yml'
      - '.github/versions.env'
  workflow_dispatch:
    inputs:
      flavor:
        description: "Build flavor"
        required: true
        type: choice
        options:
          - dev
          - qa
          - uat
      track:
        description: "Google Play track"
        required: true
        type: choice
        default: "internal"
        options:
          - internal
          - alpha
          - beta
          - production
      status:
        description: "Release status for Google Play"
        required: true
        type: choice
        default: "completed"
        options:
          - draft
          - completed
          - inProgress
          - halted

permissions:
  contents: read
  id-token: write

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Skip auto-deploy on Dependabot-merge commits. Their PRs come in waves
    # and each squash-merge would otherwise trigger a Play Store upload for
    # a small dep bump. The merge commit's message preserves the PR title
    # ("[Dependabot](deps): Bump …"), so a startsWith check is the most
    # reliable signal across squash-merge / rebase / human-merger paths.
    # `workflow_dispatch` and non-push events have no head_commit, so the
    # `|| ''` fallback lets manual triggers always run.
    if: ${{ !startsWith(github.event.head_commit.message || '', '[Dependabot]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load pinned versions
        run: |
          grep -v '^#' .github/versions.env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Resolve build inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FLAVOR="${{ inputs.flavor }}"
            TRACK="${{ inputs.track }}"
            STATUS="${{ inputs.status }}"
          else
            # push to main → continuous deployment defaults
            FLAVOR="dev"
            TRACK="internal"
            STATUS="draft"
          fi
          # UAT Play Console listing is in "Draft app" state; the API rejects
          # any release whose status isn't "draft" while the listing is unpublished.
          # Remove this override once the UAT listing is published past Draft.
          if [ "$FLAVOR" = "uat" ] && [ "$STATUS" != "draft" ]; then
            echo "::notice::Coercing status '$STATUS' -> 'draft' for UAT (Play Console listing is still Draft)"
            STATUS="draft"
          fi
          if [ -z "$FLAVOR" ] || [ -z "$TRACK" ] || [ -z "$STATUS" ]; then
            echo "::error::flavor/track/status is empty (flavor=$FLAVOR track=$TRACK status=$STATUS)"
            exit 1
          fi
          echo "flavor=$FLAVOR" >> "$GITHUB_OUTPUT"
          echo "track=$TRACK" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('apps/daily-diary/clinical_diary/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Pre-install CMake
        run: |
          SDK="${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}"
          if [ ! -d "$SDK/cmake/${ANDROID_CMAKE_VERSION}" ]; then
            yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
            yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --install "cmake;${ANDROID_CMAKE_VERSION}" > /dev/null 2>&1
          else
            echo "CMake ${ANDROID_CMAKE_VERSION} already installed, skipping."
          fi

      - name: Install Flutter dependencies
        working-directory: apps/daily-diary/clinical_diary
        run: flutter pub get

      - name: Run Flutter analyze
        working-directory: apps/daily-diary/clinical_diary
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: apps/daily-diary/clinical_diary
        run: flutter test

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' apps/daily-diary/clinical_diary/pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION"

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Build signed Android ${{ steps.inputs.outputs.flavor }}
        working-directory: apps/daily-diary/clinical_diary
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: ${{ secrets.DOPPLER_PROJECT }}
          FLAVOR: ${{ steps.inputs.outputs.flavor }}
        run: |
          doppler run \
            --project "$DOPPLER_PROJECT" \
            --config "$FLAVOR" \
            -- bash "./tool/build_android_${FLAVOR}_signed.sh"

      - name: Determine artifact path
        id: artifact
        env:
          FLAVOR: ${{ steps.inputs.outputs.flavor }}
          VERSION: ${{ steps.version.outputs.version }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}
        run: |
          # UAT Play Store listing requires AAB; dev/qa accept APK.
          if [ "$FLAVOR" = "uat" ]; then
            echo "path=apps/daily-diary/clinical_diary/build/app/outputs/bundle/uatRelease/app-uat-release.aab" >> "$GITHUB_OUTPUT"
            echo "name=clinical-diary-uat-${VERSION}-${SHORT_SHA}.aab" >> "$GITHUB_OUTPUT"
          else
            echo "path=apps/daily-diary/clinical_diary/build/app/outputs/flutter-apk/app-${FLAVOR}-release.apk" >> "$GITHUB_OUTPUT"
            echo "name=clinical-diary-${FLAVOR}-${VERSION}-${SHORT_SHA}.apk" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.name }}
          path: ${{ steps.artifact.outputs.path }}
          retention-days: 90

      - name: Determine package name
        id: package
        env:
          FLAVOR: ${{ steps.inputs.outputs.flavor }}
        run: |
          echo "name=org.anspar.curehht.app.${FLAVOR}" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ${{ vars.GCP_SA_EMAIL }}
          create_credentials_file: true

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.gcp-auth.outputs.credentials_file_path }}
          packageName: ${{ steps.package.outputs.name }}
          releaseFiles: ${{ steps.artifact.outputs.path }}
          track: ${{ steps.inputs.outputs.track }}
          status: ${{ steps.inputs.outputs.status }}

      - name: Build summary
        env:
          FLAVOR: ${{ steps.inputs.outputs.flavor }}
          TRACK: ${{ steps.inputs.outputs.track }}
          STATUS: ${{ steps.inputs.outputs.status }}
          VERSION: ${{ steps.version.outputs.version }}
          PACKAGE: ${{ steps.package.outputs.name }}
          ARTIFACT: ${{ steps.artifact.outputs.name }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}
          ACTOR: ${{ github.actor }}
        run: |
          {
            echo "### Android Build & Play Store Upload Complete"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Flavor** | $FLAVOR |"
            echo "| **Version** | $VERSION |"
            echo "| **Package** | $PACKAGE |"
            echo "| **Artifact** | $ARTIFACT |"
            echo "| **Play Store** | $TRACK track ($STATUS) |"
            echo "| **Commit** | $SHORT_SHA |"
            echo "| **Triggered by** | $ACTOR |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_APP_OATH_TOKEN }}
          errors: true
          payload: |
            channel: "${{ secrets.SLACK_CHANNEL_DEVOPS }}"
            text: ":robot_face: *Android Build & Play Store Upload*\n\n*Flavor:* ${{ steps.inputs.outputs.flavor }}\n*Version:* ${{ steps.version.outputs.version }}\n*Package:* ${{ steps.package.outputs.name }}\n*Play Store:* ${{ steps.inputs.outputs.track }} track (${{ steps.inputs.outputs.status }})\n*Triggered by:* ${{ github.actor }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"

      - name: Resolve Slack user for failure DM
        if: failure()
        id: slack-user
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_APP_OATH_TOKEN }}
        run: |
          # Get committer email from the git log
          EMAIL=$(git log -1 --format='%ae')

          SLACK_USER=""
          if [ -n "$EMAIL" ]; then
            SLACK_USER=$(curl -s -H "Authorization: Bearer $SLACK_TOKEN" \
              "https://slack.com/api/users.lookupByEmail?email=${EMAIL}" | jq -r '.user.id // empty')
          fi

          if [ -n "$SLACK_USER" ]; then
            echo "channel=$SLACK_USER" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not resolve Slack user for ${EMAIL:-unknown}, skipping DM"
          fi

      - name: Notify Slack on failure
        if: failure() && steps.slack-user.outputs.found == 'true'
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_APP_OATH_TOKEN }}
          errors: true
          payload: |
            channel: "${{ steps.slack-user.outputs.channel }}"
            text: ":x: *Android Build Failed*\n\n*Flavor:* ${{ steps.inputs.outputs.flavor || 'unknown' }}\n*Version:* ${{ steps.version.outputs.version || 'unknown' }}\n*Triggered by:* ${{ github.actor }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
