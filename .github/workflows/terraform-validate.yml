---
# IMPLEMENTS REQUIREMENTS:
#   REQ-o00042: Infrastructure Change Control
#   REQ-o00043: Automated Deployment Pipeline
#   REQ-o00051: Change Control and Audit Trail
#
# Terraform Plan on PR + Auto-Apply on Merge
#
# PR: Runs `terraform plan` for any changed Terraform directory.
#     Posts plan output as PR comment. Blocks merge on plan errors.
#
# Merge: Runs `terraform apply -auto-approve` for changed directories.
#     The plan was already reviewed and approved on the PR.
#
# FDA compliance: The PR approval IS the human-in-the-loop approval.
# The plan comment provides the audit trail of what was reviewed.

name: 'Terraform Plan & Apply'

on:
  pull_request:
    paths:
      - 'infrastructure/terraform/**'
  push:
    branches: [main]
    paths:
      - 'infrastructure/terraform/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment for terraform apply'
        required: true
        type: choice
        options:
          - dev
          - qa
          - uat
          - prod
      sponsor:
        description: 'Sponsor (must match tfvars filename prefix)'
        required: true
        type: string
        default: callisto4
      action:
        description: 'Plan only or apply?'
        required: true
        type: choice
        options:
          - plan
          - apply

env:
  TF_VERSION: '1.7.0'
  TF_IN_AUTOMATION: 'true'

jobs:
  # ─── Detect which Terraform directories changed ───────────────
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      sponsor_envs: ${{ steps.changes.outputs.sponsor_envs }}
      modules: ${{ steps.changes.outputs.modules }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v4
        id: changes
        with:
          filters: |
            sponsor_envs:
              - 'infrastructure/terraform/sponsor-envs/**'
            modules:
              - 'infrastructure/terraform/modules/**'

  # Note: admin-project Terraform has moved to the hht_admin repo.
  # See: https://github.com/Cure-HHT/hht_admin

  # ─── Plan: sponsor-envs (dev only) ────────────────────────────
  # Plans against the dev tfvars as a smoke test. If dev plan works,
  # the same modules will work for qa/uat/prod (same structure, similar vars).
  # Promotion to qa/uat/prod is manual via workflow_dispatch (see below).
  plan-sponsor-envs-dev:
    if: >-
      github.event_name == 'pull_request' &&
      (needs.detect-changes.outputs.sponsor_envs == 'true' ||
       needs.detect-changes.outputs.modules == 'true')
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Authenticate with Google Cloud'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.CUREHHT_ADMIN_PROJECT_NUM }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: 'Terraform Init (sponsor-envs)'
        working-directory: infrastructure/terraform/sponsor-envs
        run: |
          terraform init -input=false \
            -backend-config="bucket=cure-hht-terraform-state" \
            -backend-config="prefix=sponsor-envs/callisto4-dev"

      - name: 'Terraform Plan (callisto4-dev)'
        id: plan
        working-directory: infrastructure/terraform/sponsor-envs
        run: |
          set +e
          terraform plan -input=false -no-color \
            -var-file=sponsor-configs/callisto4-dev.tfvars \
            -out=tfplan 2>&1 | tee plan-output.txt
          EXIT_CODE=$?
          echo "exitcode=$EXIT_CODE" >> $GITHUB_OUTPUT
          exit 0
        env:
          TF_VAR_GCP_ORG_ID: ${{ vars.GCP_ORG_ID }}
          TF_VAR_DB_PASSWORD: ${{ secrets.TF_VAR_DB_PASSWORD_DEV }}
          TF_VAR_BILLING_ACCOUNT_DEV: ${{ vars.BILLING_ACCOUNT_DEV }}
          TF_VAR_BILLING_ACCOUNT_PROD: ${{ vars.BILLING_ACCOUNT_PROD }}
          TF_VAR_SLACK_INCIDENT_WEBHOOK_URL: ${{ secrets.SLACK_INCIDENT_WEBHOOK_URL }}

      - name: Build Terraform plan comment body
        id: tf-plan-comment-body
        if: always() && github.event_name == 'pull_request'
        env:
          MARKER: '<!-- pr-comment-upsert:terraform-plan -->'
          EXIT_CODE: ${{ steps.plan.outputs.exitcode }}
          ACTOR: ${{ github.actor }}
        run: |
          PLAN_FILE=infrastructure/terraform/sponsor-envs/plan-output.txt
          EXIT_CODE="${EXIT_CODE:-1}"
          if [ -f "$PLAN_FILE" ] && grep -q 'Error:' "$PLAN_FILE"; then
            STATUS='FAILED (errors in plan output)'
          elif [ "$EXIT_CODE" = '0' ]; then
            STATUS='succeeded'
          else
            STATUS="FAILED (exit code $EXIT_CODE)"
          fi
          {
            echo "$MARKER"
            echo "### Terraform Plan: \`sponsor-envs/callisto4-dev\` -- $STATUS"
            echo ""
            echo "<details><summary>Show Plan Output</summary>"
            echo ""
            echo '```hcl'
            if [ -f "$PLAN_FILE" ]; then
              head -c 60000 "$PLAN_FILE"
              echo ""
            else
              echo "(plan-output.txt not found)"
            fi
            echo '```'
            echo ""
            echo "</details>"
            echo ""
            echo "*Environment: dev (auto-apply on merge)*"
            echo "*Promotion: qa/uat/prod require manual workflow dispatch*"
            echo "*Pusher: @${ACTOR}*"
          } > /tmp/tf-plan-comment-body.md
          {
            echo "body<<TF_PLAN_COMMENT_EOF"
            cat /tmp/tf-plan-comment-body.md
            echo "TF_PLAN_COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upsert Terraform plan comment
        if: always() && github.event_name == 'pull_request'
        uses: Cure-HHT/hht_workflows/.github/actions/pr-comment-upsert@3af5c85d69d42edd65111e1f9f2bc6a101e90376  # hht_workflows main 2026-05-22
        with:
          marker: '<!-- pr-comment-upsert:terraform-plan -->'
          body: ${{ steps.tf-plan-comment-body.outputs.body }}

      - name: 'Fail on plan error'
        if: steps.plan.outputs.exitcode != '0'
        run: |
          echo "::error::Terraform plan failed with exit code ${{ steps.plan.outputs.exitcode }}"
          exit 1

  # ─── Apply: sponsor-envs dev (post-merge) ────────────────────
  apply-sponsor-envs-dev:
    # Skip auto-apply on Dependabot-merge commits — their PRs come in waves
    # and each squash-merge would otherwise terraform-apply against dev for a
    # small dep bump. Merge commit message preserves the PR title
    # ("[Dependabot](deps): …"). `workflow_dispatch` keeps the manual escape
    # hatch (via promote-sponsor-env, which doesn't gate on this).
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      !startsWith(github.event.head_commit.message, '[Dependabot]') &&
      (needs.detect-changes.outputs.sponsor_envs == 'true' ||
       needs.detect-changes.outputs.modules == 'true')
    needs: detect-changes
    runs-on: ubuntu-latest
    environment: infrastructure
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Authenticate with Google Cloud'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.CUREHHT_ADMIN_PROJECT_NUM }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: 'Terraform Init'
        working-directory: infrastructure/terraform/sponsor-envs
        run: |
          terraform init -input=false \
            -backend-config="bucket=cure-hht-terraform-state" \
            -backend-config="prefix=sponsor-envs/callisto4-dev"

      - name: 'Terraform Apply (callisto4-dev)'
        working-directory: infrastructure/terraform/sponsor-envs
        run: |
          terraform apply -input=false -auto-approve \
            -var-file=sponsor-configs/callisto4-dev.tfvars
        env:
          TF_VAR_GCP_ORG_ID: ${{ vars.GCP_ORG_ID }}
          TF_VAR_DB_PASSWORD: ${{ secrets.TF_VAR_DB_PASSWORD_DEV }}
          TF_VAR_BILLING_ACCOUNT_DEV: ${{ vars.BILLING_ACCOUNT_DEV }}
          TF_VAR_BILLING_ACCOUNT_PROD: ${{ vars.BILLING_ACCOUNT_PROD }}
          TF_VAR_SLACK_INCIDENT_WEBHOOK_URL: ${{ secrets.SLACK_INCIDENT_WEBHOOK_URL }}

      - name: 'Post apply result'
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "::notice::Terraform apply succeeded for callisto4-dev"
          else
            echo "::error::Terraform apply FAILED for callisto4-dev — manual intervention required"
          fi

  # ─── Manual Promotion: sponsor-envs (qa/uat/prod) ────────────
  # Triggered via Actions UI: workflow_dispatch with environment selector.
  # Promotion flow: dev (auto) → qa (manual) → uat (manual) → prod (manual)
  promote-sponsor-env:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: 'Validate tfvars exists'
        run: |
          TFVARS="infrastructure/terraform/sponsor-envs/sponsor-configs/${{ inputs.sponsor }}-${{ inputs.environment }}.tfvars"
          if [ ! -f "$TFVARS" ]; then
            echo "::error::tfvars file not found: $TFVARS"
            ls infrastructure/terraform/sponsor-envs/sponsor-configs/
            exit 1
          fi
          echo "Using: $TFVARS"

      - name: 'Authenticate with Google Cloud'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/${{ vars.CUREHHT_ADMIN_PROJECT_NUM }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: 'Terraform Init'
        working-directory: infrastructure/terraform/sponsor-envs
        run: |
          terraform init -input=false \
            -backend-config="bucket=cure-hht-terraform-state" \
            -backend-config="prefix=sponsor-envs/${{ inputs.sponsor }}-${{ inputs.environment }}"

      - name: 'Resolve DB password for environment'
        id: db-password
        run: |
          # Explicit per-environment secret resolution (avoids dynamic secrets[format()] pattern)
          case "${{ inputs.environment }}" in
            dev)  echo "value=${{ secrets.TF_VAR_DB_PASSWORD_DEV }}" >> $GITHUB_OUTPUT ;;
            qa)   echo "value=${{ secrets.TF_VAR_DB_PASSWORD_QA }}" >> $GITHUB_OUTPUT ;;
            uat)  echo "value=${{ secrets.TF_VAR_DB_PASSWORD_UAT }}" >> $GITHUB_OUTPUT ;;
            prod) echo "value=${{ secrets.TF_VAR_DB_PASSWORD_PROD }}" >> $GITHUB_OUTPUT ;;
            *)    echo "::error::Unknown environment: ${{ inputs.environment }}"; exit 1 ;;
          esac

      - name: 'Terraform Plan'
        id: plan
        working-directory: infrastructure/terraform/sponsor-envs
        run: |
          terraform plan -input=false -no-color \
            -var-file=sponsor-configs/${{ inputs.sponsor }}-${{ inputs.environment }}.tfvars \
            -out=tfplan 2>&1 | tee plan-output.txt
        env:
          TF_VAR_GCP_ORG_ID: ${{ vars.GCP_ORG_ID }}
          TF_VAR_DB_PASSWORD: ${{ steps.db-password.outputs.value }}
          TF_VAR_BILLING_ACCOUNT_DEV: ${{ vars.BILLING_ACCOUNT_DEV }}
          TF_VAR_BILLING_ACCOUNT_PROD: ${{ vars.BILLING_ACCOUNT_PROD }}
          TF_VAR_SLACK_INCIDENT_WEBHOOK_URL: ${{ secrets.SLACK_INCIDENT_WEBHOOK_URL }}

      - name: 'Terraform Apply'
        if: inputs.action == 'apply'
        working-directory: infrastructure/terraform/sponsor-envs
        run: terraform apply -input=false -auto-approve tfplan

      - name: 'Summary'
        if: always()
        run: |
          echo "### Terraform ${{ inputs.action }}: ${{ inputs.sponsor }}-${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "Actor: @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
