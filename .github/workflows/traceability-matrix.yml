name: Traceability Matrix

# Standalone, isolated job (CUR-1556): runs every Dart/Flutter test target once
# through `elspais checks --run-tests` and ALWAYS posts the verified-coverage
# traceability matrix. Decoupled from pr-health's success() so an unrelated gate
# failure can never hide the matrix.

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "apps/**"
      - "packages/**"
      - "tools/**"
      - "spec/**"
      - "database/**"
      - ".elspais.toml"
      - ".github/workflows/traceability-matrix.yml"
      - ".github/scripts/**"
      - ".github/versions.env"
      - "tools/dev-env/docker/**"
      - "tools/dev-env/docker-compose.yml"
      - ".github/workflows/build-ghcr-containers.yml"
      - ".github/actions/start-ci-container/**"
  workflow_dispatch:
    inputs:
      full_baseline:
        description: "CUR-1557: run ALL targets and (re)publish the :traceability-main-latest baseline image. Used by the promote-refresh guard."
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # CUR-1557: push the per-PR / baseline traceability coverage image
  actions: read # Required for gh run watch in start-ci-container
  pull-requests: write # Required to upsert the matrix comment

jobs:
  matrix:
    name: Verified-Coverage Traceability Matrix
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # CUR-1557: classify the PR diff into a run mode via changed_test_targets.py:
      #   full        -> __ALL__ : run every target (unsafe/unclassified change)
      #   matrix_only -> __NONE__: run NO tests, carry all, just regenerate matrix
      #                            (matrix-only change, e.g. spec/**)
      #   selective   -> a target list: run those (changed packages + dependents)
      # Non-PR events (workflow_dispatch, incl. the promote-refresh) -> full.
      # Fails safe to full. Emits `mode` and (for selective) `targets`.
      - name: Compute changed test targets
        id: changed
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "non-PR event -> full run"
            echo "mode=full" >> "$GITHUB_OUTPUT"; echo "targets=" >> "$GITHUB_OUTPUT"; exit 0
          fi
          git fetch --no-tags --depth=200 origin "${{ github.base_ref }}" || true
          python3 .github/scripts/changed_test_targets.py \
            --base "origin/${{ github.base_ref }}" > /tmp/affected.txt || echo "__ALL__" > /tmp/affected.txt
          if grep -qx "__ALL__" /tmp/affected.txt || [ ! -s /tmp/affected.txt ]; then
            echo "mode=full" >> "$GITHUB_OUTPUT"; echo "targets=" >> "$GITHUB_OUTPUT"
            echo "Full run (unsafe / unclassified change)."
          elif grep -qx "__NONE__" /tmp/affected.txt; then
            echo "mode=matrix_only" >> "$GITHUB_OUTPUT"; echo "targets=" >> "$GITHUB_OUTPUT"
            echo "Matrix-only: no tests run, regenerate matrix from carried baseline."
          else
            TARGETS="$(tr '\n' ' ' < /tmp/affected.txt | sed 's/  */ /g; s/^ //; s/ $//')"
            echo "mode=selective" >> "$GITHUB_OUTPUT"; echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"
            echo "Selective run: $TARGETS"
          fi

      # Cache the Dart/Flutter pub cache across runs so the bootstrap pub-get
      # doesn't re-download every target's deps each time. Keyed by all
      # pubspec.lock files (pub resolution is deterministic from the locks).
      # Lives at the repo root under .ci-pub-cache, which is bind-mounted into
      # the container at /workspace/src/.ci-pub-cache (the only host-visible path
      # the container has, so actions/cache can save it). elspais scans only
      # src/apps/packages, so .ci-pub-cache is never scanned. Scoped to THIS
      # workflow — it does not touch the shared CI compose used by 5 other jobs.
      - name: Restore pub cache
        uses: actions/cache@v4
        with:
          path: .ci-pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-
      - name: Make pub cache writable by the container user
        run: mkdir -p .ci-pub-cache && chmod -R 0777 .ci-pub-cache

      - name: Start CI container
        uses: ./.github/actions/start-ci-container
        with:
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      # CUR-1557: seed carried targets' coverage from the baseline image so a
      # selective run renders them as (baseline), not 0%. The runner's checkout
      # root is the container's bind-mounted /workspace/src, so copying into
      # apps/<target>/coverage/ here makes the files visible to elspais.
      # A missing/empty baseline -> not seeded; the run/render steps then fall
      # back to a FULL run.
      - name: Seed baseline coverage for carried targets
        id: seed
        if: steps.changed.outputs.mode == 'selective' || steps.changed.outputs.mode == 'matrix_only'
        run: |
          set -e
          IMG="ghcr.io/cure-hht/sponsor-ci:traceability-main-latest"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          if ! docker pull "$IMG" 2>/dev/null; then
            echo "no baseline image ($IMG) -> full run"
            echo "seeded=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          cid=$(docker create "$IMG")
          rm -rf /tmp/baseline && mkdir -p /tmp/baseline
          if ! docker cp "$cid:/opt/elspais/traceability/apps" /tmp/baseline/apps 2>/dev/null; then
            docker rm "$cid" >/dev/null
            echo "baseline image has no coverage tree -> full run"
            echo "seeded=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          docker rm "$cid" >/dev/null
          count=0
          while IFS= read -r cov; do
            dest="${cov#/tmp/baseline/}"   # -> apps/<target>/coverage
            mkdir -p "$dest"; cp -f "$cov"/* "$dest"/ 2>/dev/null || true
            count=$((count+1))
          done < <(find /tmp/baseline/apps -type d -name coverage)
          if [ "$count" -gt 0 ]; then
            echo "seeded $count target coverage dirs from baseline"
            echo "seeded=true" >> "$GITHUB_OUTPUT"
          else
            echo "baseline contained zero coverage dirs -> full run"
            echo "seeded=false" >> "$GITHUB_OUTPUT"
          fi

      # Bootstrap deps for the targets that will RUN — elspais --run-tests does
      # not pub get. selective -> only affected targets; matrix_only -> none (no
      # tests run); full (incl. seed-miss demotion) -> all 17.
      - name: Bootstrap target dependencies
        working-directory: tools/dev-env
        env:
          MODE: ${{ steps.changed.outputs.mode }}
          SEEDED: ${{ steps.seed.outputs.seeded }}
          AFFECTED: ${{ steps.changed.outputs.targets }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PUB_CACHE=/workspace/src/.ci-pub-cache \
            -e MODE="$MODE" -e SEEDED="$SEEDED" -e AFFECTED="$AFFECTED" ci bash -c '
            set -e
            ALL="apps/common-dart/canonical_json_jcs apps/common-dart/comms \
              apps/common-dart/diary_shared_model apps/common-dart/otel_common \
              apps/common-dart/portal_actions apps/common-dart/provenance \
              apps/common-dart/shared_functions apps/common-dart/trial_data_types \
              apps/common-flutter/diary_design_system apps/common-flutter/eq \
              apps/common-flutter/portal_screens apps/daily-diary/clinical_diary \
              apps/edc/rave-integration apps/sponsor-portal/portal_identity \
              apps/sponsor-portal/portal_server_evs apps/sponsor-portal/portal_service \
              apps/sponsor-portal/portal_ui_evs"
            # Demote to full if a seed-requiring mode had no baseline.
            if { [ "$MODE" = "selective" ] || [ "$MODE" = "matrix_only" ]; } && [ "$SEEDED" != "true" ]; then
              MODE=full; echo "no baseline seeded -> full"
            fi
            if [ "$MODE" = "matrix_only" ]; then
              echo "bootstrap (matrix-only): none"; exit 0
            elif [ "$MODE" = "selective" ] && [ -n "$AFFECTED" ]; then
              TARGETS="$AFFECTED"; echo "bootstrap (selective): $TARGETS"
            else
              TARGETS="$ALL"; echo "bootstrap (full)"
            fi
            for t in $TARGETS; do
              echo "::group::pub get $t"
              (cd "/workspace/src/$t" && flutter pub get)
              echo "::endgroup::"
            done
          '

      # Implements: DIARY-OPS-automated-test-execution/C
      - name: Run test targets through elspais
        working-directory: tools/dev-env
        env:
          MODE: ${{ steps.changed.outputs.mode }}
          SEEDED: ${{ steps.seed.outputs.seeded }}
          AFFECTED: ${{ steps.changed.outputs.targets }}
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PUB_CACHE=/workspace/src/.ci-pub-cache \
            -e MODE="$MODE" -e SEEDED="$SEEDED" -e TGT="$AFFECTED" ci bash -c '
            cd /workspace/src
            mkdir -p build-reports/combined/traceability
            # Demote to full if a seed-requiring mode had no baseline.
            if { [ "$MODE" = "selective" ] || [ "$MODE" = "matrix_only" ]; } && [ "$SEEDED" != "true" ]; then
              MODE=full
            fi
            # CUR-1557 run modes:
            #  selective   -> run only $TGT; the rest keep seeded (baseline) coverage
            #  matrix_only -> run NOTHING (checks --tests ingests the seeded results)
            #  full        -> run every target
            if [ "$MODE" = "matrix_only" ]; then
              ELSPAIS_CMD="elspais checks --tests"; echo "elspais matrix-only (no test execution)"
            elif [ "$MODE" = "selective" ] && [ -n "$TGT" ]; then
              ELSPAIS_CMD="elspais checks --run-tests --targets $TGT --tests"; echo "elspais selective: $TGT"
            else
              ELSPAIS_CMD="elspais checks --run-tests --tests"; echo "elspais full run"
            fi
            set +e
            # Tee the checks output so the comment step can read the REQ-level
            # tested/verified numbers; PIPESTATUS[0] is the elspais exit (the
            # gate signal), not tee.
            xvfb-run -a dbus-run-session -- bash -c "
              echo \"test\" | gnome-keyring-daemon --unlock
              cd /workspace/src
              $ELSPAIS_CMD
            " 2>&1 | tee build-reports/combined/traceability/checks-tests.txt
            echo ${PIPESTATUS[0]} > /workspace/src/.elspais-tests-exit
            echo "elspais checks exit: $(cat /workspace/src/.elspais-tests-exit)"
          '

      # Implements: DIARY-OPS-traceability-validation/B
      - name: Render traceability matrix
        if: always()
        working-directory: tools/dev-env
        env:
          MODE: ${{ steps.changed.outputs.mode }}
          SEEDED: ${{ steps.seed.outputs.seeded }}
          AFFECTED: ${{ steps.changed.outputs.targets }}
        run: |
          # Force the pinned elspais (+trace-view extra) at render time. The
          # ci.Dockerfile installs it, but the image build has repeatedly served
          # a STALE Docker cache layer (build step #22 reported CACHED even when
          # the Dockerfile line changed), leaving the container on an older
          # elspais without the extra. Reading the pin from versions.env (the
          # SOLE source) and installing it here makes the render independent of
          # the image-cache state; it is a fast no-op once the image is current.
          EV=$(grep -E "^ELSPAIS_VERSION=" ../../.github/versions.env | cut -d= -f2 | tr -d "[:space:]")
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e EV="$EV" -e MODE="$MODE" -e SEEDED="$SEEDED" -e TGT="$AFFECTED" ci bash -c '
            cd /workspace/src
            mkdir -p build-reports/combined/traceability
            pip3 install --no-cache-dir --break-system-packages "elspais[trace-view]==${EV}" >/dev/null 2>&1 || true
            echo "render elspais: $(elspais --version 2>/dev/null | head -1)"
            # Demote to full if a seed-requiring mode had no baseline.
            if { [ "$MODE" = "selective" ] || [ "$MODE" = "matrix_only" ]; } && [ "$SEEDED" != "true" ]; then
              MODE=full
            fi
            # CUR-1557 render provenance:
            #  selective   -> --targets $TGT : $TGT fresh, the rest (baseline)
            #  matrix_only -> --targets __matrix_only__ : a fresh set that matches
            #                 no real target, so ALL render (baseline) + the
            #                 "N/N test results from previous runs" footnote
            #  full        -> no --targets : all fresh, no baseline markers
            if [ "$MODE" = "matrix_only" ]; then
              ELSPAIS_TARGETS="--targets __matrix_only__"
            elif [ "$MODE" = "selective" ] && [ -n "$TGT" ]; then
              ELSPAIS_TARGETS="--targets $TGT"
            else
              ELSPAIS_TARGETS=""
            fi
            # The matrix md is the `summary` section + the `trace` section. We
            # run them SEPARATELY (not as the `summary trace` chain) and cat them:
            # the chain does not accept `--targets` after `trace`, whereas each
            # subcommand does, and cat(summary, trace) is byte-identical to the
            # chain output. Both get $ELSPAIS_TARGETS so the summary footnote and
            # the matrix (baseline) markers both reflect the fresh set.
            elspais summary $ELSPAIS_TARGETS --format markdown \
              -o build-reports/combined/traceability/_summary.md
            elspais trace $ELSPAIS_TARGETS --format markdown \
              -o build-reports/combined/traceability/_trace.md
            cat build-reports/combined/traceability/_summary.md \
                build-reports/combined/traceability/_trace.md \
              > build-reports/combined/traceability/traceability_matrix.md
            rm -f build-reports/combined/traceability/_summary.md build-reports/combined/traceability/_trace.md
            # Machine-readable matrix: per-requirement, assertion-level
            # tested/verified fractions + Status. Drives the comment headline
            # (Active focus) and is the parseable download artifact.
            elspais trace $ELSPAIS_TARGETS --format json \
              -o build-reports/combined/traceability/traceability.json
            # Per-requirement gap lists (uncovered/failing/...) for the
            # Active-requirement worklist in the comment.
            elspais gaps --format json \
              -o build-reports/combined/traceability/gaps.json
            # Static HTML viewer published to Pages (viewable in any browser
            # incl. mobile). Generated AFTER the --run-tests pass so the verified
            # dimension is embedded. Prefer the interactive tree (viewer
            # --static); fall back to the static matrix (trace --format html) if
            # the interactive generator hits the elspais 0.118.16 TreeRow
            # /is_unsaved bug (reproduces only in the CI daemon, not locally).
            # Both need the trace-view extra (ensured above). Non-fatal: a viewer
            # failure never blocks the matrix render or the PR comment.
            VH=build-reports/combined/traceability/viewer.html
            if ! elspais viewer --static -o "$VH" 2>/tmp/viewer.err; then
              echo "::warning::viewer --static failed ($(tail -1 /tmp/viewer.err 2>/dev/null)); falling back to trace --format html"
              elspais trace --format html -o "$VH" \
                || { echo "::warning::trace --format html also failed; skipping viewer.html"; rm -f "$VH"; }
            fi
          '

      # REQ-independent line coverage: elspais surfaces no aggregate, so compute
      # it from the lcov.info files the run produced. Sum hit/found numerically
      # (NOT lcov -a) to avoid SF:lib/... path collisions across packages.
      - name: Aggregate code coverage (lcov)
        if: always()
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c '
            cd /workspace/src
            mkdir -p build-reports/combined/coverage
            : > build-reports/combined/coverage/per-package.tsv
            tot_h=0; tot_f=0
            for t in \
              apps/common-dart/canonical_json_jcs \
              apps/common-dart/comms \
              apps/common-dart/diary_shared_model \
              apps/common-dart/otel_common \
              apps/common-dart/portal_actions \
              apps/common-dart/provenance \
              apps/common-dart/shared_functions \
              apps/common-dart/trial_data_types \
              apps/common-flutter/diary_design_system \
              apps/common-flutter/eq \
              apps/common-flutter/portal_screens \
              apps/daily-diary/clinical_diary \
              apps/edc/rave-integration \
              apps/sponsor-portal/portal_identity \
              apps/sponsor-portal/portal_server_evs \
              apps/sponsor-portal/portal_service \
              apps/sponsor-portal/portal_ui_evs; do
              f="$t/coverage/lcov.info"
              [ -f "$f" ] || continue
              nums=$(lcov --summary "$f" 2>/dev/null | sed -nE "s/.*lines[.]+: [0-9.]+% \(([0-9]+) of ([0-9]+) lines\).*/\1 \2/p")
              [ -z "$nums" ] && continue
              h=${nums% *}; fnd=${nums#* }
              pct=$(awk -v a="$h" -v b="$fnd" "BEGIN{printf \"%.1f\", (b>0)?100*a/b:0}")
              printf "%s\t%s\t%s\t%s\n" "$t" "$pct" "$h" "$fnd" >> build-reports/combined/coverage/per-package.tsv
              tot_h=$((tot_h+h)); tot_f=$((tot_f+fnd))
            done
            awk -v a="$tot_h" -v b="$tot_f" "BEGIN{printf \"TOTAL\t%.1f\t%d\t%d\n\", (b>0)?100*a/b:0, a, b}" >> build-reports/combined/coverage/per-package.tsv
            echo "--- coverage tsv ---"; cat build-reports/combined/coverage/per-package.tsv
          '

      - name: Restore workspace ownership
        if: always()
        run: sudo chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE"

      # CUR-1557: publish the complete (fresh + carried) coverage as a thin layer
      # on the sponsor-ci image callisto builds on. PR -> traceability-pr-<N> +
      # -sha-<sha> (the merge promotes pr-<N> to :traceability-main-latest).
      # full_baseline dispatch -> publish :traceability-main-latest directly
      # (the promote-refresh guard). Runs after the ownership restore so the
      # coverage files are host-readable in the docker build context.
      - name: Publish traceability coverage image
        if: always() && (github.event_name == 'pull_request' || inputs.full_baseline)
        run: |
          set -e
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          REPO="ghcr.io/cure-hht/sponsor-ci"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            REFS="$REPO:traceability-pr-${{ github.event.pull_request.number }} $REPO:traceability-sha-${{ github.event.pull_request.head.sha }}"
          else
            REFS="$REPO:traceability-main-latest"
          fi
          TAGARGS=""; for r in $REFS; do TAGARGS="$TAGARGS -t $r"; done
          docker build -f deployment/docker/traceability-coverage.Dockerfile \
            --build-arg SPONSOR_CI_IMAGE="$REPO:main-latest" $TAGARGS .
          for r in $REFS; do docker push "$r"; done
          echo "published: $REFS"

      # The repo is bind-mounted into the container (volumes: ../../:/workspace/src),
      # so after the ownership restore the matrix, coverage tsv, per-target lcov,
      # and .elspais-tests-exit are already on the host. Copy lcov into per-flag
      # names for the Codecov artifact handoff to the codecov job.
      - name: Stage per-target coverage for Codecov artifact
        if: always()
        run: |
          mkdir -p "$GITHUB_WORKSPACE/cov"
          for entry in \
            "apps/common-dart/canonical_json_jcs:canonical_json_jcs" \
            "apps/common-dart/comms:comms" \
            "apps/common-dart/diary_shared_model:diary_shared_model" \
            "apps/common-dart/otel_common:otel_common" \
            "apps/common-dart/portal_actions:portal_actions" \
            "apps/common-dart/provenance:provenance" \
            "apps/common-dart/shared_functions:shared_functions" \
            "apps/common-dart/trial_data_types:trial_data_types" \
            "apps/common-flutter/diary_design_system:diary_design_system" \
            "apps/common-flutter/eq:eq" \
            "apps/common-flutter/portal_screens:portal_screens" \
            "apps/daily-diary/clinical_diary:clinical_diary" \
            "apps/edc/rave-integration:rave_integration" \
            "apps/sponsor-portal/portal_identity:portal_identity" \
            "apps/sponsor-portal/portal_server_evs:portal_server_evs" \
            "apps/sponsor-portal/portal_service:portal_service" \
            "apps/sponsor-portal/portal_ui_evs:portal-ui-evs"; do
            path=${entry%:*}; flag=${entry#*:}
            src="$GITHUB_WORKSPACE/$path/coverage/lcov.info"
            [ -f "$src" ] && cp "$src" "$GITHUB_WORKSPACE/cov/$flag.info" || true
          done
          # Guarantee the gate file exists even if the run step never wrote it.
          [ -f "$GITHUB_WORKSPACE/.elspais-tests-exit" ] || echo "1" > "$GITHUB_WORKSPACE/.elspais-tests-exit"

      # Implements: DIARY-OPS-traceability-validation/D
      - name: Upload traceability matrix artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-reports-${{ github.sha }}
          path: build-reports/
          retention-days: 90
          if-no-files-found: ignore

      - name: Upload per-target coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: traceability-coverage-${{ github.sha }}
          path: cov/
          retention-days: 30
          if-no-files-found: ignore

      - name: Build matrix comment body
        id: body
        if: always()
        env:
          MARKER: "<!-- pr-comment-upsert:traceability-matrix -->"
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # The comment is the SUMMARY: strict Status:Active focus headline +
          # collapsible detail. The full per-requirement matrix is artifact-only
          # (traceability_matrix.md + traceability.json + viewer.html). All inputs
          # are bind-mounted, so readable on the host after the ownership restore.
          TRACE_DIR=build-reports/combined/traceability
          # Deterministic GitHub Pages URL for this PR's viewer (published by the
          # publish-viewer job below). owner must be lower-cased for the *.github.io host.
          VIEWER_URL=""
          if [ -n "$PR_NUMBER" ]; then
            OWNER_LC=$(printf '%s' "${REPO%%/*}" | tr '[:upper:]' '[:lower:]')
            VIEWER_URL="https://${OWNER_LC}.github.io/${REPO#*/}/pr-${PR_NUMBER}/viewer.html"
          fi
          if ! python3 .github/scripts/traceability_comment.py \
                --marker "$MARKER" \
                --trace "$TRACE_DIR/traceability.json" \
                --gaps "$TRACE_DIR/gaps.json" \
                --coverage-tsv build-reports/combined/coverage/per-package.tsv \
                --checks "$TRACE_DIR/checks-tests.txt" \
                --run-url "${SERVER_URL}/${REPO}/actions/runs/${RUN_ID}" \
                --viewer-url "$VIEWER_URL" \
                > /tmp/matrix-comment.md; then
            echo "::warning::traceability comment render failed; posting fallback"
            printf '%s\n## Verified-Coverage Traceability Matrix\n\nMatrix render failed this run — see job logs and the build-reports artifact.\n' \
              "$MARKER" > /tmp/matrix-comment.md
          fi
          {
            echo "body<<MATRIX_COMMENT_EOF"
            cat /tmp/matrix-comment.md
            echo "MATRIX_COMMENT_EOF"
          } >> "$GITHUB_OUTPUT"

      # Implements: DIARY-OPS-traceability-validation/C
      - name: Upsert matrix comment
        if: always() && github.event_name == 'pull_request'
        uses: Cure-HHT/hht_workflows/.github/actions/pr-comment-upsert@5f6797b6cbd6434e251539c959e418e2b4bb1b18 # hht_workflows main 2026-05-22
        with:
          marker: "<!-- pr-comment-upsert:traceability-matrix -->"
          body: ${{ steps.body.outputs.body }}

      # Implements: DIARY-OPS-automated-test-execution/F
      - name: Gate on test results
        if: always()
        run: |
          code=$(cat "$GITHUB_WORKSPACE/.elspais-tests-exit" 2>/dev/null || echo 1)
          echo "elspais --run-tests --tests exit code: $code"
          if [ "$code" != "0" ]; then
            echo "::error::One or more test targets failed. Matrix was still posted above."
            exit 1
          fi

      - name: Cleanup
        if: always()
        working-directory: tools/dev-env
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  # Implements: DIARY-OPS-automated-test-execution/D
  codecov:
    name: Codecov upload (${{ matrix.flag }})
    needs: matrix
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        flag:
          - canonical_json_jcs
          - comms
          - diary_shared_model
          - otel_common
          - portal_actions
          - provenance
          - shared_functions
          - trial_data_types
          - diary_design_system
          - eq
          - portal_screens
          - clinical_diary
          - rave_integration
          - portal_identity
          - portal_server_evs
          - portal_service
          - portal-ui-evs
    steps:
      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: traceability-coverage-${{ github.sha }}
          path: cov
        continue-on-error: true

      - name: Upload to Codecov
        if: hashFiles(format('cov/{0}.info', matrix.flag)) != ''
        uses: codecov/codecov-action@v6
        with:
          files: cov/${{ matrix.flag }}.info
          flags: ${{ matrix.flag }}
          name: ${{ matrix.flag }}-coverage
          fail_ci_if_error: false

  # Publish this PR's static viewer to the gh-pages branch (Pages source) so it
  # is viewable at https://<owner>.github.io/<repo>/pr-<n>/viewer.html — a real
  # URL that opens in any browser incl. the GitHub mobile app (Actions artifacts
  # are zip-only and unviewable on mobile). Isolated from the matrix job (which
  # runs PR test code): this job only copies a file, so contents:write is low-risk.
  # Skipped for forks (their GITHUB_TOKEN is read-only).
  publish-viewer:
    name: Publish traceability viewer to Pages
    needs: matrix
    if: >-
      always() && github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Serialize all gh-pages writes (this job across PRs + the cleanup workflow)
    # so concurrent publishes don't clobber each other.
    concurrency:
      group: gh-pages-write
      cancel-in-progress: false
    steps:
      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0

      - name: Download build-reports
        uses: actions/download-artifact@v4
        with:
          name: build-reports-${{ github.sha }}
          path: _dl
        continue-on-error: true

      - name: Publish per-PR viewer
        env:
          PR: ${{ github.event.pull_request.number }}
          SHA: ${{ github.sha }}
        run: |
          VIEWER=$(find _dl -name viewer.html | head -1)
          if [ -z "$VIEWER" ]; then
            echo "::warning::no viewer.html in build-reports artifact; skipping Pages publish"
            exit 0
          fi
          dest="pr-${PR}"
          mkdir -p "$dest"
          cp "$VIEWER" "$dest/viewer.html"
          TJ=$(find _dl -name traceability.json | head -1)
          [ -n "$TJ" ] && cp "$TJ" "$dest/traceability.json" || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$dest"
          if git diff --cached --quiet; then
            echo "viewer unchanged; nothing to publish"
            exit 0
          fi
          git commit -m "traceability viewer for PR #${PR} (${SHA})"
          # Retry: another PR's publish may have advanced gh-pages between fetch and push.
          for i in 1 2 3; do
            if git push origin gh-pages; then exit 0; fi
            git pull --rebase origin gh-pages || true
          done
          echo "::warning::could not push viewer to gh-pages after 3 attempts"
          exit 0
