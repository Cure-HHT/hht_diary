name: Append-Only Datastore Coverage

on:
  push:
    branches: [ main ]
    paths:
      - 'apps/common-dart/append_only_datastore/**'
      - '.github/workflows/append_only_datastore-coverage.yml'
      # Toolchain triggers — mirror start-ci-container/action.yml's
      # detection regex. A bump to any of these changes the runtime image
      # or pinned tool versions this coverage job consumes, so the job
      # must re-run on PRs that touch them — even if no apps/** files
      # change.
      - '.github/versions.env'
      - 'tools/dev-env/docker/**'
      - 'tools/dev-env/docker-compose.yml'
  workflow_dispatch:

jobs:
  coverage:
    name: Coverage Report
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/common-dart/append_only_datastore
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Load version pinning
        id: versions
        run: |
          source .github/versions.env
          echo "flutter_version=${FLUTTER_VERSION}" >> $GITHUB_OUTPUT
        working-directory: ${{ github.workspace }}
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '${{ steps.versions.outputs.flutter_version }}'
          channel: 'stable'
      
      - name: Install dependencies
        run: flutter pub get
      
      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      
      - name: Run tests with coverage
        run: |
          chmod +x tool/coverage.sh
          ./tool/coverage.sh
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: apps/common-dart/append_only_datastore/coverage/lcov.info
          flags: append_only_datastore
          name: append-only-datastore-coverage
          fail_ci_if_error: false
