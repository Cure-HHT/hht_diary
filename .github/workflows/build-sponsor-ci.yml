---
# Shared sponsor-ci image build
# Phase A: core repo publishes a source+dependencies image for sponsor repos to inherit

name: Build sponsor-ci

on:
  push:
    branches:
      - main
    paths:
      - 'apps/common-dart/**'
      - 'apps/edc/**'
      - 'apps/sponsor-portal/**'
      - 'apps/daily-diary/**'
      - 'deployment/docker/sponsor-ci.Dockerfile'
      - 'deployment/docker/portal-server-binary.Dockerfile'
      - 'deployment/docker/diary-server-binary.Dockerfile'
      - '.github/workflows/build-sponsor-ci.yml'
      - '.github/versions.env'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'melos.yaml'
      - 'analysis_options.yaml'
      - 'dart_test.yaml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version to tag (example: v1.2.3)'
        required: false
        default: ''

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: cure-hht/sponsor-ci
  PORTAL_IMAGE: cure-hht/portal-server
  DIARY_IMAGE: cure-hht/diary-server

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-sponsor-ci:
    name: Build sponsor-ci image
    runs-on: ubuntu-22.04

    outputs:
      image_tag: ${{ steps.parse.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.parse.outputs.version }}
      short_sha: ${{ steps.parse.outputs.short_sha }}

    steps:
      - name: Free up disk space
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk space before cleanup:"
          df -h
          docker image prune -af
          docker container prune -f
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: parse
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          IS_DISPATCH=false
          IS_MAIN_PUSH=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            RAW_TAG="${{ github.event.inputs.version }}"
            IS_DISPATCH=true
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RAW_TAG="${GITHUB_REF#refs/tags/}"
          else
            RAW_TAG="${SHORT_SHA}"
            IS_MAIN_PUSH=true
          fi

          VERSION="${RAW_TAG#v}"
          TAGS="${REGISTRY}/${IMAGE_PREFIX}:${VERSION}, ${REGISTRY}/${IMAGE_PREFIX}:${SHORT_SHA}"

          if [ "$IS_MAIN_PUSH" = "true" ]; then
            TAGS="${TAGS}, ${REGISTRY}/${IMAGE_PREFIX}:main-latest"
          fi

          if [ "$IS_DISPATCH" = "true" ]; then
            TAGS="${TAGS}, ${REGISTRY}/${IMAGE_PREFIX}:manual"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=main-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push sponsor-ci image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/sponsor-ci.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.parse.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}:buildcache,mode=max
          provenance: true
          sbom: true

  sign-and-sbom:
    name: Sign image and attach SBOM
    runs-on: ubuntu-22.04
    needs: [build-sponsor-ci]

    outputs:
      attestation_status: ${{ steps.attest.outputs.attestation_status }}

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign sponsor-ci image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}@${{ needs.build-sponsor-ci.outputs.image_digest }}"
          cosign sign --yes "$IMAGE"

      - name: Generate SBOM for sponsor-ci image
        shell: bash
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}@${{ needs.build-sponsor-ci.outputs.image_digest }}"
          syft "$IMAGE" \
            -o spdx-json \
            --file sponsor-ci-sbom.spdx.json

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sponsor-ci-sbom-${{ github.sha }}
          path: sponsor-ci-sbom.spdx.json
          retention-days: 90

      - name: Attach SBOM attestation to sponsor-ci image with retry
        id: attest
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}@${{ needs.build-sponsor-ci.outputs.image_digest }}"
          max_attempts=5
          attempt=1
          success=false

          while true; do
            echo "SBOM attestation attempt ${attempt}/${max_attempts} for ${IMAGE}"

            if cosign attest --yes \
              --predicate sponsor-ci-sbom.spdx.json \
              --type spdxjson \
              "$IMAGE"; then
              echo "SBOM attestation succeeded on attempt ${attempt}"
              success=true
              break
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::warning::SBOM attestation failed after ${max_attempts} attempts. Continuing pipeline without blocking build."
              break
            fi

            sleep_seconds=$((attempt * 15))
            echo "SBOM attestation failed on attempt ${attempt}; retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
            attempt=$((attempt + 1))
          done

          if [ "$success" = true ]; then
            echo "attestation_status=success" >> "$GITHUB_OUTPUT"
          else
            echo "attestation_status=failed" >> "$GITHUB_OUTPUT"
          fi

      - name: Add attestation note to job summary
        shell: bash
        run: |
          {
            echo "## SBOM Attestation"
            echo ""
            echo "- Status: \`${{ steps.attest.outputs.attestation_status }}\`"
            if [ "${{ steps.attest.outputs.attestation_status }}" = "failed" ]; then
              echo "- Note: Rekor upload did not succeed after retry attempts; image build and SBOM artifact were still preserved."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  validate-sponsor-ci:
    name: Validate sponsor-ci contents
    runs-on: ubuntu-22.04
    needs: [build-sponsor-ci, sign-and-sbom]

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate expected contents
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}@${{ needs.build-sponsor-ci.outputs.image_digest }}"

          docker run --rm "$IMAGE" bash -lc '
            set -euo pipefail

            test -d /workspace/src/apps/common-dart/trial_data_types
            test -d /workspace/src/apps/common-dart/shared_functions
            test -d /workspace/src/apps/edc/rave-integration
            test -d /workspace/src/apps/sponsor-portal/portal_functions
            test -d /workspace/src/apps/sponsor-portal/portal_server
            test -d /workspace/src/apps/sponsor-portal/portal-ui
            test -d /workspace/src/apps/daily-diary/diary_functions
            test -d /workspace/src/apps/daily-diary/diary_server

            test ! -d /workspace/src/sponsor-content
            test ! -f /workspace/src/apps/sponsor-portal/portal_server/bin/server
            test ! -d /workspace/src/apps/sponsor-portal/portal-ui/build/web
          '

      - name: Generate summary
        shell: bash
        run: |
          {
            echo "# sponsor-ci Build Summary"
            echo ""
            echo "**Event**: ${{ github.event_name }}"
            echo "**Branch**: ${{ github.ref_name }}"
            echo "**Commit**: ${{ github.sha }}"
            echo ""
            echo "## Published image"
            echo ""
            echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}@${{ needs.build-sponsor-ci.outputs.image_digest }}\`"
            echo "- Version: \`${{ needs.build-sponsor-ci.outputs.version }}\`"
            echo "- Short SHA: \`${{ needs.build-sponsor-ci.outputs.short_sha }}\`"
            echo ""
            echo "## Validation"
            echo ""
            echo "- Contains shared source and resolved dependencies"
            echo "- Excludes sponsor content"
            echo "- Excludes compiled binaries"
            echo "- Excludes built web artifacts"
            echo "- Image signed with Cosign"
            echo "- SBOM generated with Syft"
            echo "- SBOM attestation status: \`${{ needs.sign-and-sbom.outputs.attestation_status }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Build portal-server binary image ─────────────────────────
  build-portal-server:
    name: Build portal-server binary
    runs-on: ubuntu-22.04
    needs: [build-sponsor-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push portal-server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/portal-server-binary.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PORTAL_IMAGE }}:${{ needs.build-sponsor-ci.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.PORTAL_IMAGE }}:main-latest
          build-args: |
            SPONSOR_CI_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}@${{ needs.build-sponsor-ci.outputs.image_digest }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.PORTAL_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.PORTAL_IMAGE }}:buildcache,mode=max

  # ─── Build diary-server binary image ──────────────────────────
  build-diary-server:
    name: Build diary-server binary
    runs-on: ubuntu-22.04
    needs: [build-sponsor-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push diary-server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/diary-server-binary.Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.DIARY_IMAGE }}:${{ needs.build-sponsor-ci.outputs.short_sha }}
            ${{ env.REGISTRY }}/${{ env.DIARY_IMAGE }}:main-latest
          build-args: |
            SPONSOR_CI_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}@${{ needs.build-sponsor-ci.outputs.image_digest }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.DIARY_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.DIARY_IMAGE }}:buildcache,mode=max
