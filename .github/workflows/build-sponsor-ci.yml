---
# Shared sponsor-ci image build
# Phase A: core repo publishes a source+dependencies image for sponsor repos to inherit
#
# Image signing + SBOM attestation moved to the UAT/prod deploy gate in
# hht_diary_callisto (deploy-cloud-run-service-callisto.yml, attest-image
# job). Push-to-main builds publish images here; they are signed and
# attested against Sigstore/Rekor only at UAT/prod promotion.

name: Build sponsor-ci

on:
  push:
    branches:
      - main
    paths:
      - 'apps/common-dart/**'
      - 'apps/common-flutter/**'
      - 'apps/edc/**'
      - 'apps/sponsor-portal/**'
      - 'apps/daily-diary/**'
      - 'deployment/docker/sponsor-ci.Dockerfile'
      - 'deployment/docker/portal-server-binary.Dockerfile'
      - '.github/workflows/build-sponsor-ci.yml'
      - '.github/versions.env'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - 'melos.yaml'
      - 'analysis_options.yaml'
      - 'dart_test.yaml'
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional version to tag (example: v1.2.3)'
        required: false
        default: ''
      source_ref:
        description: "Informational: the ref being hotfix-built (e.g. baseline/2026-06). The actual build uses the dispatched ref."
        type: string
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: cure-hht/sponsor-ci
  PORTAL_IMAGE: cure-hht/portal-server

permissions:
  contents: read
  packages: write

jobs:
  build-sponsor-ci:
    name: Build sponsor-ci image
    runs-on: ubuntu-22.04

    outputs:
      image_tag: ${{ steps.parse.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      version: ${{ steps.parse.outputs.version }}
      short_sha: ${{ steps.parse.outputs.short_sha }}
      is_main_push: ${{ steps.parse.outputs.is_main_push }}

    steps:
      - name: Free up disk space
        shell: bash
        run: |
          set -euo pipefail
          echo "Disk space before cleanup:"
          df -h
          docker image prune -af
          docker container prune -f
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: parse
        shell: bash
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          IS_DISPATCH=false
          IS_MAIN_PUSH=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            RAW_TAG="${{ github.event.inputs.version }}"
            IS_DISPATCH=true
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            RAW_TAG="${GITHUB_REF#refs/tags/}"
          else
            RAW_TAG="${SHORT_SHA}"
          fi

          # `main-latest` is the floating pointer for the main line ONLY. Publish it
          # solely on a real push to main — never on a tag build or a hotfix
          # workflow_dispatch (which builds from a baseline branch and would
          # otherwise overwrite main's image).
          if [ "${{ github.event_name }}" = "push" ] && [ "$GITHUB_REF" = "refs/heads/main" ]; then
            IS_MAIN_PUSH=true
          fi

          VERSION="${RAW_TAG#v}"
          # Always include an immutable sha-<short> tag so hotfix builds are addressable by digest,
          # independent of any version-change gate (DIARY-OPS-hotfix-source-recovery/A).
          TAGS="${REGISTRY}/${IMAGE_PREFIX}:${VERSION}, ${REGISTRY}/${IMAGE_PREFIX}:${SHORT_SHA}, ${REGISTRY}/${IMAGE_PREFIX}:sha-${SHORT_SHA}"

          if [ "$IS_MAIN_PUSH" = "true" ]; then
            TAGS="${TAGS}, ${REGISTRY}/${IMAGE_PREFIX}:main-latest"
          fi

          if [ "$IS_DISPATCH" = "true" ]; then
            TAGS="${TAGS}, ${REGISTRY}/${IMAGE_PREFIX}:manual"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "is_main_push=${IS_MAIN_PUSH}" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=main-latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      # Implements: DIARY-OPS-build-deploy-primitives/A  (single source SHA -> single image, no env identity)
      # Implements: DIARY-OPS-hotfix-source-recovery/A+B (build is exactly the dispatched ref; no main merge)
      - name: Build and push sponsor-ci image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/sponsor-ci.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.parse.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}:buildcache,mode=max

  validate-sponsor-ci:
    name: Validate sponsor-ci contents
    runs-on: ubuntu-22.04
    needs: [build-sponsor-ci]

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate expected contents
        shell: bash
        run: |
          set -euo pipefail

          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}@${{ needs.build-sponsor-ci.outputs.image_digest }}"

          docker run --rm "$IMAGE" bash -lc '
            set -euo pipefail

            test -d /workspace/src/apps/common-dart/trial_data_types
            test -d /workspace/src/apps/common-dart/shared_functions
            test -d /workspace/src/apps/common-dart/diary_shared_model
            test -d /workspace/src/apps/common-dart/portal_actions
            test -d /workspace/src/apps/edc/rave-integration
            test -d /workspace/src/apps/sponsor-portal/portal_identity
            test -d /workspace/src/apps/sponsor-portal/portal_service
            test -d /workspace/src/apps/sponsor-portal/portal_server_evs
            test -d /workspace/src/apps/sponsor-portal/portal_ui_evs

            test ! -d /workspace/src/sponsor-content
            test ! -d /workspace/src/apps/sponsor-portal/portal_ui_evs/build/web
          '

      - name: Generate summary
        shell: bash
        run: |
          {
            echo "# sponsor-ci Build Summary"
            echo ""
            echo "**Event**: ${{ github.event_name }}"
            echo "**Branch**: ${{ github.ref_name }}"
            echo "**Commit**: ${{ github.sha }}"
            echo ""
            echo "## Published image"
            echo ""
            echo "- Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}@${{ needs.build-sponsor-ci.outputs.image_digest }}\`"
            echo "- Version: \`${{ needs.build-sponsor-ci.outputs.version }}\`"
            echo "- Short SHA: \`${{ needs.build-sponsor-ci.outputs.short_sha }}\`"
            echo ""
            echo "## Validation"
            echo ""
            echo "- Contains shared source and resolved dependencies"
            echo "- Excludes sponsor content"
            echo "- Excludes compiled binaries"
            echo "- Excludes built web artifacts"
            echo "- Signing and SBOM attestation occur at the UAT/prod deploy gate in hht_diary_callisto."
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Build portal-server binary image ─────────────────────────
  build-portal-server:
    name: Build portal-server binary
    runs-on: ubuntu-22.04
    needs: [build-sponsor-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build-gate: rebuild the binary ONLY when portal_server_evs's version
      # string changed vs the published main-latest. The pre-commit hook bumps
      # that version (+N, and patch on code change) iff the binary's tracked
      # inputs changed (project-defs.sh) — so "version unchanged" means "same
      # bytes", and rebuilding would just mint a confusingly-new artifact id for
      # an identical binary. Realizes the invariant: new build <=> new +N.
      # On skip, main-latest already points at the current binary (untouched),
      # and we intentionally do NOT mint a <short_sha> tag for this commit —
      # the sha tag only exists for commits that actually produced a binary.
      #
      # DISPATCH OVERRIDE: on workflow_dispatch (hotfix path) we ALWAYS force
      # needs_build=true regardless of the version comparison. The sponsor
      # hotfix-deploy.yml requires a portal-server image digest built from the
      # exact dispatched ref; without a build on dispatch the binary would never
      # be pushed and the hotfix would be unbuildable.
      # Implements: DIARY-OPS-hotfix-source-recovery/A
      - name: Gate - rebuild only if portal_server_evs version changed
        id: gate
        run: |
          set -euo pipefail
          # Hotfix dispatches must always rebuild from the dispatched ref so that
          # a commit-addressable :sha-<short> tag is minted for portal-server.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=portal-server gate::workflow_dispatch detected - forcing rebuild to mint addressable tag for hotfix deploy."
            exit 0
          fi
          SRC=$(grep '^version:' apps/sponsor-portal/portal_server_evs/pubspec.yaml | sed 's/version: //')
          echo "source    portal_server_evs=$SRC"
          PUB=""
          if docker pull -q "${{ env.REGISTRY }}/${{ env.PORTAL_IMAGE }}:main-latest" >/dev/null 2>&1; then
            cid=$(docker create "${{ env.REGISTRY }}/${{ env.PORTAL_IMAGE }}:main-latest")
            PUB=$(docker cp "$cid:/app/VERSIONS" - 2>/dev/null | tar -xOf - 2>/dev/null | sed -n 's/^portal_server_evs=//p' || true)
            docker rm "$cid" >/dev/null 2>&1 || true
          fi
          echo "published portal_server_evs=${PUB:-<none>}"
          if [ -n "$PUB" ] && [ "$PUB" = "$SRC" ]; then
            echo "needs_build=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=portal-server gate::Version unchanged ($SRC) - skipping binary rebuild; main-latest already current."
          else
            echo "needs_build=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=portal-server gate::Version changed (${PUB:-none} -> $SRC) - rebuilding binary."
          fi

      # Read the diary mobile-app version from the full repo checkout (the
      # sponsor-ci image carries a TRIMMED source set without clinical_diary, so
      # it must be passed in as a build-arg, not grepped inside the image).
      - name: Read diary app version
        id: diary
        if: steps.gate.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          VER=$(grep '^version:' apps/daily-diary/clinical_diary/pubspec.yaml | sed 's/version: //')
          echo "diary_app_version=${VER:-unknown}" >> "$GITHUB_OUTPUT"

      - name: Compute portal-server tags
        id: pstags
        if: steps.gate.outputs.needs_build == 'true'
        run: |
          set -euo pipefail
          SHORT="${{ needs.build-sponsor-ci.outputs.short_sha }}"
          {
            echo "tags<<EOF"
            echo "${REGISTRY}/${PORTAL_IMAGE}:${SHORT}"
            echo "${REGISTRY}/${PORTAL_IMAGE}:sha-${SHORT}"
            # main-latest only on a real push to main — never on a hotfix dispatch,
            # which would otherwise overwrite main's portal-server image.
            if [ "${{ needs.build-sponsor-ci.outputs.is_main_push }}" = "true" ]; then
              echo "${REGISTRY}/${PORTAL_IMAGE}:main-latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push portal-server
        if: steps.gate.outputs.needs_build == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deployment/docker/portal-server-binary.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.pstags.outputs.tags }}
          build-args: |
            SPONSOR_CI_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}@${{ needs.build-sponsor-ci.outputs.image_digest }}
            SERVER_COMMIT=${{ needs.build-sponsor-ci.outputs.short_sha }}
            DIARY_APP_VERSION=${{ steps.diary.outputs.diary_app_version }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.PORTAL_IMAGE }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.PORTAL_IMAGE }}:buildcache,mode=max
