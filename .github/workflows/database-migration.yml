# IMPLEMENTS REQUIREMENTS:
#   REQ-d00030: CI/CD Environment Parity
#
# Database Migration Validation
# Validates schema deployment, tests, and migration rollbacks using
# CI container + Docker Compose PostgreSQL sidecar.

name: Database Migration Validation

# Trigger strategy:
#   push to main  — runs unconditionally (safety net after merge)
#   pull_request  — paths-filtered (skip when irrelevant, fast iteration)
#   workflow_dispatch — runs unconditionally (manual override)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'database/**'
      - 'infrastructure/docker/db-schema-job/**'
      - '.github/workflows/database-migration.yml'
      # Toolchain triggers — mirror start-ci-container/action.yml's
      # detection regex. A bump to any of these changes the runtime image
      # or pinned tool versions this migration validation consumes
      # (notably POSTGRESQL_CLIENT_VERSION, POSTGRES_VERSION), so the
      # job must re-run on PRs that touch them — even if no database/**
      # files change.
      - '.github/versions.env'
      - 'tools/dev-env/docker/**'
      - 'tools/dev-env/docker-compose.yml'
      - '.github/workflows/build-ghcr-containers.yml'
      - '.github/actions/start-ci-container/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read
  actions: read  # Required for gh run watch in start-ci-container

jobs:
  validate-migrations:
    name: Database Migration Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check migration validation flag
        id: check-flag
        shell: bash
        run: |
          source .github/versions.env
          echo "validate=${VALIDATE_MIGRATIONS:-true}" >> $GITHUB_OUTPUT
          if [ "${VALIDATE_MIGRATIONS:-true}" = "false" ]; then
            echo "::notice::Migration validation disabled via VALIDATE_MIGRATIONS=false in versions.env"
          fi

      - name: Start CI container
        if: steps.check-flag.outputs.validate == 'true'
        uses: ./.github/actions/start-ci-container
        with:
          profile: db
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy schema
        if: steps.check-flag.outputs.validate == 'true'
        working-directory: tools/dev-env
        run: |
          echo "Deploying schema..."
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PGPASSWORD=postgres \
            ci bash -c "cd /workspace/src && psql -h postgres -U postgres -d clinical_diary_test --set ON_ERROR_STOP=1 -f database/schema.sql"
          echo "Schema deployed successfully"

      - name: Deploy triggers
        if: steps.check-flag.outputs.validate == 'true'
        working-directory: tools/dev-env
        run: |
          echo "Deploying triggers..."
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PGPASSWORD=postgres \
            ci bash -c "cd /workspace/src && psql -h postgres -U postgres -d clinical_diary_test --set ON_ERROR_STOP=1 -f database/triggers.sql"
          echo "Triggers deployed successfully"

      - name: Deploy roles
        if: steps.check-flag.outputs.validate == 'true'
        working-directory: tools/dev-env
        run: |
          echo "Deploying roles..."
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PGPASSWORD=postgres \
            ci bash -c "cd /workspace/src && psql -h postgres -U postgres -d clinical_diary_test --set ON_ERROR_STOP=1 -f database/roles.sql"
          echo "Roles deployed successfully"

      - name: Deploy RLS policies
        if: steps.check-flag.outputs.validate == 'true'
        working-directory: tools/dev-env
        run: |
          echo "Deploying RLS policies..."
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PGPASSWORD=postgres \
            ci bash -c "cd /workspace/src && psql -h postgres -U postgres -d clinical_diary_test --set ON_ERROR_STOP=1 -f database/rls_policies.sql"
          echo "RLS policies deployed successfully"

      - name: Deploy indexes
        if: steps.check-flag.outputs.validate == 'true'
        working-directory: tools/dev-env
        run: |
          echo "Deploying indexes..."
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PGPASSWORD=postgres \
            ci bash -c "cd /workspace/src && psql -h postgres -U postgres -d clinical_diary_test --set ON_ERROR_STOP=1 -f database/indexes.sql"
          echo "Indexes deployed successfully"

      - name: Deploy tamper detection
        if: steps.check-flag.outputs.validate == 'true'
        working-directory: tools/dev-env
        run: |
          echo "Deploying tamper detection (hash triggers)..."
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PGPASSWORD=postgres \
            ci bash -c "cd /workspace/src && psql -h postgres -U postgres -d clinical_diary_test --set ON_ERROR_STOP=1 -f database/tamper_detection.sql"
          echo "Tamper detection deployed successfully"

      - name: Deploy compliance verification
        if: steps.check-flag.outputs.validate == 'true'
        working-directory: tools/dev-env
        run: |
          echo "Deploying compliance verification functions..."
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PGPASSWORD=postgres \
            ci bash -c "cd /workspace/src && psql -h postgres -U postgres -d clinical_diary_test --set ON_ERROR_STOP=1 -f database/compliance_verification.sql"
          echo "Compliance verification deployed successfully"

      - name: Run database tests
        if: steps.check-flag.outputs.validate == 'true'
        working-directory: tools/dev-env
        run: |
          echo "Running database tests..."
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PGPASSWORD=postgres \
            ci bash -c "cd /workspace/src && \
              psql -h postgres -U postgres -d clinical_diary_test --set ON_ERROR_STOP=1 -f database/tests/test_audit_trail.sql && \
              psql -h postgres -U postgres -d clinical_diary_test --set ON_ERROR_STOP=1 -f database/tests/test_compliance_functions.sql"
          echo "Database tests passed"

      - name: Validate migration scripts
        if: steps.check-flag.outputs.validate == 'true'
        working-directory: tools/dev-env
        run: |
          echo "Validating migration scripts have rollbacks..."
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PGPASSWORD=postgres \
            ci bash -c '
              cd /workspace/src
              for migration in database/migrations/*.sql; do
                if [ -f "$migration" ]; then
                  filename=$(basename "$migration")
                  migration_num=$(echo "$filename" | grep -oE "^[0-9]+")

                  rollback_dir="database/migrations/rollback"
                  rollback_file="${rollback_dir}/${migration_num}_rollback.sql"

                  if [ ! -f "$rollback_file" ]; then
                    echo "ERROR: Missing rollback for $migration"
                    echo "Expected: $rollback_file"
                    exit 1
                  fi

                  echo "Testing rollback for $migration: $rollback_file"

                  if ! psql -h postgres -U postgres -d clinical_diary_test --set ON_ERROR_STOP=1 -f "$migration" > /dev/null 2>&1; then
                    echo "ERROR: Failed to apply migration $migration"
                    exit 1
                  fi

                  if ! psql -h postgres -U postgres -d clinical_diary_test --set ON_ERROR_STOP=1 -f "$rollback_file" > /dev/null 2>&1; then
                    echo "ERROR: Rollback failed for $rollback_file"
                    exit 1
                  fi

                  if ! psql -h postgres -U postgres -d clinical_diary_test --set ON_ERROR_STOP=1 -f "$migration" > /dev/null 2>&1; then
                    echo "ERROR: Failed to re-apply migration $migration after rollback"
                    exit 1
                  fi

                  echo "Rollback verified for $migration"
                fi
              done
              echo "All migrations have corresponding rollbacks and rollbacks are functional"
            '

      - name: Migration soundness gate
        # Proves the incident (stale GCS baseline) cannot recur:
        #   1. Build consolidated baseline and apply to a fresh DB (fresh-install path).
        #   2. Apply ALL migrations on top — proves baseline + migrations are mutually
        #      consistent. A migration that duplicates a baseline-included object means
        #      the object was added to the baseline source AFTER the migration was written
        #      and needs to be reconciled (one of them removed). Reports as WARNING (not
        #      hard failure) for pre-existing conflicts to avoid blocking all PRs.
        #   3. Apply all migrations a SECOND time — idempotency check. A migration that
        #      lacks IF NOT EXISTS / ON CONFLICT guards will fail here. Reports as WARNING
        #      for pre-existing non-idempotent migrations (same rationale as above).
        # Uses a separate DB (soundness_test) to not collide with clinical_diary_test.
        #
        # TODO: Harden all migrations to be re-runnable (IF NOT EXISTS / ON CONFLICT
        # guards on every CREATE / ADD CONSTRAINT). Once all migrations are idempotent,
        # promote the idempotency check to a hard failure.
        #
        # TODO (out of scope, separate deliberate dev-workflow change): Freeze schema
        # source files and stop hand-editing schema.sql / the other baseline source
        # files directly. Instead regenerate the committed baseline via pg_dump after
        # every schema source change. This makes the baseline the canonical truth and
        # eliminates the "stale bucket" class of incident entirely. Tracked separately.
        if: steps.check-flag.outputs.validate == 'true'
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PGPASSWORD=postgres \
            ci bash -c '
              set -euo pipefail
              cd /workspace/src

              echo "=== Soundness gate: creating fresh soundness_test database ==="
              psql -h postgres -U postgres -c "CREATE DATABASE soundness_test"

              echo ""
              echo "=== Step 1: Build consolidated baseline and apply to fresh DB ==="
              bash database/tool/consolidate-schema.sh /tmp/soundness-init-consolidated.sql
              psql -h postgres -U postgres -d soundness_test \
                --set ON_ERROR_STOP=1 \
                -f /tmp/soundness-init-consolidated.sql > /dev/null
              echo "Baseline applied successfully (fresh-install path OK)"

              echo ""
              echo "=== Step 2: Apply all migrations on top of fresh baseline ==="
              baseline_conflicts=()
              for migration in database/migrations/[0-9]*.sql; do
                base=$(basename "$migration")
                if ! psql -h postgres -U postgres -d soundness_test \
                    --set ON_ERROR_STOP=1 -f "$migration" > /dev/null 2>&1; then
                  baseline_conflicts+=("$base")
                  echo "WARNING (baseline conflict): $base already covered by baseline"
                else
                  echo "OK (first pass): $base"
                fi
              done

              if [ ${#baseline_conflicts[@]} -eq 0 ]; then
                echo "All migrations applied cleanly on top of baseline"
              else
                echo ""
                echo "::warning::${#baseline_conflicts[@]} migration(s) conflict with the baseline (objects already exist)."
                echo "These migrations must be reconciled: remove the duplicate from the migration or from the baseline source files."
                for m in "${baseline_conflicts[@]}"; do echo "  WARNING: $m"; done
              fi

              echo ""
              echo "=== Step 3: Apply all migrations a second time (idempotency check) ==="
              non_idempotent=()
              for migration in database/migrations/[0-9]*.sql; do
                base=$(basename "$migration")
                if ! psql -h postgres -U postgres -d soundness_test \
                    --set ON_ERROR_STOP=1 -f "$migration" > /dev/null 2>&1; then
                  non_idempotent+=("$base")
                  echo "WARNING (non-idempotent): $base"
                else
                  echo "OK (idempotent): $base"
                fi
              done

              if [ ${#non_idempotent[@]} -eq 0 ]; then
                echo "All migrations are idempotent"
              else
                echo ""
                echo "::warning::${#non_idempotent[@]} migration(s) are not idempotent (fail on second apply)."
                echo "Add IF NOT EXISTS / ON CONFLICT guards. See TODO in workflow."
                for m in "${non_idempotent[@]}"; do echo "  WARNING: $m"; done
              fi

              echo ""
              echo "=== Soundness gate complete ==="
            '

      - name: Test migrate runner
        if: steps.check-flag.outputs.validate == 'true'
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T \
            -e PGHOST=postgres -e PGUSER=postgres -e PGPASSWORD=postgres \
            ci bash -c 'cd /workspace/src && infrastructure/docker/db-schema-job/test/migrate_test.sh'

      - name: Cleanup
        if: always() && steps.check-flag.outputs.validate == 'true'
        working-directory: tools/dev-env
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml --profile db down -v
