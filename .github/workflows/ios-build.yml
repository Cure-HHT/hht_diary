# IMPLEMENTS REQUIREMENTS:
#   REQ-d00006: Mobile App Build and Release Process
#   REQ-o00043: Automated Deployment Pipeline

name: iOS Build & Store Artifact

on:
  # Auto-triggers on merge to main when app code changes.
  # Both Android and iOS workflows trigger in parallel — this is intentional
  # for continuous deployment (Android → Play Store internal/draft, iOS → TestFlight internal).
  push:
    branches: [main]
    paths:
      - 'apps/daily-diary/clinical_diary/**'
      - '.github/workflows/ios-build.yml'
      - '.github/versions.env'
  workflow_dispatch:
    inputs:
      flavor:
        description: "Build flavor"
        required: true
        type: choice
        options:
          - dev
          - qa
          - uat
      deployment:
        description: "Deployment target"
        required: true
        type: choice
        options:
          - internal
          - external
          - release
      release_notes:
        description: "Release notes / changelog (required for App Store release)"
        required: false
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    # Skip auto-deploy on Dependabot-merge commits. Their PRs come in waves
    # and each squash-merge would otherwise trigger an App Store Connect /
    # TestFlight upload for a small dep bump. The merge commit's message
    # preserves the PR title ("[Dependabot](deps): Bump …"), so a startsWith
    # check is the most reliable signal across squash-merge / rebase /
    # human-merger paths. `workflow_dispatch` and non-push events have no
    # head_commit, so the `|| ''` fallback lets manual triggers always run.
    if: ${{ !startsWith(github.event.head_commit.message || '', '[Dependabot]') }}
    runs-on: macos-26

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load pinned versions
        run: |
          grep -v '^#' .github/versions.env | grep -v '^$' >> "$GITHUB_ENV"

      - name: Resolve build inputs
        id: inputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            FLAVOR="${{ inputs.flavor }}"
            DEPLOYMENT="${{ inputs.deployment }}"
          else
            # push to main → continuous deployment defaults
            FLAVOR="dev"
            DEPLOYMENT="internal"
          fi
          if [ -z "$FLAVOR" ] || [ -z "$DEPLOYMENT" ]; then
            echo "::error::flavor or deployment is empty (flavor=$FLAVOR deployment=$DEPLOYMENT)"
            exit 1
          fi
          echo "flavor=$FLAVOR" >> "$GITHUB_OUTPUT"
          echo "deployment=$DEPLOYMENT" >> "$GITHUB_OUTPUT"

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ env.RUBY_VERSION }}
          bundler-cache: true
          working-directory: apps/daily-diary/clinical_diary/ios

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Cache pub dependencies
        uses: actions/cache@v5
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('apps/daily-diary/clinical_diary/pubspec.yaml') }}
          restore-keys: pub-${{ runner.os }}-

      - name: Install Flutter dependencies
        working-directory: apps/daily-diary/clinical_diary
        run: flutter pub get

      - name: Cache CocoaPods
        uses: actions/cache@v5
        with:
          path: apps/daily-diary/clinical_diary/ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('apps/daily-diary/clinical_diary/ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install CocoaPods dependencies
        working-directory: apps/daily-diary/clinical_diary/ios
        run: bundle exec pod install

      - name: Run Flutter analyze
        working-directory: apps/daily-diary/clinical_diary
        run: flutter analyze

      - name: Run Flutter tests
        working-directory: apps/daily-diary/clinical_diary
        run: flutter test

      - name: Extract version from pubspec.yaml
        id: version
        run: |
          VERSION=$(grep '^version:' apps/daily-diary/clinical_diary/pubspec.yaml | awk '{print $2}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "App version: $VERSION"

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Build iOS ${{ steps.inputs.outputs.flavor }} with Fastlane
        working-directory: apps/daily-diary/clinical_diary/ios
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: ${{ secrets.DOPPLER_PROJECT }}
          FLAVOR: ${{ steps.inputs.outputs.flavor }}
          DEPLOYMENT_TARGET: ${{ steps.inputs.outputs.deployment }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          doppler run \
            --project "$DOPPLER_PROJECT" \
            --config "$FLAVOR" \
            -- bundle exec fastlane "build_${FLAVOR}"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: clinical-diary-${{ steps.inputs.outputs.flavor }}-${{ steps.version.outputs.version }}-${{ steps.sha.outputs.short }}.ipa
          path: apps/daily-diary/clinical_diary/build/ios/ipa/clinical-diary-${{ steps.inputs.outputs.flavor }}.ipa
          retention-days: 90

      - name: Build summary
        env:
          FLAVOR: ${{ steps.inputs.outputs.flavor }}
          DEPLOYMENT: ${{ steps.inputs.outputs.deployment }}
          VERSION: ${{ steps.version.outputs.version }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}
          ACTOR: ${{ github.actor }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          {
            echo "### iOS Build Complete"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| **Flavor** | $FLAVOR |"
            echo "| **Deployment** | $DEPLOYMENT |"
            echo "| **Version** | $VERSION |"
            echo "| **Artifact** | clinical-diary-$FLAVOR-$VERSION-$SHORT_SHA.ipa |"
            echo "| **Commit** | $SHORT_SHA |"
            echo "| **Triggered by** | $ACTOR |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$DEPLOYMENT" = "release" ] && [ -n "$RELEASE_NOTES" ]; then
            {
              echo ""
              echo "### Release Notes"
              echo "$RELEASE_NOTES"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Resolve Slack channel from flavor
        id: slack-chan
        env:
          FLAVOR: ${{ steps.inputs.outputs.flavor }}
        run: |
          # Per-flavor routing — mirrors callisto's .github/slack-channels.yml
          # (deploy-success: dev->#dev, qa->#qa, uat->#devops). Channel
          # names are not secrets; hardcoded here for simplicity until/
          # unless a slack-channels.yml lands in this repo too.
          case "$FLAVOR" in
            dev)  CHANNEL="#dev" ;;
            qa)   CHANNEL="#qa" ;;
            uat)  CHANNEL="#devops" ;;
            prod) CHANNEL="#devops" ;;
            *)    CHANNEL="#devops" ;;
          esac
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "Slack channel for flavor '$FLAVOR': $CHANNEL"

      - name: Notify Slack on success
        if: success()
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_APP_OATH_TOKEN }}
          errors: true
          payload: |
            channel: "${{ steps.slack-chan.outputs.channel }}"
            text: ":iphone: *iOS Build Deployed*\n\n*Flavor:* ${{ steps.inputs.outputs.flavor }}\n*Deployment:* ${{ steps.inputs.outputs.deployment }}\n*Version:* ${{ steps.version.outputs.version }}\n*Triggered by:* ${{ github.actor }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"

      - name: Resolve Slack user for failure DM
        if: failure()
        id: slack-user
        env:
          SLACK_TOKEN: ${{ secrets.SLACK_APP_OATH_TOKEN }}
        run: |
          # Get committer email from the git log
          EMAIL=$(git log -1 --format='%ae')

          SLACK_USER=""
          if [ -n "$EMAIL" ]; then
            SLACK_USER=$(curl -s -H "Authorization: Bearer $SLACK_TOKEN" \
              "https://slack.com/api/users.lookupByEmail?email=${EMAIL}" | jq -r '.user.id // empty')
          fi

          if [ -n "$SLACK_USER" ]; then
            echo "channel=$SLACK_USER" >> "$GITHUB_OUTPUT"
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Could not resolve Slack user for ${EMAIL:-unknown}, skipping DM"
          fi

      - name: Notify Slack on failure
        if: failure() && steps.slack-user.outputs.found == 'true'
        uses: slackapi/slack-github-action@v3.0.3
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_APP_OATH_TOKEN }}
          errors: true
          payload: |
            channel: "${{ steps.slack-user.outputs.channel }}"
            text: ":x: *iOS Build Failed*\n\n*Flavor:* ${{ steps.inputs.outputs.flavor || 'unknown' }}\n*Version:* ${{ steps.version.outputs.version || 'unknown' }}\n*Triggered by:* ${{ github.actor }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
