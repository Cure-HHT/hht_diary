# IMPLEMENTS REQUIREMENTS:
#   REQ-o00081: Code Quality and Static Analysis (analyze job)
#   REQ-o00082: Automated Test Execution (e2e, unit, coverage jobs)
#
# CI workflow for the sponsor-portal EVS stack: portal_server_evs link/ingest
# e2e tests (hermetic, in-memory — no PostgreSQL, no Firebase emulator) plus
# portal-ui. The legacy raw-Postgres packages (portal_functions, portal_server)
# and the `database/` relational schema were retired with the EVS cutover, so
# this job no longer provisions PostgreSQL.

name: Sponsor Portal CI

permissions:
  contents: read
  packages: read
  actions: read  # Required for gh run watch in start-ci-container

# Trigger strategy:
#   push to main  — runs unconditionally (safety net after merge)
#   pull_request  — paths-filtered (skip when irrelevant, fast iteration)
#   workflow_dispatch — runs unconditionally (manual override)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'apps/sponsor-portal/**'
      - '.github/workflows/sponsor-portal-ci.yml'
      # Toolchain triggers — mirror start-ci-container/action.yml's
      # detection regex. A bump to any of these changes the runtime image
      # or pinned tool versions this CI consumes, so the job must re-run
      # on PRs that touch them — even if no apps/** files change.
      - '.github/versions.env'
      - 'tools/dev-env/docker/**'
      - 'tools/dev-env/docker-compose.yml'
      - '.github/workflows/build-ghcr-containers.yml'
      - '.github/actions/start-ci-container/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Sponsor Portal CI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start CI container
        uses: ./.github/actions/start-ci-container
        with:
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      # ---------------------------------------------------------------
      # Install dependencies
      # ---------------------------------------------------------------
      - name: Install dependencies
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal_server_evs && dart pub get
            cd /workspace/src/apps/sponsor-portal/portal-ui && flutter pub get
          "

      # ---------------------------------------------------------------
      # Static analysis
      # ---------------------------------------------------------------
      - name: Analyze portal-ui
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal-ui
            flutter analyze
          "

      # ---------------------------------------------------------------
      # Tests
      # ---------------------------------------------------------------
      # portal_server_evs link/ingest e2e: the full link-loop + relink/reconnect/
      # reactivate, idempotent redelivery, and diverse diary event types, driven
      # over the REAL /actions + /link + /ingest routers against an in-memory
      # store (hermetic — no Postgres, no Firebase emulator). Scoped to the e2e
      # files so this job stays deterministic and headless.
      - name: Run portal_server_evs link/ingest e2e tests
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal_server_evs
            dart test \
              test/link_then_ingest_e2e_test.dart \
              test/relink_loops_e2e_test.dart \
              test/ingest_idempotency_e2e_test.dart \
              test/diary_event_types_e2e_test.dart \
              test/trial_start_state_e2e_test.dart
          "

      - name: Run portal-ui unit tests
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal-ui
            flutter test
          "

      # ---------------------------------------------------------------
      # Coverage collection
      # ---------------------------------------------------------------
      - name: Run portal-ui tests with coverage
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal-ui
            flutter test --coverage
          "

      # ---------------------------------------------------------------
      # Extract coverage from container for codecov upload
      # ---------------------------------------------------------------
      - name: Restore workspace ownership
        if: always()
        run: sudo chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE"

      - name: Copy coverage from container
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c \
            "cat /workspace/src/apps/sponsor-portal/portal-ui/coverage/lcov.info" \
            > $GITHUB_WORKSPACE/portal-ui-lcov.info || true

      - name: Upload portal-ui coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: portal-ui-lcov.info
          flags: portal-ui
          fail_ci_if_error: false

      - name: Upload coverage reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sponsor-portal-coverage
          path: |
            portal-ui-lcov.info
          retention-days: 30

      # ---------------------------------------------------------------
      # Cleanup
      # ---------------------------------------------------------------
      - name: Cleanup
        if: always()
        working-directory: tools/dev-env
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
