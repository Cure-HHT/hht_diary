# IMPLEMENTS REQUIREMENTS:
#   REQ-o00081: Code Quality and Static Analysis (portal_ui_evs analyze)
#   REQ-o00082: Automated Test Execution (portal_server_evs e2e, portal_ui_evs)
#
# CI workflow for the sponsor-portal EVS stack:
#   - portal_server_evs link/ingest e2e tests (hermetic, in-memory — no
#     PostgreSQL, no Firebase emulator)
#   - portal_ui_evs (the live EVS portal UI): flutter analyze + test + coverage
# The legacy raw-Postgres packages (portal_functions, portal_server) and the
# legacy UI (portal-ui) were removed from the repo in the EVS cleanup; this
# workflow tests only the EVS stack.

name: Sponsor Portal CI

permissions:
  contents: read
  packages: read
  actions: read  # Required for gh run watch in start-ci-container

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'apps/sponsor-portal/**'
      - '.github/workflows/sponsor-portal-ci.yml'
      # Toolchain triggers — mirror start-ci-container/action.yml's detection.
      - '.github/versions.env'
      - 'tools/dev-env/docker/**'
      - 'tools/dev-env/docker-compose.yml'
      - '.github/workflows/build-ghcr-containers.yml'
      - '.github/actions/start-ci-container/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Sponsor Portal CI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start CI container
        uses: ./.github/actions/start-ci-container
        with:
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal_server_evs && dart pub get
            cd /workspace/src/apps/sponsor-portal/portal_ui_evs && flutter pub get
          "

      - name: Analyze portal_ui_evs
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal_ui_evs
            flutter analyze
          "

      - name: Cleanup
        if: always()
        working-directory: tools/dev-env
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
