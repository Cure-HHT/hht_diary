# IMPLEMENTS REQUIREMENTS:
#   REQ-o00081: Code Quality and Static Analysis (portal_ui_evs analyze)
#   REQ-o00082: Automated Test Execution (portal_server_evs e2e, portal_ui_evs)
#
# CI workflow for the sponsor-portal EVS stack:
#   - portal_server_evs link/ingest e2e tests (hermetic, in-memory — no
#     PostgreSQL, no Firebase emulator)
#   - portal_ui_evs (the live EVS portal UI): flutter analyze + test + coverage
# The legacy raw-Postgres packages (portal_functions, portal_server) and the
# legacy UI (portal-ui) were removed from the repo in the EVS cleanup; this
# workflow tests only the EVS stack.

name: Sponsor Portal CI

permissions:
  contents: read
  packages: read
  actions: read  # Required for gh run watch in start-ci-container

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'apps/sponsor-portal/**'
      - '.github/workflows/sponsor-portal-ci.yml'
      # Toolchain triggers — mirror start-ci-container/action.yml's detection.
      - '.github/versions.env'
      - 'tools/dev-env/docker/**'
      - 'tools/dev-env/docker-compose.yml'
      - '.github/workflows/build-ghcr-containers.yml'
      - '.github/actions/start-ci-container/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Sponsor Portal CI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start CI container
        uses: ./.github/actions/start-ci-container
        with:
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal_server_evs && dart pub get
            cd /workspace/src/apps/sponsor-portal/portal_ui_evs && flutter pub get
          "

      - name: Analyze portal_ui_evs
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal_ui_evs
            flutter analyze
          "

      # portal_server_evs link/ingest e2e: the full link-loop + relink/reconnect/
      # reactivate, idempotent redelivery, and diverse diary event types, driven
      # over the REAL /actions + /link + /ingest routers against an in-memory
      # store (hermetic — no Postgres, no Firebase emulator).
      - name: Run portal_server_evs link/ingest e2e tests
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal_server_evs
            dart test \
              test/link_then_ingest_e2e_test.dart \
              test/relink_loops_e2e_test.dart \
              test/ingest_idempotency_e2e_test.dart \
              test/diary_event_types_e2e_test.dart \
              test/trial_start_state_e2e_test.dart
          "

      - name: Run portal_ui_evs tests with coverage
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal_ui_evs
            mkdir -p coverage
            flutter test --machine --coverage > coverage/machine.jsonl
          "

      - name: Restore workspace ownership
        if: always()
        run: sudo chown -R $(id -u):$(id -g) "$GITHUB_WORKSPACE"

      - name: Copy coverage from container
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c \
            "cat /workspace/src/apps/sponsor-portal/portal_ui_evs/coverage/lcov.info" \
            > $GITHUB_WORKSPACE/portal-ui-evs-lcov.info || true

      - name: Ingest portal_ui_evs results into elspais
        if: always()
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src
            elspais checks --tests --lenient
          "

      - name: Upload portal_ui_evs coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: portal-ui-evs-lcov.info
          flags: portal-ui-evs
          fail_ci_if_error: false

      - name: Cleanup
        if: always()
        working-directory: tools/dev-env
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
