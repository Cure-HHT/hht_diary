# IMPLEMENTS REQUIREMENTS:
#   REQ-o00082: Automated Test Execution (portal_server_evs e2e)
#
# CI workflow for the sponsor-portal EVS stack: portal_server_evs link/ingest
# e2e tests (hermetic, in-memory — no PostgreSQL, no Firebase emulator).
# The legacy raw-Postgres packages (portal_functions, portal_server) and the
# legacy Flutter UI (portal-ui) were retired with the EVS cutover and are now
# reference-only / un-CI'd. The live EVS UI (portal_ui_evs) is not yet wired
# into CI — tracked separately.

name: Sponsor Portal CI

permissions:
  contents: read
  packages: read
  actions: read  # Required for gh run watch in start-ci-container

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'apps/sponsor-portal/**'
      - '.github/workflows/sponsor-portal-ci.yml'
      # Toolchain triggers — mirror start-ci-container/action.yml's detection.
      - '.github/versions.env'
      - 'tools/dev-env/docker/**'
      - 'tools/dev-env/docker-compose.yml'
      - '.github/workflows/build-ghcr-containers.yml'
      - '.github/actions/start-ci-container/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Sponsor Portal CI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Start CI container
        uses: ./.github/actions/start-ci-container
        with:
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal_server_evs && dart pub get
          "

      # portal_server_evs link/ingest e2e: the full link-loop + relink/reconnect/
      # reactivate, idempotent redelivery, and diverse diary event types, driven
      # over the REAL /actions + /link + /ingest routers against an in-memory
      # store (hermetic — no Postgres, no Firebase emulator).
      - name: Run portal_server_evs link/ingest e2e tests
        working-directory: tools/dev-env
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T ci bash -c "
            cd /workspace/src/apps/sponsor-portal/portal_server_evs
            dart test \
              test/link_then_ingest_e2e_test.dart \
              test/relink_loops_e2e_test.dart \
              test/ingest_idempotency_e2e_test.dart \
              test/diary_event_types_e2e_test.dart \
              test/trial_start_state_e2e_test.dart
          "

      - name: Cleanup
        if: always()
        working-directory: tools/dev-env
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
