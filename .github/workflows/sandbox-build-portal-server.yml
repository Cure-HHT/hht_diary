---
# IMPLEMENTS REQUIREMENTS:
#   REQ-d00027: Containerized Development Environments
#   REQ-d00030: CI/CD Integration
#   REQ-d00033: FDA Validation Documentation
#   REQ-d00035: Security and Compliance
#   REQ-o00043: Automated Deployment Pipeline
#   REQ-o00009: Portal Deployment Per Sponsor
#   REQ-o00052: CI/CD Pipeline for Requirement Traceability
#   REQ-o00054: Audit Trail Generation for CI/CD
#   REQ-o00049: Artifact Retention and Archival
#   REQ-p01018: Security Audit and Compliance
#
# Portal Server Docker Image Build & Publish
# SPIKE VERSION:
# - Manual run only
# - No GHCR push
# - No signing / SBOM / deploy
# - PAT-dependent sponsor collection skipped for safety

name: Build portal-server (spike)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (example: v1.2.3, v1.2.3-rc.1)'
        required: true
        default: 'v0.0.1-rc.1'
      sponsor-env:
        description: 'Callisto environment'
        required: true
        type: choice
        options:
          - dev
          - qa
          - uat
        default: dev
      tobe_deployed:
        description: 'Deploy to GCP after build (disabled in spike)'
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: cure-hht/portal-server
  DART_BASE_IMAGE: 'ghcr.io/cure-hht/dart-base:3.10.7'
  FLUTTER_IMAGE: 'ghcr.io/cure-hht/flutter-base:3.38.7'
  DEBIAN_IMAGE: 'debian:12-slim'
# Using :nonroot tag for security (DS001, DS002)
# TODO DEBIAN_IMAGE=gcr.io/distroless/cc-debian12:nonroot

permissions:
  contents: read
  

jobs:
  build-portal-server:
    name: Build portal-server Image (spike)
    runs-on: ubuntu-22.04

    outputs:
      image_tag: ${{ steps.parse.outputs.tags }}
      version: ${{ steps.parse.outputs.version }}

    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          echo "Cleaning up unnecessary files..."
          docker image prune -af
          docker container prune -f
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug workflow context
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Branch/Ref: $GITHUB_REF"
          echo "Ref name: $GITHUB_REF_NAME"
          echo "Actor: $GITHUB_ACTOR"
          echo "Event: $GITHUB_EVENT_NAME"
          echo "Requested version: ${{ github.event.inputs.version }}"
          echo "Sponsor env: ${{ github.event.inputs.sponsor-env }}"
          echo "Deploy requested: ${{ github.event.inputs.tobe_deployed }}"

      - name: Skip sponsor content collection for spike
        run: |
          echo "::notice::Skipping tools/build/collect-sponsor-content.sh for spike."
          echo "::notice::Reason: it depends on SPONSOR_REPO_PAT and cross-repo auth."
          echo "::notice::Add it back after the manual build spike succeeds."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Determine tag and validate semver
        id: parse
        run: |
          set -euo pipefail

          SHORT_SHA="${GITHUB_SHA::7}"
          RAW_TAG="${{ github.event.inputs.version }}"
          VERSION="${RAW_TAG#v}"

          SEMVER_RE='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(?:-([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?(?:\+([0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*))?$'

          if ! echo "$VERSION" | grep -Eq "$SEMVER_RE"; then
            echo "Invalid semantic version: '$RAW_TAG'. Expected MAJOR.MINOR.PATCH with optional -prerelease and +build."
            exit 1
          fi

          CORE="$(echo "$VERSION" | sed -e 's/-.*$//' -e 's/\+.*$//')"
          MAJOR="${CORE%%.*}"
          MAJOR_MINOR="$(echo "$CORE" | awk -F. '{print $1"."$2}')"

          if echo "$VERSION" | grep -Eq '[-+]'; then
            IS_RELEASE=false
          else
            IS_RELEASE=true
          fi

          DOCKER_VER="$(echo "$VERSION" | sed 's/+/-/g' | tr '[:upper:]' '[:lower:]')"
          TAG_FULL="v${VERSION}"

          TAGS="${REGISTRY}/${IMAGE_PREFIX}:${DOCKER_VER}, ${REGISTRY}/${IMAGE_PREFIX}:${SHORT_SHA}"

          if [ "$IS_RELEASE" = "true" ]; then
            TAGS="${TAGS}, ${REGISTRY}/${IMAGE_PREFIX}:${MAJOR_MINOR}, ${REGISTRY}/${IMAGE_PREFIX}:${MAJOR}, ${REGISTRY}/${IMAGE_PREFIX}:latest"
          fi

          BRANCH_TAG="$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g' | tr '[:upper:]' '[:lower:]')"
          TAGS="${TAGS}, ${REGISTRY}/${IMAGE_PREFIX}:${BRANCH_TAG}-latest"

          echo "::notice::Resolved version='$VERSION' (canonical tag='$TAG_FULL'), docker_tag='$DOCKER_VER', is_release=$IS_RELEASE"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "docker_ver=${DOCKER_VER}" >> "$GITHUB_OUTPUT"
          echo "core=${CORE}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}" >> "$GITHUB_OUTPUT"
          echo "major_minor=${MAJOR_MINOR}" >> "$GITHUB_OUTPUT"
          echo "is_release=${IS_RELEASE}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag_full=${TAG_FULL}" >> "$GITHUB_OUTPUT"
          echo "tags<<EOF" >> "$GITHUB_OUTPUT"
          printf "%s\n" "$TAGS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "version=${VERSION}"
          echo "docker_ver=${DOCKER_VER}"
          echo "core=${CORE}"
          echo "major=${MAJOR}"
          echo "major_minor=${MAJOR_MINOR}"
          echo "is_release=${IS_RELEASE}"
          echo "short_sha=${SHORT_SHA}"
          echo "tag_full=${TAG_FULL}"
          echo "tags<<EOF"
          printf "%s\n" "$TAGS"
          echo "EOF"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build portal-server image (spike, no push)
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/sponsor-portal/portal-container/Dockerfile
          platforms: linux/amd64
          build-args: |
            DART_BASE_IMAGE=${{ env.DART_BASE_IMAGE }}
            FLUTTER_IMAGE=${{ env.FLUTTER_IMAGE }}
            DEBIAN_IMAGE=${{ env.DEBIAN_IMAGE }}
          push: false
          tags: ${{ steps.parse.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}:latest
          cache-to: type=inline
          provenance: false
          sbom: false

  summary:
    name: Build Summary
    runs-on: ubuntu-22.04
    needs: [build-portal-server]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# Docker Image Build Summary (Spike)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Requested Version**: ${{ needs.build-portal-server.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Spike behavior" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ portal-server image build attempted" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ manual workflow trigger only" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ deployment disabled" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ GHCR push disabled" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ signing / SBOM / verification disabled" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ sponsor content collection skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Intended tags" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "TAGS= ${{ needs.build-portal-server.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "This spike validates workflow structure and Docker build behavior without publishing or deploying." >> $GITHUB_STEP_SUMMARY