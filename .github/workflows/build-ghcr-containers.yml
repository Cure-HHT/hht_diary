# Deferred to infra-move ticket (CUR-1451):
#   REQ-d00035: Security and Compliance
#
# Clinical Diary Docker Image Build & Publish
# Builds and publishes Docker images to GitHub Container Registry.
#
# Image signing + SBOM attestation moved to the UAT/prod deploy gate in
# hht_diary_callisto (deploy-cloud-run-service-callisto.yml, attest-image
# job). Push-to-main builds publish images here; they are signed and
# attested against Sigstore/Rekor only at UAT/prod promotion.
#
# Topology: 3 independent images from debian:12-slim (no chained builds)
#   ci      â€” All-in-one CI: build, test, lint, scan
#   devops  â€” Terraform + gcloud for cloud operations
#   audit   â€” Read-only audit: DB, cloud, code, OTS

name: Build & Publish Docker Images

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - 'tools/dev-env/docker/**'
      - 'tools/dev-env/docker-compose.yml'
      - '.github/workflows/build-ghcr-containers.yml'
      - '.github/versions.env'
  pull_request:
    paths:
      - 'tools/dev-env/docker/**'
      - 'tools/dev-env/docker-compose.yml'
      - '.github/workflows/build-ghcr-containers.yml'
      - '.github/versions.env'
  workflow_dispatch:
    inputs:
      push_to_registry:
        description: 'Push images to GitHub Container Registry'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/clinical-diary

permissions:
  contents: read
  packages: write

jobs:
  # ============================================================
  # Build CI Image â€” all-in-one: build, test, lint, scan
  # ============================================================
  build-ci:
    name: Build CI Image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          docker image prune -af
          docker container prune -f
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /usr/local/share/boost
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout code
        uses: actions/checkout@v7

      - name: Load versions
        run: |
          source .github/versions.env
          echo "FLUTTER_VERSION=$FLUTTER_VERSION" >> $GITHUB_ENV
          echo "GITLEAKS_VERSION=$GITLEAKS_VERSION" >> $GITHUB_ENV
          echo "ELSPAIS_VERSION=$ELSPAIS_VERSION" >> $GITHUB_ENV
          echo "MARKDOWNLINT_CLI_VERSION=$MARKDOWNLINT_CLI_VERSION" >> $GITHUB_ENV
          echo "NODE_MAJOR_VERSION=${NODE_MAJOR_VERSION:-$NODE_VERSION}" >> $GITHUB_ENV
          echo "CLOUD_SQL_PROXY_VERSION=${CLOUD_SQL_PROXY_VERSION:-2.14.3}" >> $GITHUB_ENV
          echo "ANDROID_CMDLINE_TOOLS_VERSION=${ANDROID_CMDLINE_TOOLS_VERSION:-11076708}" >> $GITHUB_ENV
          echo "ANDROID_BUILD_TOOLS_VERSION=${ANDROID_BUILD_TOOLS_VERSION:-34.0.0}" >> $GITHUB_ENV
          echo "ANDROID_PLATFORM_VERSION=${ANDROID_PLATFORM_VERSION:-34}" >> $GITHUB_ENV
          echo "OPENJDK_VERSION=${OPENJDK_VERSION:-$JAVA_VERSION}" >> $GITHUB_ENV
          echo "POSTGRESQL_CLIENT_VERSION=${POSTGRESQL_CLIENT_VERSION:-16}" >> $GITHUB_ENV

      - name: Downcase image prefix
        run: echo "IMAGE_PREFIX=${IMAGE_PREFIX,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ci
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch || github.event_name == 'workflow_dispatch' }}

      - name: Build and push CI image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: tools/dev-env/docker
          file: tools/dev-env/docker/ci.Dockerfile
          platforms: linux/amd64
          build-args: |
            NODE_MAJOR_VERSION=${{ env.NODE_MAJOR_VERSION }}
            FLUTTER_VERSION=${{ env.FLUTTER_VERSION }}
            GITLEAKS_VERSION=${{ env.GITLEAKS_VERSION }}
            ELSPAIS_VERSION=${{ env.ELSPAIS_VERSION }}
            MARKDOWNLINT_CLI_VERSION=${{ env.MARKDOWNLINT_CLI_VERSION }}
            CLOUD_SQL_PROXY_VERSION=${{ env.CLOUD_SQL_PROXY_VERSION }}
            ANDROID_CMDLINE_TOOLS_VERSION=${{ env.ANDROID_CMDLINE_TOOLS_VERSION }}
            ANDROID_BUILD_TOOLS_VERSION=${{ env.ANDROID_BUILD_TOOLS_VERSION }}
            ANDROID_PLATFORM_VERSION=${{ env.ANDROID_PLATFORM_VERSION }}
            OPENJDK_VERSION=${{ env.OPENJDK_VERSION }}
            POSTGRESQL_CLIENT_VERSION=${{ env.POSTGRESQL_CLIENT_VERSION }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ci:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-ci:buildcache,mode=max

  # ============================================================
  # Build DevOps Image â€” Terraform + gcloud (parallel with CI)
  # ============================================================
  build-devops:
    name: Build DevOps Image
    runs-on: ubuntu-latest

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Load versions
        run: |
          source .github/versions.env
          echo "CLOUD_SQL_PROXY_VERSION=${CLOUD_SQL_PROXY_VERSION:-2.14.3}" >> $GITHUB_ENV
          echo "POSTGRESQL_CLIENT_VERSION=${POSTGRESQL_CLIENT_VERSION:-16}" >> $GITHUB_ENV

      - name: Downcase image prefix
        run: echo "IMAGE_PREFIX=${IMAGE_PREFIX,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-devops
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch || github.event_name == 'workflow_dispatch' }}

      - name: Build and push DevOps image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: tools/dev-env/docker
          file: tools/dev-env/docker/devops.Dockerfile
          platforms: linux/amd64
          build-args: |
            CLOUD_SQL_PROXY_VERSION=${{ env.CLOUD_SQL_PROXY_VERSION }}
            POSTGRESQL_CLIENT_VERSION=${{ env.POSTGRESQL_CLIENT_VERSION }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-devops:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-devops:buildcache,mode=max

  # ============================================================
  # Build Audit Image â€” read-only tools (parallel with CI)
  # ============================================================
  build-audit:
    name: Build Audit Image
    runs-on: ubuntu-latest

    outputs:
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Load versions
        run: |
          source .github/versions.env
          echo "CLOUD_SQL_PROXY_VERSION=${CLOUD_SQL_PROXY_VERSION:-2.14.3}" >> $GITHUB_ENV
          echo "POSTGRESQL_CLIENT_VERSION=${POSTGRESQL_CLIENT_VERSION:-16}" >> $GITHUB_ENV

      - name: Downcase image prefix
        run: echo "IMAGE_PREFIX=${IMAGE_PREFIX,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-audit
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_name == github.event.repository.default_branch || github.event_name == 'workflow_dispatch' }}

      - name: Build and push Audit image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: tools/dev-env/docker
          file: tools/dev-env/docker/audit.Dockerfile
          platforms: linux/amd64
          build-args: |
            CLOUD_SQL_PROXY_VERSION=${{ env.CLOUD_SQL_PROXY_VERSION }}
            POSTGRESQL_CLIENT_VERSION=${{ env.POSTGRESQL_CLIENT_VERSION }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-audit:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-audit:buildcache,mode=max

  # ============================================================
  # Build Summary
  # ============================================================
  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    needs: [build-ci, build-devops, build-audit]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "# Docker Image Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| CI (build + test + lint + scan) | ${{ needs.build-ci.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DevOps (Terraform + gcloud) | ${{ needs.build-devops.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Audit (read-only) | ${{ needs.build-audit.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "## Published to GHCR" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Images available at: \`${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-*\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Signing and SBOM attestation occur at the UAT/prod deploy gate in hht_diary_callisto." >> $GITHUB_STEP_SUMMARY
          else
            echo "## Build Verification Only" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Pull request builds are not pushed to registry." >> $GITHUB_STEP_SUMMARY
          fi
