# =============================================================
# !!! RELAXED SONARQUBE CHECKS !!!
# =============================================================
# Project Cure-HHT_hht_diary is currently using the quality gate
#   "Relaxed - hht_diary (CUR-1310)"
# instead of the strict default. new_coverage and
# new_duplicated_lines_density gates are effectively disabled.
# See sonar-project.properties at repo root for full rationale +
# the curl recipe to restore the strict gate. Tracked in CUR-1310.
# =============================================================
name: SonarQube
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Least-privilege GITHUB_TOKEN. The scan-action only needs to read the
# source tree (actions/checkout) and post results to sonarcloud.io via
# SONAR_TOKEN; no write access to the GitHub repo is required.
permissions:
  contents: read

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      # SonarQube reads source directly; no artifact-producing build is
      # required. Resolving pub dependencies in the most-touched Dart
      # packages lets the scanner see cross-package imports and gives a
      # better signal on unused symbols / dead code. Add packages here as
      # they grow material in coverage.
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Resolve dependencies
        run: |
          set -e
          for pkg in \
              apps/daily-diary/clinical_diary \
              apps/common-dart/trial_data_types
          do
            echo "::group::flutter pub get ($pkg)"
            (cd "$pkg" && flutter pub get) \
              || (cd "$pkg" && dart pub get)
            echo "::endgroup::"
          done

      # TEMPORARY (CUR-1440): the SonarCloud scanner intermittently 403s while
      # fetching its bundled JRE (scanner.sonarcloud.io/jres/...), failing the
      # required check and blocking merges several times a day. The project is
      # also in a known relaxed/"failing" gate state (CUR-1310), so the scan is
      # not authoritative signal right now. Until CUR-1440 fixes the root cause
      # (pre-provision/cache the scanner JRE), run the scan NON-BLOCKING: capture
      # the outcome, then log a note and pass either way. REVERT when CUR-1440
      # lands (drop continue-on-error + the gate step, restore a real gate).
      - name: SonarQube Scan
        id: scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # Non-blocking gate (CUR-1440): never fail the job on a scan failure; just
      # surface it as a warning annotation so it stays visible in the run.
      - name: SonarQube result (non-blocking — CUR-1440)
        if: always()
        run: |
          if [ "${{ steps.scan.outcome }}" = "success" ]; then
            echo "SonarQube scan succeeded."
          else
            echo "::warning title=SonarQube bypassed (CUR-1440)::SonarQube scan outcome=${{ steps.scan.outcome }} — passing anyway (non-blocking stopgap; often a transient scanner JRE 403). Tracked in CUR-1440; revert when fixed."
          fi
