# Shared Configuration for GitHub Actions Workflows
# This file centralizes common values to reduce duplication and improve maintainability

# Version Configuration
versions:
  node: "20"
  python: "3.11"
  flutter: "3.19.6"

  postgres: "15"
  docker: "24"

# Path Configuration
paths:
  artifacts: ".artifacts"
  coverage: "coverage"
  test_results: "test-results"
  audit_logs: "audit-logs"

# Timeout Configuration (in minutes)
timeouts:
  build: 30
  test: 45
  deploy: 60
  migration: 10
  rollback: 5
  default: 20

# Retention Configuration (in days)
retention:
  artifacts: 30
  test_results: 90
  audit_logs: 2555  # 7 years for FDA compliance
  build_logs: 365
  deployment_logs: 2555  # 7 years for FDA compliance

# Test Configuration
testing:
  coverage_threshold: 70
  parallelism: 4
  retry_count: 2
  fail_fast: false

# Security Configuration
security:
  enable_scanning: true
  vulnerability_severity: "CRITICAL,HIGH"
  secret_scanning: true
  dependency_check: true

# Notification Configuration
notifications:
  slack_webhook: "${{ secrets.SLACK_WEBHOOK }}"
  email_on_failure: "devops@clinical-trial-diary.com"

# Matrix Strategy Templates
matrix_templates:
  sponsors:
    - acme
    - betacorp
    - gammainc
  environments:
    - development
    - staging
    - production
  platforms:
    - linux
    - macos
    - windows