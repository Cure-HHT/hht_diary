# App Manifest — hht_diary
#
# Describes Dart/Flutter projects under apps/ so that CI, pre-push hooks, and
# dev tooling can discover and run a uniform set of checks without hard-coding
# paths in each workflow.
#
# NOT exhaustive (known gap — see the note at the bottom of this file): the
# live event-sourced packages and several common-dart libraries are not yet
# inventoried here. The hand-written workflows (e.g. sponsor-portal-ci.yml) are
# the authoritative CI source today.
#
# Usage:
#   A generic CI workflow reads this file and, for each entry whose
#   `ci.trigger_paths` overlap with the changed files, runs:
#     1. pub get  (resolving local path deps first via `depends_on`)
#     2. format   (dart format --set-exit-if-changed .)
#     3. analyze  (dart analyze / flutter analyze, per `sdk_type`)
#     4. test     (unit tests)
#     5. integration_test (if enabled, with `services`)
#     6. coverage (if enabled, with threshold enforcement)
#
# Schema version lets tooling evolve without breaking older consumers.
schema_version: 1

# ---------------------------------------------------------------------------
# Pinned tool versions — single source of truth is .github/versions.env
# CI should `source .github/versions.env` and use these as defaults.
# ---------------------------------------------------------------------------
defaults:
  dart_sdk: "3.10.7"
  flutter_sdk: "3.38.7"
  flutter_channel: stable
  versions_env: .github/versions.env

# ---------------------------------------------------------------------------
# apps — one entry per pubspec.yaml
# ---------------------------------------------------------------------------
apps:

  # =========================================================================
  # Common Dart Libraries
  # =========================================================================

  - name: trial_data_types
    path: apps/common-dart/trial_data_types
    sdk_type: dart                 # dart | flutter
    dart_sdk: "^3.10.1"
    version: 0.0.1

    depends_on: []                 # no local path dependencies

    ci:
      trigger_paths:
        - apps/common-dart/trial_data_types/**
      format: true
      analyze:
        tool: dart                 # dart analyze --fatal-infos
        fatal_infos: true
      test:
        unit: true
        integration: false
        runner: dart               # dart test
        test_script: tool/test.sh
        concurrency: 10
      coverage:
        enabled: false
      services: []
      analysis_options: true

  # =========================================================================
  # EDC Integration
  # =========================================================================

  - name: rave_integration
    path: apps/edc/rave-integration
    sdk_type: dart
    dart_sdk: "^3.10.7"
    version: 0.1.0

    depends_on: []

    ci:
      trigger_paths:
        - apps/edc/rave-integration/**
      format: true
      analyze:
        tool: dart
        fatal_infos: true
      test:
        unit: true
        integration: true
        runner: dart
        test_script: tool/test.sh
      coverage:
        enabled: false
      services: []
      analysis_options: true

  # =========================================================================
  # Daily Diary
  # =========================================================================

  - name: clinical_diary
    path: apps/daily-diary/clinical_diary
    sdk_type: flutter
    dart_sdk: "^3.10.7"
    version: 0.8.11

    depends_on: []

    platforms:
      - android
      - ios
      - web
      - linux
      - macos
      - windows

    build_runner: true              # widgetbook code generation

    ci:
      trigger_paths:
        - apps/daily-diary/clinical_diary/**
      format: true
      analyze:
        tool: flutter
        fatal_infos: true
      test:
        unit: true
        integration: true
        runner: flutter
        test_script: tool/test.sh
        concurrency: 10
        integration_device: linux   # desktop integration tests via xvfb
      coverage:
        enabled: true
        threshold: 75
        codecov_flag: clinical_diary
        filter_generated:
          - "**/*.g.dart"
          - "**/*.freezed.dart"
      services:
        - type: firebase_auth_emulator
          port: 9099
          project: demo-clinical-diary
        - type: linux_desktop_deps
          packages:
            - libgtk-3-dev
            - libx11-dev
            - pkg-config
            - cmake
            - ninja-build
            - libblkid-dev
            - liblzma-dev
            - libsecret-1-dev
            - gnome-keyring
            - dbus-x11
            - xvfb
      analysis_options: true
      auto_version_bump: true       # pre-push bumps patch on source changes

  - name: diary_functions
    path: apps/daily-diary/diary_functions
    sdk_type: dart
    dart_sdk: "^3.10.7"
    version: 0.1.0

    depends_on:
      - trial_data_types            # path: ../../common-dart/trial_data_types

    # Reference-only since the EVS cutover (CUR-1170). The raw-Postgres data
    # path this served — incl. the database/ relational schema — was retired;
    # the diary now ingests into portal_server_evs. Retained for reference,
    # no longer built or tested by CI. No ci: block.
    reference_only: true

  - name: diary_server
    path: apps/daily-diary/diary_server
    sdk_type: dart
    dart_sdk: "^3.10.7"
    version: 0.1.0

    depends_on:
      - diary_functions             # path: ../diary_functions
      # transitive: trial_data_types

    # Reference-only since the EVS cutover (CUR-1170). The legacy raw-Postgres
    # diary server is superseded by device->portal_server_evs /ingest. Retained
    # for reference, no longer built or tested by CI. No ci: block.
    reference_only: true

  # =========================================================================
  # Sponsor Portal
  # =========================================================================

  - name: portal-ui
    path: apps/sponsor-portal/portal-ui
    sdk_type: flutter
    dart_sdk: "^3.10.7"
    version: 1.0.0+1

    depends_on: []

    platforms:
      - web

    ci:
      trigger_paths:
        - apps/sponsor-portal/portal-ui/**
      format: true
      analyze:
        tool: flutter
        fatal_infos: false          # uses `flutter analyze` without --fatal-infos in current CI
      test:
        unit: true
        integration: false          # portal-ui integration tests run with services in portal CI
        runner: flutter
        test_script: tool/test.sh
      coverage:
        enabled: true
        threshold: null
        codecov_flag: sponsor-portal
      services: []
      analysis_options: true

  - name: portal_functions
    path: apps/sponsor-portal/portal_functions
    sdk_type: dart
    dart_sdk: "^3.10.7"
    version: 0.1.0

    depends_on:
      - rave_integration            # path: ../../edc/rave-integration

    # Reference-only since the EVS cutover (CUR-1170). Superseded by the
    # event-sourced portal (portal_server_evs + portal_service); the raw-Postgres
    # data path incl. database/ was retired. Retained for reference, no longer
    # built or tested by CI. No ci: block.
    reference_only: true

  - name: portal_server
    path: apps/sponsor-portal/portal_server
    sdk_type: dart
    dart_sdk: "^3.10.7"
    version: 0.1.0

    depends_on:
      - portal_functions            # path: ../portal_functions
      # transitive: rave_integration

    # Reference-only since the EVS cutover (CUR-1170). Superseded by
    # portal_server_evs. Retained for reference, no longer built or tested by
    # CI. No ci: block.
    reference_only: true

# ---------------------------------------------------------------------------
# Dependency graph (for topological build order)
# ---------------------------------------------------------------------------
# CI-active leaf packages (no local deps) — can build in parallel:
#   trial_data_types, rave_integration, portal-ui, clinical_diary
#
# Reference-only since the EVS cutover (CUR-1170) — NOT built or tested by CI
# (the raw-Postgres stack incl. database/ that they depended on was retired):
#   diary_functions, diary_server, portal_functions, portal_server
#
# KNOWN GAP — not yet inventoried in this manifest (their CI lives directly in
# the hand-written workflows): the live event-sourced packages
#   portal_server_evs, portal_service, portal_ui_evs, portal_identity
#     (apps/sponsor-portal/)
#   portal_actions, diary_shared_model, event_sourcing_datastore, comms,
#   provenance, canonical_json_jcs, otel_common (apps/common-dart/)
# Reconciling this manifest to the full post-EVS package set is a separate
# follow-up (this PR only corrected the packages it changed).
#
# A CI matrix job can topologically sort `depends_on` over the CI-active
# packages to produce build order.
# ---------------------------------------------------------------------------
