        fatal_infos: true
      test:
        unit: true
        integration: false
        runner: dart
      coverage:
        enabled: false
      services: []
      analysis_options: true

  - name: portal_server_evs
    path: apps/sponsor-portal/portal_server_evs
    sdk_type: dart
    dart_sdk: "^3.5.0"
    version: 0.5.0

    depends_on:
      - portal_identity             # path: ../portal_identity
      - portal_service              # path: ../portal_service
      - portal_actions              # path: ../../common-dart/portal_actions
      - rave_integration            # path: ../../edc/rave-integration
      - diary_shared_model          # path: ../../common-dart/diary_shared_model

    # Real CI: sponsor-portal-ci.yml runs the link/ingest e2e suite against the
    # REAL /actions + /link + /ingest routers over an in-memory store. Hermetic
    # and event-sourced — no PostgreSQL, no Firebase emulator.
    ci:
      trigger_paths:
        - apps/sponsor-portal/portal_server_evs/**
        - apps/sponsor-portal/portal_identity/**
        - apps/sponsor-portal/portal_service/**
        - apps/common-dart/portal_actions/**
        - apps/common-dart/diary_shared_model/**
        - apps/edc/rave-integration/**
      format: false                 # sponsor-portal-ci does not run a format gate on this package
      analyze:
        tool: dart
        fatal_infos: false          # sponsor-portal-ci runs only the e2e suite below; no separate analyze gate today
      test:
        unit: false
        integration: true           # e2e link/ingest suite (scoped to the e2e files)
        runner: dart
        # Explicit e2e files run by sponsor-portal-ci.yml:
        e2e_tests:
          - test/link_then_ingest_e2e_test.dart
          - test/relink_loops_e2e_test.dart
          - test/ingest_idempotency_e2e_test.dart
          - test/diary_event_types_e2e_test.dart
          - test/trial_start_state_e2e_test.dart
      coverage:
        enabled: false
      services: []                  # hermetic / event-sourced — no Postgres, no Firebase
      analysis_options: true

  - name: portal_ui_evs
    path: apps/sponsor-portal/portal_ui_evs
    sdk_type: flutter
    dart_sdk: "^3.10.7"
    version: 1.4.1+15

    depends_on: []

    platforms:
      - web

    # Wired into sponsor-portal-ci.yml (CUR-1170): flutter analyze + test +
    # coverage. The live EVS portal UI — replaced the retired portal-ui.
    ci:
      trigger_paths:
        - apps/sponsor-portal/portal_ui_evs/**
      format: true
      analyze:
        tool: flutter
        fatal_infos: false          # sponsor-portal-ci runs plain `flutter analyze`
      test:
        unit: true
        integration: false
        runner: flutter
      coverage:
        enabled: true
        threshold: null
        codecov_flag: portal-ui-evs
      services: []
      analysis_options: true

# ---------------------------------------------------------------------------
# Dependency graph (for topological build order)
# ---------------------------------------------------------------------------
# Packages with REAL dedicated CI in this repo (hand-written workflows run
# format/analyze/test against them):
#   trial_data_types      -> trial_data_types-ci.yml (format, analyze, test)
#   rave_integration      -> covered as a dependency in sponsor-portal builds
#   clinical_diary        -> clinical_diary-ci.yml   (format, analyze, test+cov)
#   portal_server_evs     -> sponsor-portal-ci.yml   (link/ingest e2e suite;
#                            hermetic / event-sourced — no Postgres, no Firebase)
#   portal_ui_evs         -> sponsor-portal-ci.yml   (flutter analyze, test, cov)
#
# Packages with NO dedicated CI today — present in the source tree (and most in
# the sponsor-ci source image), checked only transitively or not at all. Their
# `ci:` blocks record analyze/test INTENT, not an existing pipeline:
#   common-dart:   canonical_json_jcs, comms, diary_shared_model,
#                  event_sourcing_datastore, grpc_health, otel_common,
#                  portal_actions, provenance, shared_functions
#   common-flutter: diary_design_system, eq
#   sponsor-portal: portal_identity, portal_service
#
# Local path-dependency edges (child -> deps), for topological build order:
#   canonical_json_jcs   -> (none)        provenance -> (none)
#   event_sourcing_datastore -> canonical_json_jcs, provenance
#   diary_shared_model   -> (none)
#   portal_actions       -> diary_shared_model
#   eq                   -> trial_data_types
#   diary_design_system  -> (none)        comms/grpc_health/otel_common/
#                                         shared_functions/portal_identity -> (none)
#   portal_service       -> portal_actions, diary_shared_model, rave_integration
#   portal_server_evs    -> portal_identity, portal_service, portal_actions,
#                           rave_integration, diary_shared_model
#   portal_ui_evs        -> (none)
#   clinical_diary       -> event_sourcing_datastore, diary_shared_model,
#                           trial_data_types, eq, diary_design_system
#
# A CI matrix job can topologically sort `depends_on` to produce build order.
# ---------------------------------------------------------------------------
