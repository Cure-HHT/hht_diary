  - name: clinical_diary
    path: apps/daily-diary/clinical_diary
    sdk_type: flutter
    dart_sdk: "^3.10.7"
    version: 0.8.11

    depends_on:
      - event_sourcing_datastore    # path: ../../common-dart/event_sourcing_datastore
      - diary_shared_model          # path: ../../common-dart/diary_shared_model
      - trial_data_types            # path: ../../common-dart/trial_data_types
      - eq                          # path: ../../common-flutter/eq
      - diary_design_system         # path: ../../common-flutter/diary_design_system

    platforms:
      - android
      - ios
      - web
      - linux
      - macos
      - windows

    build_runner: true              # widgetbook code generation

    ci:
      trigger_paths:
        - apps/daily-diary/clinical_diary/**
      format: true
      analyze:
        tool: flutter
        fatal_infos: true
      test:
        unit: true
        integration: true
        runner: flutter
        test_script: tool/test.sh
        concurrency: 10
        integration_device: linux   # desktop integration tests via xvfb
      coverage:
        enabled: true
        threshold: 75
        codecov_flag: clinical_diary
        filter_generated:
          - "**/*.g.dart"
          - "**/*.freezed.dart"
      services:
        - type: firebase_auth_emulator
          port: 9099
          project: demo-clinical-diary
        - type: linux_desktop_deps
          packages:
            - libgtk-3-dev
            - libx11-dev
            - pkg-config
            - cmake
            - ninja-build
            - libblkid-dev
            - liblzma-dev
            - libsecret-1-dev
            - gnome-keyring
            - dbus-x11
            - xvfb
      analysis_options: true
      auto_version_bump: true       # pre-push bumps patch on source changes

