    # Not yet wired to a dedicated workflow; analyze/test intent only. Resolved
    # transitively when portal_server_evs CI runs (portal_server_evs depends on
    # it), but it has no dedicated job. Hermetic / event-sourced — no Postgres.
    ci:
      trigger_paths:
        - apps/sponsor-portal/portal_service/**
        - apps/common-dart/portal_actions/**
        - apps/common-dart/diary_shared_model/**
        - apps/edc/rave-integration/**
      format: true
      analyze:
