name: diary_design_system_book
description: Widgetbook gallery for the diary_design_system shared design system. Component use cases land here as each Phase 3-6 component is implemented; designers review against Figma via this gallery before any consumer call site is touched.
publish_to: none

version: 0.1.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  diary_design_system:
    path: ../diary_design_system
  widgetbook: ^3.22.0
  # reaction_widgets is pulled in so the gallery can render a live demo of
  # the canonical `ActionBuilder` + `AppDialog` composition — the
  # design-system-only path for async dialogs (see AppDialog's doc-comment).
  # `reaction_widgets_testing` ships `FakeReaction`, explicitly marked as a
  # public deliverable for downstream consumers.
  event_sourcing:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 742e8275fe932369c76e5ac4c41bd6285a2afa1d
      path: event_sourcing
  reaction:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 742e8275fe932369c76e5ac4c41bd6285a2afa1d
      path: reaction
  reaction_widgets:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 742e8275fe932369c76e5ac4c41bd6285a2afa1d
      path: reaction_widgets
  reaction_widgets_testing:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 742e8275fe932369c76e5ac4c41bd6285a2afa1d
      path: reaction_widgets_testing

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
