name: portal_server_evs
description: "Event-sourced portal server (reaction HTTP/WS shell over portal_service). Beta rebuild of portal_server."
version: 0.3.0
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  crypto: ^3.0.7
  event_sourcing: any
  portal_identity:
    path: ../portal_identity
  portal_service:
    path: ../portal_service
  portal_actions:
    path: ../../common-dart/portal_actions
  rave_integration: any
  reaction: any
  sembast: ^3.0.0
  shelf: ^1.4.0
  shelf_router: ^1.1.0
  shelf_web_socket: ^3.0.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
