# IMPLEMENTS REQUIREMENTS:
#   REQ-d00005: Sponsor Configuration Detection Implementation
#   REQ-p00013: GDPR compliance - EU-only regions
#
# Dart conversion of Firebase Cloud Functions
# These functions run as shelf handlers in portal_server

name: portal_functions
description: CureHHT Sponsor Portal Server Side Functions
version: 0.1.42+62
publish_to: none

environment:
  sdk: ^3.10.7

dependencies:
  # HTTP
  shelf: ^1.4.2
  http: ^1.2.0

  # Database
  postgres: ^3.5.9

  # Utilities
  crypto: ^3.0.7
  meta: ^1.16.0
  uuid: ^4.5.1

  # JWT/Identity Platform
  jose: ^0.3.4

  # Gmail API for email OTP
  googleapis: ^15.0.0
  googleapis_auth: ^2.0.0

  # OpenTelemetry instrumentation
  otel_common:
    path: ../../common-dart/otel_common

  # Shared communication primitives (channels, FCM transport, PHI guard,
  # notifications domain protocol). Phase 1A.4 wires the FCM transport
  # through this package; the notifications/ domain code lights up in
  # Phase 1B when the envelope+poll path replaces direct dispatch.
  comms:
    path: ../../common-dart/comms

  # Shared server-side utilities
  shared_functions:
    path: ../../common-dart/shared_functions

  # Shared data types — StudyEvent validation, QuestionnaireInstance, etc.
  trial_data_types:
    path: ../../common-dart/trial_data_types

  # EDC Integration (RAVE)
  rave_integration:
    path: ../../edc/rave-integration

dev_dependencies:
  test: ^1.25.15
  mocktail: ^1.0.4
  # Imported directly by ~6 test files (notification_service_test,
  # portal_auth_test, participant_linking_test, integration_test/*).
  # Available transitively via otel_common but a direct declaration
  # is required by sonar:dart:S7087 and protects against an upstream
  # version bump silently breaking the test imports.
  dartastic_opentelemetry: ">=1.0.2-alpha <2.0.0"
