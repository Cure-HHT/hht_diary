<!DOCTYPE html>
<html>
<head>
  <!--
  IMPLEMENTS REQUIREMENTS:
    REQ-p00009: Sponsor-Specific Web Portals
  Note: this file historically cited REQ-d00028 ("Portal Frontend
  Framework") but the canonical spec entry for that ID is
  "Event sourcing implementation" (deprecated, unrelated). There is
  no current DEV-level frontend-framework REQ for the sponsor portal;
  the PRD is the right anchor until one lands.
  -->
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Clinical Trial Portal">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Clinical Trial Portal">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>Clinical Trial Portal</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- IMPLEMENTS REQUIREMENTS:
       REQ-p00009 (Sponsor-Specific Web Portals — bootstrap must not
                   race sponsor branding overlays; stale SW caches
                   mask new deploys)
       REQ-p01044-M (no patient data recoverable from the browser
                     after logout — SW caches could otherwise persist
                     beyond the session)
       Modern Flutter web (3.16+) generates flutter_bootstrap.js which
       owns _flutter.loader.load() internally. The previous inline
       loadEntrypoint() block plus serviceWorkerVersion=null was a
       stale-template carry-over that registered the service worker on
       a separate code path.
       Note on cited REQs: REQ-d00077-H/I/N is the spec's explicit
       "SHALL disable SW" policy but is scoped to the Web Diary
       (implements REQ-p01042). No portal-specific equivalent exists,
       so we anchor on the PRDs that genuinely apply to the portal. -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
