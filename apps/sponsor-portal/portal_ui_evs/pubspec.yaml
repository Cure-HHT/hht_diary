name: portal_ui_evs
description: "Event-sourced portal UI (reaction_widgets reactive web client over portal_server_evs). Beta rebuild of portal-ui."
publish_to: 'none'

# semver-only: bare version, no +N. The build id (+<sponsor_short_sha>) is
# stamped at image-build time by callisto's portal-final.Dockerfile.
version: 1.4.29

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  diary_design_system:
    path: ../../common-flutter/diary_design_system
  portal_screens:
    path: ../../common-flutter/portal_screens
  event_sourcing:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 742e8275fe932369c76e5ac4c41bd6285a2afa1d
      path: event_sourcing
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  # Renders the role-selection card icons from SVGs exported from the Sponsor
  # Portal Figma (assets/icons/role/). Vector assets are immune to the
  # MaterialIcons font subsetting that can blank a glyph on a web release build.
  flutter_svg: ^2.0.10
  http: ^1.2.0
  meta: ^1.16.0
  # Web-only interop (service-worker eviction, location.reload, sessionStorage)
  # behind the web_platform.dart conditional-import seam. Already resolved
  # transitively; pinned direct because web_platform_web.dart imports it.
  web: ^1.1.0
  reaction:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 742e8275fe932369c76e5ac4c41bd6285a2afa1d
      path: reaction
  reaction_widgets:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 742e8275fe932369c76e5ac4c41bd6285a2afa1d
      path: reaction_widgets

dev_dependencies:
  flutter_test:
    sdk: flutter
  reaction_widgets_testing:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 742e8275fe932369c76e5ac4c41bd6285a2afa1d
      path: reaction_widgets_testing
  flutter_lints: ^5.0.0
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
  # Font bundling moves to diary_design_system: it ships Inter as package
  # assets and buildAppTheme(AppFontFamily.inter) wires the M3 type scale
  # to it. CanvasKit no longer 404s the default Roboto because the type
  # scale never asks for Roboto in the first place.
  assets:
    # Role-card glyphs for the post-login role-selection screen, exported from
    # the Sponsor Portal Figma and recolored per role tone at render time.
    - assets/icons/role/
    - assets/icons/questionnaire/
    # Per-status action glyphs for the row-tap "Participant Actions" sheet,
    # exported from the Sponsor Portal Figma and tinted (primary / critical)
    # at render time.
    - assets/icons/participant/
    - assets/icons/curehht_logo.png
