name: portal_ui_evs
description: "Event-sourced portal UI (reaction_widgets reactive web client over portal_server_evs). Beta rebuild of portal-ui."
publish_to: 'none'

version: 1.4.1+15

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  event_sourcing:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: event_sourcing
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  http: ^1.2.0
  reaction:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: reaction
  reaction_widgets:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: reaction_widgets

dev_dependencies:
  flutter_test:
    sdk: flutter
  reaction_widgets_testing:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: reaction_widgets_testing
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  fonts:
    # Bundle Roboto (the Material default fontFamily) so the release web build
    # renders text. Without it, CanvasKit 404s on the default Roboto and text is
    # invisible. Mirrors the legacy portal-ui font bundle.
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Thin.ttf
          weight: 100
        - asset: assets/fonts/Roboto-Light.ttf
          weight: 300
        - asset: assets/fonts/Roboto-Regular.ttf
          weight: 400
        - asset: assets/fonts/Roboto-Medium.ttf
          weight: 500
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
        - asset: assets/fonts/Roboto-Black.ttf
          weight: 900
