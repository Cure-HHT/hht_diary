name: portal_ui_evs
description: "Event-sourced portal UI (reaction_widgets reactive web client over portal_server_evs). Beta rebuild of portal-ui."
publish_to: 'none'

version: 1.4.1+15

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  event_sourcing:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 4c2904f3daecf722a2d04fd788b4182caf2f074a
      path: event_sourcing
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  http: ^1.2.0
  reaction:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 4c2904f3daecf722a2d04fd788b4182caf2f074a
      path: reaction
  reaction_widgets:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 4c2904f3daecf722a2d04fd788b4182caf2f074a
      path: reaction_widgets

dev_dependencies:
  flutter_test:
    sdk: flutter
  reaction_widgets_testing:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 4c2904f3daecf722a2d04fd788b4182caf2f074a
      path: reaction_widgets_testing
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
