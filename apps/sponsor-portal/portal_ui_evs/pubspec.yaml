name: portal_ui_evs
description: "Event-sourced portal UI (reaction_widgets reactive web client over portal_server_evs). Beta rebuild of portal-ui."
publish_to: 'none'

version: 1.2.0+9

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  event_sourcing: any
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  http: ^1.2.0
  reaction: any
  reaction_widgets: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  reaction_widgets_testing: any
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
