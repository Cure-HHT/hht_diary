# IMPLEMENTS REQUIREMENTS:
#   REQ-o00056: Container infrastructure for Cloud Run
#   REQ-d00028: Portal Frontend Framework
#
# nginx configuration for Sponsor Portal.
# Serves Flutter web UI and proxies API requests to the Dart server.
# Shared http/location settings live in:
#   /etc/nginx/common-http.conf      (http-level directives)
#   /etc/nginx/common-locations.conf (shared location blocks)

# Run as non-root (matches Dockerfile USER)
pid /tmp/nginx.pid;
error_log /var/log/nginx/error.log warn;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/common-http.conf;

    server {
        # Cloud Run sets PORT env var, but nginx config is static.
        # We use 8080 externally; Dart server uses 8081 internally.
        listen 8080;
        server_name _;

        root /app/web;
        index index.html;

        # Health check - proxy to Dart server
        # Cloud Run uses this for liveness/readiness probes
        location = /health {
            proxy_pass http://dart_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        # API routes - proxy to Dart server
        location /api/ {
            proxy_pass http://dart_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for API calls
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Sponsor content at moon paths: /{sponsorId}/portal/assets/...
        # Also serves mobile assets: /{sponsorId}/mobile/assets/...
        # MUST appear BEFORE Flutter asset cache block to avoid false matches
        # on file extensions (.png, .jpg, etc.)
        location ~ ^/([a-z]+)/(portal|mobile)/assets/([a-zA-Z0-9_/.-]+)$ {
            alias /app/sponsor-content/$1/$2/assets/$3;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Fix Flutter double-assets path (Flutter builds assets/ into assets/assets/)
        # ^~ prevents regex locations (e.g. the static file extension block) from
        # overriding this prefix match — without it, .pdf/.png/etc requests fall
        # through to the regex block which lacks the double-path fallback.
        location ^~ /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri /assets$uri =404;
        }

        # Flutter web assets - cache aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Flutter service worker and manifest - no cache
        location ~* (flutter_service_worker\.js|manifest\.json)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            try_files $uri =404;
        }

        # SPA routing - serve index.html for all other routes
        # This allows Flutter's client-side router to handle navigation
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Disable access to hidden files
        location ~ /\. {
            deny all;
        }
    }
}
