# Implements: DIARY-PRD-mobile-application/A
#
# Flutter Flavorizr Configuration
# Defines app flavors for different environments with distinct:
# - Bundle IDs (allow side-by-side installation)
# - App names (visible in device launcher)
# - App icons (visual differentiation)
# - Firebase configs (separate projects per environment)
# - Custom variables (API_BASE, showDevTools, etc.)
#
# Usage:
#   flutter pub get
#   dart run flutter_flavorizr
#
# Then run with:
#   flutter run --flavor dev -t lib/main.dart
#   flutter run --flavor qa -t lib/main.dart
#   flutter run --flavor uat -t lib/main.dart
#   flutter run --flavor prod -t lib/main.dart

app:
  android:
    flavorDimensions: "environment"

flavors:
  # `local` is a Dart-side EnvProfile only — no native build config.
  # `native: false` tells `tool/build` to reject it (run-only) and tells
  # `tool/run` to fall back to the dev native flavor on mobile targets.
  # `tool/run local` defaults to Chrome; mobile devices need --api-base to
  # reach the local diary-server (deployment/local-stack on the sponsor
  # repo, default http://localhost:8081).
  #
  # The `app:` block is present because flutter_flavorizr 2.4.2 requires it
  # for schema validation; the no-native-blocks shape means flutter_flavorizr
  # generates only IDE config for this entry, not Android/iOS/macOS scaffolding.
  local:
    native: false
    app:
      name: "Diary LOCAL"

  dev:
    app:
      name: "CureHHT Tracker DEV"
    android:
      applicationId: "org.anspar.curehht.app.dev"
      icon: "assets/icons/dev/app_icon.png"
      # Output format for signed builds (apk = sideload, aab = Play Store).
      # Read by tool/build android <env> --signed. Not consumed by flutter_flavorizr.
      signedFormat: "apk"
      firebase:
        config: "android/app/src/dev/google-services.json"
    ios:
      bundleId: "org.anspar.curehht.app.dev"
      # Consumed by ios/fastlane/Fastfile (PROFILE_NAMES projection); not read
      # by flutter_flavorizr — extending the schema with an iOS-only knob.
      provisioningProfile: "ClinicalDiary_DEV_AppStore"
      icon: "assets/icons/dev/app_icon.png"
      firebase:
        config: "ios/Runner/dev/GoogleService-Info.plist"
    macos:
      bundleId: "org.anspar.curehht.app.dev"
      icon: "assets/icons/dev/app_icon.png"

  qa:
    app:
      name: "Diary QA"
    android:
      applicationId: "org.anspar.curehht.app.qa"
      icon: "assets/icons/qa/app_icon.png"
      signedFormat: "apk"
      firebase:
        config: "android/app/src/qa/google-services.json"
    ios:
      bundleId: "org.anspar.curehht.app.qa"
      provisioningProfile: "ClinicalDiary_QA_AppStore"
      icon: "assets/icons/qa/app_icon.png"
      firebase:
        config: "ios/Runner/qa/GoogleService-Info.plist"
    macos:
      bundleId: "org.anspar.curehht.app.qa"
      icon: "assets/icons/qa/app_icon.png"

  uat:
    app:
      name: "Clinical Diary"
    android:
      applicationId: "org.anspar.curehht.app.uat"
      icon: "assets/icons/uat/app_icon.png"
      signedFormat: "aab"
      firebase:
        config: "android/app/src/uat/google-services.json"
    ios:
      bundleId: "org.anspar.curehht.app.uat"
      provisioningProfile: "ClinicalDiary_UAT_AppStore"
      icon: "assets/icons/uat/app_icon.png"
      firebase:
        config: "ios/Runner/uat/GoogleService-Info.plist"
    macos:
      bundleId: "org.anspar.curehht.app.uat"
      icon: "assets/icons/uat/app_icon.png"

  prod:
    app:
      name: "Clinical Diary"
    android:
      applicationId: "org.anspar.curehht.app"
      icon: "assets/icons/prod/app_icon.png"
      signedFormat: "aab"
      firebase:
        config: "android/app/src/prod/google-services.json"
    ios:
      bundleId: "org.anspar.curehht.app"
      provisioningProfile: "ClinicalDiary_PROD_AppStore"
      icon: "assets/icons/prod/app_icon.png"
      firebase:
        config: "ios/Runner/prod/GoogleService-Info.plist"
    macos:
      bundleId: "org.anspar.curehht.app"
      icon: "assets/icons/prod/app_icon.png"

# IDE configuration - generates VS Code launch configurations
ide: "vscode"
