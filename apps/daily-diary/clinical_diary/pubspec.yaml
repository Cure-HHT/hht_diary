name: clinical_diary
description: "Clinical Diary App - REQ-d00006: Mobile App Build and Release Process"
publish_to: "none"

version: 0.9.52+130

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Event-sourcing datastore for FDA 21 CFR Part 11 compliant event sourcing.
  # KEPT during the port to act as the differential-test oracle alongside the
  # new event_sourcing stack; removed once parity is proven (CUR-1169 Integration).
  event_sourcing_datastore:
    path: ../../common-dart/event_sourcing_datastore
  # New external event-sourcing stack (Phase 0+ of the EVS lib port). Git refs so
  # the consumption branch builds without waiting on PR #649 to merge; gitignored
  # pubspec_overrides.yaml points these at local sibling clones for fast dev.
  event_sourcing:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: event_sourcing
  reaction:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: reaction
  reaction_widgets:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: reaction_widgets
  # In-tree path dep (consolidated onto this branch; single linear branch).
  diary_shared_model:
    path: ../../common-dart/diary_shared_model
  trial_data_types:
    path: ../../common-dart/trial_data_types
  eq:
    path: ../../common-flutter/eq
  common_widgets:
    path: ../../common-flutter/common_widgets

  # Sembast is required in main deps because clinical_diary_bootstrap.dart
  # accepts a sembast Database parameter (caller opens the database).
  # sembast_web provides the IndexedDB-backed factory used on web; the io
  # factory (sembast/sembast_io.dart) handles desktop and mobile.
  sembast: ^3.7.3
  sembast_web: ^2.3.0
  collection: ^1.19.1
  crypto: ^3.0.7
  dart_jsonwebtoken: ^3.3.1
  firebase_core: ^4.2.1
  firebase_messaging: ^16.1.1
  flutter_secure_storage: ^9.2.4
  flutter_timezone: ^5.0.1
  http: ^1.6.0
  intl: ^0.20.2
  package_info_plus: ^9.0.0
  path_provider: ^2.1.4
  pdfx: ^2.9.2
  shared_preferences: ^2.5.3
  sugar: ^4.0.0
  table_calendar: ^3.2.0
  url_launcher: ^6.3.2
  uuid: ^4.5.2
  timezone: ^0.10.1
  timezone_button_dropdown: ^1.0.2
  web: ^1.1.0 # For web-specific cache clearing in version updates
  connectivity_plus: ^7.1.1
  # Debug HTTP bridge — only wired in when F.appFlavor == Flavor.local
  # AND !kIsWeb (shelf needs dart:io). See lib/services/debug_bridge.dart.
  shelf: ^1.4.0
  shelf_router: ^1.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  reaction_widgets_testing:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: reaction_widgets_testing
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_flavorizr: ^2.2.3
  # Widgetbook for component catalog
  widgetbook: ^3.10.0
  widgetbook_annotation: ^3.2.0
  widgetbook_generator: ^3.9.0
  build_runner: ^2.4.13
  mocktail_image_network: ^1.2.0

# Committed git-based overrides so a clean checkout (CI, or a teammate without a
# local event_sourcing clone) resolves. The diary cutover runs the legacy
# event_sourcing_datastore (which pulls provenance/canonical_json_jcs from in-repo
# paths) ALONGSIDE the new event_sourcing stack (which pulls them from git);
# collapsing every shared package to the single git ref removes the "provenance
# from path is incompatible with provenance from git" version-solve conflict.
# Drop this block when the legacy event_sourcing_datastore dep is removed (parity
# proven, CUR-1169 Integration). The gitignored pubspec_overrides.yaml (local
# sibling clones) shadows this for fast local dev.
dependency_overrides:
  event_sourcing:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: event_sourcing
  reaction:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: reaction
  reaction_widgets:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: reaction_widgets
  reaction_widgets_testing:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: reaction_widgets_testing
  provenance:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: provenance
  canonical_json_jcs:
    git:
      url: https://github.com/Cure-HHT/event_sourcing.git
      ref: 0b20b6a3645f883c7410fb7ef891f05ae54623fb
      path: canonical_json_jcs

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/config/

    - assets/licenses/

  fonts:
    - family: OpenDyslexic
      fonts:
        - asset: assets/fonts/OpenDyslexic-Regular.otf
        - asset: assets/fonts/OpenDyslexic-Bold.otf
          weight: 700
        - asset: assets/fonts/OpenDyslexic-Italic.otf
          style: italic
        - asset: assets/fonts/OpenDyslexic-BoldItalic.otf
          weight: 700
          style: italic
    - family: AtkinsonHyperlegible
      fonts:
        - asset: assets/fonts/AtkinsonHyperlegibleNext-Regular.ttf
        - asset: assets/fonts/AtkinsonHyperlegibleNext-Bold.ttf
          weight: 700
        - asset: assets/fonts/AtkinsonHyperlegibleNext-Italic.ttf
          style: italic
        - asset: assets/fonts/AtkinsonHyperlegibleNext-BoldItalic.ttf
          weight: 700
          style: italic

# App Icon Configuration (flutter_launcher_icons)
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#FFFFFF"
    theme_color: "#C8323D"
  macos:
    generate: true
    image_path: "assets/icons/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icons/app_icon.png"
    icon_size: 48
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

# Native Splash Screen Configuration (flutter_native_splash)
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: "assets/icons/app_icon.png"
  android_12:
    color: "#FFFFFF"
    image: "assets/icons/app_icon.png"
  web: true
  ios: true
  android: true
