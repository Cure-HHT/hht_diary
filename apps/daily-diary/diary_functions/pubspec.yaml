name: diary_functions
description: Clinical Daily Diary Server Side Functions
version: 0.1.10+19
publish_to: none

environment:
  sdk: ^3.10.7

dependencies:
  # HTTP
  shelf: ^1.4.2

  # Database
  postgres: ^3.5.9

  # Utilities
  crypto: ^3.0.7

  # Observability
  otel_common:
    path: ../../common-dart/otel_common

  # Shared types
  trial_data_types:
    path: ../../common-dart/trial_data_types

  # Shared server-side utilities
  shared_functions:
    path: ../../common-dart/shared_functions

dev_dependencies:
  test: ^1.25.15
  mocktail: ^1.0.4
