# IMPLEMENTS REQUIREMENTS:
#   REQ-d00005: Sponsor Configuration Detection Implementation
#   REQ-p00013: GDPR compliance - EU-only regions
#
# Dart conversion of Firebase Cloud Functions
# These functions run as shelf handlers in diary_server

name: diary_functions
description: Clinical Daily Diary Server Side Functions
version: 0.1.18+30
publish_to: none

environment:
  sdk: ^3.10.7

dependencies:
  # HTTP
  shelf: ^1.4.2

  # Database
  postgres: ^3.5.9

  # Utilities
  crypto: ^3.0.7
  meta: ^1.16.0

  # Observability
  otel_common:
    path: ../../common-dart/otel_common

  # Shared types
  trial_data_types:
    path: ../../common-dart/trial_data_types

  # Shared server-side utilities
  shared_functions:
    path: ../../common-dart/shared_functions

  # Shared communication primitives — provides Envelope, the
  # NotificationRepository interface, and the shelf handler factories
  # for /api/v1/notifications. Phase 1B.4 mounts the read-side endpoints
  # on diary_server.
  comms:
    path: ../../common-dart/comms

dev_dependencies:
  test: ^1.25.15
  mocktail: ^1.0.4
