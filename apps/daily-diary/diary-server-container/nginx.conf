# IMPLEMENTS REQUIREMENTS:
#   REQ-o00056: Container infrastructure for Cloud Run
#   REQ-d00027: Containerized Development Environments
#
# nginx configuration for Diary Server.
# Serves sponsor content and Flutter web assets.
# Shared http/location settings live in:
#   /etc/nginx/common-http.conf      (http-level directives)
#   /etc/nginx/common-locations.conf (shared location blocks)

# Run as non-root (matches Dockerfile USER)
pid /tmp/nginx.pid;
error_log /var/log/nginx/error.log warn;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/common-http.conf;

    server {
        listen 8081;
        server_name _;

        index index.html;

        include /etc/nginx/common-locations.conf;
    }
}
