# IMPLEMENTS REQUIREMENTS:
#   REQ-d00166..REQ-d00171 (Action interface, registry, dispatcher pipeline,
#   authorization, idempotency, denial events)
#
# Trusted-boundary command/intent layer that accepts untrusted ingress,
# runs auth + authz + validation, then persists events through
# event_sourcing_datastore. ActionDispatcher implementation will add the
# event_sourcing_datastore path dep when wired.

name: audited_actions
description: "Trusted-boundary action dispatcher: auth + authz + validation + atomic event persistence + denial recording"
version: 0.0.2+1
publish_to: none

environment:
  sdk: ^3.10.7

dependencies:
  meta: ^1.16.0
  uuid: ^4.5.2

dev_dependencies:
  test: ^1.25.15
  mocktail: ^1.0.4
  lints: ^5.0.0
