# Pure-Dart shared communication library for the CureHHT diary platform.
# Holds the transport contract (Channel, DispatchResult), FCM channel impl
# (added in Phase 1A.2), the notifications domain protocol (Envelope,
# Repository interface, OutboxWriter — added in Phase 1A.3), and the
# PayloadGuard PHI checker that all senders must run before dispatch.
#
# This package is consumed by the sponsor-side server (portal_server_evs)
# and the mobile diary app (envelope client only).
# It MUST NOT depend on the Flutter SDK.

name: comms
description: Shared communication primitives (channels, compliance, notifications) for CureHHT diary platform
version: 0.0.1
publish_to: none

environment:
  sdk: ^3.10.7

dependencies:
  meta: ^1.16.0
  http: ^1.2.0
  googleapis_auth: ^2.0.0
  shelf: ^1.4.2
  shelf_router: ^1.1.4

dev_dependencies:
  test: ^1.25.15
  lints: ^5.0.0
