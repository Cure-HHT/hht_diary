name: append_only_datastore_demo
description: "Flutter Linux-desktop sandbox exercising every append_only_datastore library feature (CUR-1154 Phase 4.6)."
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.10.7
  flutter: ">=3.38.7"

dependencies:
  flutter:
    sdk: flutter
  append_only_datastore:
    path: ../
  trial_data_types:
    path: ../../trial_data_types

dev_dependencies:
  flutter_test:
    sdk: flutter
  # Required to resolve the `package:flutter_lints/flutter.yaml` include
  # chained in via ../analysis_options.yaml. Dev-deps are not transitive,
  # so the example declares its own copy.
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
