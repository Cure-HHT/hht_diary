# IMPLEMENTS REQUIREMENTS:
#   REQ-o00056: Container infrastructure for Cloud Run
#   REQ-d00028: Portal Frontend Framework
#
# Shared nginx server-level location blocks.
# Included by diary-server-container nginx.conf.
# Do NOT wrap in server { } — this file is inlined verbatim by nginx include.

        # Sponsor content at moon paths: /{sponsorId}/portal/assets/...
        # Also serves mobile assets: /{sponsorId}/mobile/assets/...
        # MUST appear BEFORE Flutter asset cache block to avoid false matches
        # on file extensions (.png, .jpg, etc.)
        location ~ ^/([a-z]+)/(portal|mobile)/assets/([a-zA-Z0-9_/.-]+)$ {
            alias /app/sponsor-content/$1/$2/assets/$3;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Flutter web assets - cache aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # Flutter service worker and manifest - no cache
        location ~* (flutter_service_worker\.js|manifest\.json)$ {
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            try_files $uri =404;
        }

        # SPA routing - serve index.html for all other routes
        # This allows Flutter's client-side router to handle navigation
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Disable access to hidden files
        location ~ /\. {
            deny all;
        }
