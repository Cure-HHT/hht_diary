version = 4

[project]
namespace = "REQ"
name = "Duplicate REQ ID Cross-File Repro"

[id-patterns]
canonical = "{namespace}-{level.letter}{component}"
separators = ["-"]
prefix_optional = false

[id-patterns.component]
style = "numeric"
digits = 5
leading_zeros = true

[id-patterns.assertions]
label_style = "uppercase"
max_count = 26

[levels.prd]
rank = 1
letter = "p"
display_name = "Product"
implements = ["prd"]

[levels.dev]
rank = 2
letter = "d"
display_name = "Development"
implements = ["dev", "prd"]

[scanning]
skip = []

[scanning.spec]
directories = ["spec"]
file_patterns = ["*.md"]

[scanning.code]
directories = []
file_patterns = []

[scanning.test]
directories = []
file_patterns = []
enabled = false

[scanning.result]
directories = []
file_patterns = []

[scanning.docs]
directories = []
file_patterns = []

[scanning.journey]
directories = []
file_patterns = []

[scanning.coverage]
directories = []
file_patterns = []

[rules]
protected_branches = []

[rules.hierarchy]
allow_circular = false
allow_structural_orphans = true

[rules.format]
require_hash = false
require_rationale = false
require_assertions = true
require_status = true
allowed_statuses = ["Active", "Proposed", "Draft", "Deprecated"]

[validation]
hash_mode = "normalized-text"
