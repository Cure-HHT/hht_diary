# Reference sponsor authorization seed (DIARY-DEV-view-action-permissions,
# DIARY-DEV-role-permissions-seed). The canonical EXAMPLE used by local dev, CI,
# and platform tests. Every grant is an Action permission from
# DIARY-PRD-action-inventory (no view:<projection> names). SystemOperator is the
# platform-owned minimum (DIARY-BASE-system-operator-role).
roles:
  - StudyCoordinator
  - CRA
  - Administrator
  - SystemOperator
grants:
  StudyCoordinator:
    - portal.participant.link
    - portal.participant.start_trial
    - portal.participant.disconnect
    - portal.participant.reconnect
    - portal.participant.mark_not_participating
    - portal.participant.reactivate
    - portal.participant.view
    - portal.questionnaire.send
    - portal.questionnaire.call_back
    - portal.questionnaire.finalize
    - portal.questionnaire.unlock
    - portal.audit.view
    - portal.questionnaire.view_status
    - portal.diary.view_entries
  CRA:
    - portal.site.view
  Administrator:
    - portal.user.create
    - portal.user.create_admin
    - portal.user.edit
    - portal.user.deactivate
    - portal.user.reactivate
    - portal.user.unlock
    - portal.user.resend_activation
    - portal.user.assign_role
    - portal.user.grant_role
    - portal.user.revoke_role
    - portal.user.delete_pending
    - portal.audit.view
    - portal.admin.view_settings
    - portal.user.view_accounts
  SystemOperator:
    - portal.admin.view_settings
    - portal.rave.unwedge
    - portal.user.create_sysop
    - portal.user.create_admin
    - portal.user.create
    - portal.user.grant_role
    - portal.user.edit
    - portal.user.deactivate
    - portal.user.reactivate
    - portal.user.unlock
    - portal.user.resend_activation
    - portal.user.assign_role
    - portal.user.assign_site
    - portal.user.revoke_role
    - portal.user.revoke_site
    - portal.user.delete_pending
    - portal.site.view
    - portal.rave.view_sync
    - portal.user.view_accounts
