# IMPLEMENTS REQUIREMENTS:
#   REQ-o00056: Container infrastructure for Cloud Run
#   REQ-d00028: Portal Frontend Framework
#
# nginx configuration for the Reference Portal.
# Serves Flutter web UI and proxies API requests to the Dart server.
#
# Listens on port 8080 with HTTP/2 (h2c) to accept both:
#   - Cloud Run gRPC liveness probes  -> proxied to gRPC health server on 50051
#   - Cloud Run ingress HTTP/2 traffic -> proxied to Dart shelf server on 8081

pid /tmp/nginx.pid;
error_log /dev/stderr warn;

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # WebSocket upgrade map for the EVS reactive /subscriptions endpoint.
    # Mirrors the Upgrade header into Connection so the WS handshake is
    # forwarded to the upstream; non-WS requests get Connection: close.
    map $http_upgrade $connection_upgrade { default upgrade; '' close; }

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /dev/stdout main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    # Compression
    gzip on;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        image/svg+xml
        application/wasm;

    # Security headers (applied to all responses)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # CUR-1305: https://fonts.gstatic.com added to connect-src so Flutter
    # Web's CanvasKit renderer can fetch() Noto fallback fonts (woff2)
    # at runtime. Same host is already in font-src for defence-in-depth;
    # the violation was on connect-src because the fetch is XHR, not @font-face.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.gstatic.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://www.gstatic.com https://fonts.gstatic.com https://*.googleapis.com https://*.firebaseio.com https://*.cloudfunctions.net https://identitytoolkit.googleapis.com https://securetoken.googleapis.com; frame-ancestors 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Upstream Dart server (runs on port 8081 internally)
    upstream dart_server {
        server 127.0.0.1:8081;
        keepalive 32;
    }

    # Upstream gRPC health server (runs on port 50051 internally)
    upstream grpc_health {
        server 127.0.0.1:50051;
        keepalive 4;
    }

    server {
        # Cloud Run ingress sends HTTP/1.1 to the container.
        # gRPC health probes reach the grpc_health_server on :50051 directly.
        listen 8080;
        server_name _;

        root /app/web;
        index index.html;

        # ── gRPC health check ────────────────────────────────────
        # Cloud Run liveness probes use gRPC protocol.
        # Proxies to standalone gRPC health server on port 50051.
        location /grpc.health.v1.Health {
            grpc_pass grpc://grpc_health;
            error_page 502 = /grpc_error_502;
        }

        # Fallback for gRPC errors (health server not yet ready during startup)
        location = /grpc_error_502 {
            internal;
            default_type application/grpc;
            add_header grpc-status 14;
            add_header grpc-message "health server unavailable";
            return 204;
        }

        # ── HTTP health/ready ────────────────────────────────────
        location = /health {
            proxy_pass http://dart_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        location = /ready {
            proxy_pass http://dart_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_connect_timeout 5s;
            proxy_read_timeout 10s;
        }

        # ── API routes ───────────────────────────────────────────
        location /api/ {
            proxy_pass http://dart_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        location /auth/ {
            proxy_pass http://dart_server;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
            proxy_send_timeout 60s;
        }

        # ── EVS reactive routes (CUR-1409) ───────────────────────
        # The portal_ui_evs reaction client addresses the EVS server at
        # ROOT-level paths (it cannot be prefixed), so nginx proxies those
        # roots to dart_server. Exact-match (=) and prefix (^~) locations
        # take precedence over the regex static-asset locations and the SPA
        # fallback below.

        # WebSocket subscription stream — needs the Upgrade/Connection
        # handshake forwarded and a long read/send timeout for the live feed.
        location = /subscriptions {
            proxy_pass http://dart_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            # MUST stay above the portal's WS keepalive interval
            # (kWsKeepaliveInterval, 20s, in portal_server_evs). If you lower
            # this, keep it > that interval or idle subscriptions get reaped
            # between pings. See DIARY-DEV-portal-reaction-server/D.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        # Local-stack push transport (CUR-1466, PUSH_MODE=local). The diary holds
        # this WS to receive real-time pushes. Exact-match so it beats the
        # generic /api/ block, which does NOT forward the Upgrade/Connection
        # handshake. Same long timeout as /subscriptions (> the portal's WS
        # keepalive). Implements: DIARY-DEV-pluggable-push-transport/C
        location = /api/v1/user/push {
            proxy_pass http://dart_server;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
        location = /me               { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location = /actions          { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location = /permissions/snapshot { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location = /audit            { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location = /logout           { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location = /keepalive        { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location = /config/identity  { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location = /config/session   { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location = /config/study     { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location = /login            { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location = /login/verify-otp { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location = /dev/users        { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location ^~ /admin/          { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location ^~ /activate        { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }
        location ^~ /password-reset  { proxy_pass http://dart_server; include /etc/nginx/evs_proxy.conf; }

        # Smoke-check alias: the unchanged deploy verification hits
        # GET /api/v1/portal/config/identity. Map it onto the EVS
        # /config/identity. Exact match beats the /api/ prefix block.
        location = /api/v1/portal/config/identity {
            proxy_pass http://dart_server/config/identity;
            include /etc/nginx/evs_proxy.conf;
        }

        # ── Flutter double-assets fallback (CUR-538) ────────────
        # Flutter sometimes builds assets/ into assets/assets/. The ^~
        # prefix prevents regex locations from overriding this match.
        location ^~ /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri /assets$uri =404;
        }

        # ── SPA entry points — never cache ───────────────────────
        # IMPLEMENTS REQUIREMENTS:
        #   REQ-p00009: Sponsor-Specific Web Portals (sponsor branding
        #               must reflect latest deploy)
        #   REQ-o00056: Container infrastructure for Cloud Run (image
        #               immutability requires the client to actually
        #               fetch the new bundle)
        # Parent-repo REQs cited because there is no sponsor-level requirement
        # for asset-cache hygiene; per CHECKLIST §3 this is the correct fallback
        # when no sponsor-specific equivalent exists.
        #
        # CUR-1280: main.dart.js, main.dart.mjs, main.dart.wasm,
        # flutter_bootstrap.js and flutter.js have FIXED filenames across
        # builds; only their content changes. The previous regex location
        # below matched them with `expires 1y; immutable;` so every
        # redeploy was invisible to the browser until the user hard-
        # reloaded with "Clear Site Data". Hashed assets under
        # /canvaskit/, /assets/, /icons/ keep the long cache.
        # CUR-1280 (Copilot review): no-cache + must-revalidate (NOT no-store).
        # The SPA entry bundles are multi-megabyte; no-store would force a
        # full redownload on every navigation. no-cache lets the browser
        # cache and revalidate with If-Modified-Since on each load — a
        # cheap 304 when unchanged, full body when the deploy bumped the
        # bundle. Both prevent the stale-deploy regression CUR-1280 fixed;
        # this is the lighter knob.
        location = /main.dart.js {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri =404;
        }
        location = /main.dart.mjs {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri =404;
        }
        location = /main.dart.wasm {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri =404;
        }
        location = /flutter_bootstrap.js {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri =404;
        }
        location = /flutter.js {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri =404;
        }

        # ── Fixed-name, content-changing asset files — revalidate ────────
        # CUR-1560: AssetManifest*/FontManifest.json and the tree-shaken font
        # files keep the SAME filename across deploys while their CONTENT
        # changes with every build. Serving them long-cached means a new
        # main.dart.js runs against stale manifests/fonts after a deploy —
        # the blank-login-page-after-deploy failure. Same no-cache (NOT
        # no-store) rationale as the CUR-1280 SPA entry points.
        location = /assets/AssetManifest.json {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri /assets$uri =404;
        }
        location = /assets/AssetManifest.bin {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri /assets$uri =404;
        }
        location = /assets/AssetManifest.bin.json {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri /assets$uri =404;
        }
        location = /assets/FontManifest.json {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri /assets$uri =404;
        }
        location ^~ /assets/fonts/ {
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
            try_files $uri /assets$uri =404;
        }

        # ── Static assets — aggressive cache ─────────────────────
        # Content-addressed by Flutter (assets/, icons/) — safe to pin.
        # Top-level entry-point .js files are excluded by the exact-match
        # locations above; fixed-name manifests/fonts by the CUR-1560
        # exceptions above. The `.js` regex below is a catch-all for
        # nested .js and is shadowed by the exact-match SPA entry-point
        # locations (and suppressed under /canvaskit/ by its ^~ block).
        location ~* \.(css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|pdf)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }
        location ~* \.js$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            try_files $uri =404;
        }

        # ── Flutter service worker and manifest — no cache ───────
        location = /flutter_service_worker.js {
            try_files $uri =404;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location = /manifest.json {
            try_files $uri =404;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        location = /version.json {
            try_files $uri =404;
            expires -1;
            add_header Cache-Control "no-store, no-cache, must-revalidate";
        }

        # ── Other static directories ─────────────────────────────
        # CUR-1560: canvaskit files (canvaskit.js/.wasm, skwasm.js) keep
        # fixed names while their content changes with every Flutter SDK
        # bump — a stale immutable canvaskit against a new main.dart.js
        # breaks rendering after a deploy. Revalidate instead (cheap 304
        # between SDK bumps). `^~` is required: without it the `~* \.js$`
        # immutable regex above outranks a plain prefix and keeps serving
        # /canvaskit/*.js immutable (the pre-fix live behavior).
        location ^~ /canvaskit/ {
            try_files $uri =404;
            expires -1;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        location /icons/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /content/ {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Sponsor-content overlay assets (logos, fonts, etc.). The
        # /api/v1/sponsor/branding handler returns
        # `assetBaseUrl: "/${SPONSOR_ID}"` and the SPA appends paths like
        # /portal/assets/images/app_logo.png to it. The Dockerfile copies
        # the sponsor's content/ tree into /app/sponsor-content/${SPONSOR_ID}/
        # at build time. The placeholder __SPONSOR_ID__ is replaced at
        # container start by start.sh / portal-start-local.sh from the
        # SPONSOR_ID env. Without this route the SPA's logo fetch 404s
        # and the UI silently degrades to its built-in placeholder.
        # The `^~` modifier prevents the static-asset regex below from
        # overriding this prefix and falling through to /app/web/, same
        # technique the /assets/ block uses.
        location ^~ /__SPONSOR_ID__/portal/ {
            alias /app/sponsor-content/__SPONSOR_ID__/portal/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location = /favicon.ico {
            try_files $uri =404;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ── SPA fallback ─────────────────────────────────────────
        # IMPLEMENTS REQUIREMENTS:
        #   REQ-p00009: Sponsor-Specific Web Portals (index.html is the
        #               loader for the current build; redeploys must be
        #               visible immediately)
        #   REQ-o00056: Container infrastructure for Cloud Run (image
        #               immutability requires the client to fetch the
        #               new bundle)
        #
        # CUR-1280: index.html had no Cache-Control header, so the
        # browser applied heuristic freshness from Last-Modified —
        # making redeploys silently invisible. An explicit no-cache
        # forces revalidation on every navigation.
        location / {
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /index.html;
        }

        # ── Block hidden files ───────────────────────────────────
        location ~ /\. {
            deny all;
        }
    }
}
