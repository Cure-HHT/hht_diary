# =============================================================
# !!! RELAXED SONARQUBE CHECKS !!!
# =============================================================
# This project is using a custom quality gate
#   "Relaxed - hht_diary (CUR-1310)"  (id=150366 on cure-hht org)
# that flips the strict thresholds on:
#   new_coverage                  80 -> 0    (gate disabled)
#   new_duplicated_lines_density   3 -> 100  (gate disabled)
# while keeping the security / reliability / maintainability ratings
# and security-hotspot review at their strict defaults.
#
# WHY: PR CUR-1296 needed to ship before LCOV coverage upload was
# wired and before the test-fixture string-duplication cleanup
# landed (~30 instances tracked in CUR-1310). The gate was failing
# loudly on metrics the workflow doesn't actually feed yet
# (coverage = 0% because no LCOV path was provided), which made
# every PR's SonarCloud status red regardless of code quality.
#
# THIS IS A TEMPORARY RELAXATION. Tighten back when CUR-1310
# Phase 2 lands (LCOV upload + test-constant extraction). Tracked:
#   https://linear.app/cure-hht-diary/issue/CUR-1310
# Restore the strict gate via:
#   curl -u $SONARQUBE_TOKEN: -X POST \
#     https://sonarcloud.io/api/qualitygates/select \
#     -d organization=cure-hht -d gateId=9 \
#     -d projectKey=Cure-HHT_hht_diary
# =============================================================

# SonarCloud (CI-based analysis). Replaces SonarCloud "Automatic Analysis",
# which cannot run `pub get` and therefore reports every package:event_sourcing
# import as dart:S2260 "analyzer configuration error" (~43% of port-scoped
# issues). With deps resolved in CI (see .github/workflows/sonarcloud.yml), the
# analyzer resolves cleanly and that cluster disappears at the root.
#
# IMPORTANT: disable "Automatic Analysis" in the SonarCloud project settings
# (Administration -> Analysis Method) or CI analysis is rejected.

sonar.projectKey=Cure-HHT_hht_diary
sonar.organization=cure-hht
sonar.host.url=https://sonarcloud.io

# Whole-repo sources (matching what Automatic Analysis covered), minus generated
# and build artifacts that are noise, not authored code.
sonar.sources=.
sonar.test.inclusions=**/test/**,**/integration_test/**,**/*_test.dart,**/*_test.py
sonar.tests=

sonar.exclusions=\
  **/build/**,\
  **/.dart_tool/**,\
  **/generated/**,\
  **/*.g.dart,\
  **/*.freezed.dart,\
  **/*.mocks.dart,\
  **/.pub-cache/**,\
  **/node_modules/**,\
  **/coverage/**,\
  **/ios/Pods/**,\
  **/android/.gradle/**,\
  **/macos/Pods/**,\
  **/l10n/app_localizations*.dart,\
  **/firebase_options.dart,\
  **/_generated/**,\
  spec-archive/**,\
  **/*.pb.dart

sonar.sourceEncoding=UTF-8

# Use the SCM (git) to determine which lines are "new" in PR analysis.
sonar.scm.provider=git

# Disable the C/C++/Objective-C analyzers. Flutter's android/ios/macos/
# linux/windows platform-wrapper directories contain auto-generated
# .cc / .m / .mm files that the sonar cfamily plugin demands a
# compile_commands.json for. We don't author any C-family code — opt
# out entirely. (sentinel '-' = no file extensions, per
# docs.sonarsource.com/sonarcloud/advanced-setup/languages/c-family/)
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-
