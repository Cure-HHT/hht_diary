# SonarQube Cloud project config for hht_diary.
# The SonarSource scan-action reads this at the repo root.

sonar.projectKey=Cure-HHT_hht_diary
sonar.organization=cure-hht
sonar.host.url=https://sonarcloud.io

# Restrict analysis to source we author. Generated and dependency
# directories balloon the analysis time without surfacing real signal.
# Dirs included only if they exist at this repo root: apps (Dart/
# Flutter source), database (PostgreSQL schema + migrations),
# deployment (Docker + scripts), tools (CI/automation scripts).
# Out: spec (markdown-only, no sonar analyzer); packages and sponsor
# don't exist in this repo today (the CLAUDE.md project-structure
# overview is aspirational on those two — re-add when they land).
sonar.sources=apps,database,deployment,tools
sonar.tests=

sonar.exclusions=\
  **/build/**,\
  **/.dart_tool/**,\
  **/generated/**,\
  **/*.g.dart,\
  **/*.freezed.dart,\
  **/*.mocks.dart,\
  **/.pub-cache/**,\
  **/node_modules/**,\
  **/coverage/**,\
  **/ios/Pods/**,\
  **/android/.gradle/**,\
  **/macos/Pods/**

# Use the SCM (git) to determine which lines are "new" in PR analysis.
sonar.scm.provider=git
